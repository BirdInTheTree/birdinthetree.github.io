уманным.\\\"\",\"slug\":\"contrived-plot-is-one-where-events-serve-plot-or-theme-rathe\"},{\"title\":\"Название сериала — первый hook: тон, суть, конфликт\",\"tags\":\"principle tactical-rule hook tone concept-testing\",\"excerpt\":\"\\\"Название — ваш первый hook, поэтому оно должно передавать тон и суть сериала, его concept, а в идеале — намекать если не на главный конфликт, то хотя бы на какой-то.\\\"\",\"slug\":\"series-title-should-ideally-encapsulate-tone-essence-and-sug\"},{\"title\":\"Называй персонажей по роли, не по имени\",\"tags\":\"tactical-rule pitfall characters\",\"excerpt\":\"\\\"Не называй всех персонажей по именам. Обозначай их по функции — мальчик (или «наш герой»), отец, миллиардер, мошенник — иначе покупатель запутается и никого не запомнит.\\\"\",\"slug\":\"identify-pitch-characters-by-function-not-by-name\"},{\"title\":\"Называй повороты вслух — покупатель не потеряется\",\"tags\":\"tactical-rule act-structure pacing\",\"excerpt\":\"\\\"Объявляй о прогрессе. В отличие от телефонного pitch'а, на встрече ты рассказываешь историю с деталями и beats — чтобы показать: concept проработан до конца. Но именно поэтому питч растягивается, и к\",\"slug\":\"announce-act-turning-points-during-a-pitch-meeting-so-the-bu\"},{\"title\":\"Называй реальных актёров, а не звёзд категории А\",\"tags\":\"tactical-rule principle pitch-meeting\",\"excerpt\":\"\\\"Составь список желаемых актёров на главные роли. Хорошо, если имена будут реалистичными: это говорит о профессиональном мышлении и помогает слушателю увидеть персонажей. Следи за трендами — кто сейча\",\"slug\":\"suggest-realistic-casting-wish-lists-not-implausible-a-liste\"},{\"title\":\"Нарратив — форма подачи сюжета\",\"tags\":\"definition format\",\"excerpt\":\"\\\"Нарратив: форма, в которой подаётся сюжет истории.\\\"\",\"slug\":\"narrative-is-the-form-chosen-to-convey-the-plot-in-a-story\"},{\"title\":\"Нарушить правила подачи — значит провалить коллаборацию\",\"tags\":\"tactical-rule pitfall overview\",\"excerpt\":\"\\\"Отнесись к ним серьёзно и следуй инструкциям точно. Иначе ты громко заявляешь: мне всё равно, чего они хотят, — и вряд ли из тебя выйдет хороший партнёр.\\\"\",\"slug\":\"follow-submission-guidelines-precisely-or-signal-you-are-a-p\"},{\"title\":\"Насилие на экране работает только при сочувствии жертве\",\"tags\":\"principle empathy characters\",\"excerpt\":\"«Хочешь, чтобы зритель это почувствовал — но не аплодировал. А для этого нужно вложить в персонажей. Нельзя допустить, чтобы в сцене насилия зрителю было всё равно, кого сейчас убьют.»\",\"slug\":\"violence-on-screen-requires-audience-investment-in-the-victi\"},{\"title\":\"Настоящая комедия-драма: смех и сочувствие всегда вместе\",\"tags\":\"definition tactical-rule genre tone\",\"excerpt\":\"\\\"Настоящая комедия-драма — это 100% комедия и 100% драма. Не путайте её с обычной драмой, где есть остроумные реплики и пара комедийных моментов, чтобы разрядить историю. Проверяйте по третьему правил\",\"slug\":\"true-comedy-drama-is-one-where-the-audience-expects-to-both\"},{\"title\":\"Настоящий злодей не меняется и не учится\",\"tags\":\"principle show-example antagonist character-arc\",\"excerpt\":\"\\\"Большинство злодеев не меняются. Конкретные цели могут сдвигаться, но антагонист в конце истории — тот же, что и в начале. Настоящий злодей не растёт и не извлекает уроков из провалов. Пётр Великий и\",\"slug\":\"true-villains-do-not-evolve-or-learn-from-their-failures\"},{\"title\":\"Начало истории слишком рано — частая ошибка\",\"tags\":\"tactical-rule pitfall pacing pilot-structure\",\"excerpt\":\"\\\"Правильное ли у вас число эпизодов, верной ли длины каждый — и не начинаете ли вы историю слишком рано? Слишком поздний старт (слишком быстрый) — редкость. А вот слишком ранний (слишком медленный) — \",\"slug\":\"starting-the-story-too-early-is-a-common-flaw-in-series-proj\"},{\"title\":\"Начинай питч смело — решительность не слабость\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Решение простое: берите инициативу в свои руки. Это ваше время. Покупатель дал вам трибуну и ждёт, что вы сразу перейдёте к делу. Решительность никогда не выглядит слабостью, а уверенность в своей ис\",\"slug\":\"take-control-and-begin-your-pitch-boldly-decisiveness-is-nev\"},{\"title\":\"Начинай питч-встречу с 60-секундного питча\",\"tags\":\"tactical-rule hook\",\"excerpt\":\"\\\"Открывай питч коротким вариантом. Как на конференции или по телефону, 60-секундный питч пробуждает твой азарт, втягивает покупателя в историю и оставляет его с желанием узнать больше — а большее ты т\",\"slug\":\"open-the-long-pitch-meeting-with-your-60-second-pitch\"},{\"title\":\"Начинающий автор: нужны два TV-сэмпла\",\"tags\":\"tactical-rule definition pilot\",\"excerpt\":\"\\\"Начинающему автору нужны как минимум два сильных сэмпла для TV: spec pilot и spec эпизод.\\\"\",\"slug\":\"baby-writers-need-at-least-two-tv-writing-samples-a-spec-pil\"},{\"title\":\"Начни историю в точке кризиса для протагониста\",\"tags\":\"principle tactical-rule protagonist hook pilot-structure\",\"excerpt\":\"\\\"Какую бы структуру вы ни выбрали, я всегда советую студентам начинать историю в момент, когда протагонист уже в напряжении, в опасности, в кризисе. Покажите отчаявшегося протагониста — и зритель втян\",\"slug\":\"start-the-story-at-a-point-of-disequilibrium-tension-or-jeop\"},{\"title\":\"Начни питч с того, как пришла идея\",\"tags\":\"tactical-rule principle hook\",\"excerpt\":\"\\\"Просто начни питч с этой фразы: «Лучше всего я расскажу о своей истории, если объясню, как она у меня возникла». И дальше — именно это.\\\"\",\"slug\":\"open-the-pitch-by-telling-how-you-came-up-with-the-idea\"},{\"title\":\"Не адаптируй чужое — без прав это впустую\",\"tags\":\"tactical-rule pitfall overview\",\"excerpt\":\"«Я бы точно не тратил время на адаптацию материала, которым вы не владеете и не управляете — хотя бы на ограниченный срок в форме опционного соглашения.»\",\"slug\":\"do-not-adapt-material-you-do-not-own-or-control\"},{\"title\":\"Не бросайтесь питчить при первой встрече\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"Умейте выбрать момент: питчить сейчас или подождать. Не торопитесь — даже если рядом стоит именно тот человек, которому хотите продать идею. Иногда лучше просто поговорить или задать вопрос. А через \",\"slug\":\"recognize-when-to-pitch-and-when-to-wait-rather-than-launchi\"},{\"title\":\"Не доверяй проверке орфографии\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Перед отправкой дважды проверь: нет ли опечаток и орфографических ошибок. Не полагайся на встроенную проверку. Она пропустит многое — например, слова, которые пишутся одинаково, но означают разное.\\\"\",\"slug\":\"do-not-rely-on-spellcheck-before-sending-the-script\"},{\"title\":\"Не застревай в одном слое пирамиды Маслоу\",\"tags\":\"principle characters theme\",\"excerpt\":\"\\\"Исследуй любую проблему — только не застревай в одном слое пирамиды.\\\"\",\"slug\":\"avoid-staying-solely-within-one-layer-of-maslows-pyramid-whe\"},{\"title\":\"Не начинай питч с logline\",\"tags\":\"tactical-rule pitfall logline hook pacing\",\"excerpt\":\"\\\"Не начинай с logline. Logline — одно предложение, которое передаёт суть истории максимально сжато и точно. Его прелесть в том, что он мгновенно схватывает историю и говорит покупателю: «Вот как мою и\",\"slug\":\"dont-lead-a-pitch-with-a-logline\"},{\"title\":\"Не начинай питч с названия\",\"tags\":\"pitfall tactical-rule hook\",\"excerpt\":\"\\\"Не открывай питч названием. Упомянуть его в конце — нормально: слушатель уже понял, как оно связано с историей. Но когда первые твои слова — это название, покупатель не только не понимает, о чём речь\",\"slug\":\"dont-lead-the-pitch-with-your-title\"},{\"title\":\"Не питчуй незаконченный сценарий\",\"tags\":\"tactical-rule pitfall hook\",\"excerpt\":\"\\\"Отсюда одно из важнейших правил питча: никогда не питчуй художественный сценарий покупателю, пока он не готов. Если ты зацепишь продюсера или агента сильным питчем, он захочет прочитать сценарий сейч\",\"slug\":\"never-pitch-a-fiction-script-to-a-buyer-before-it-is-finishe\"},{\"title\":\"Не повторяй статус-кво в Pilot Story\",\"tags\":\"tactical-rule pilot-structure pilot\",\"excerpt\":\"\\\"Иногда раздел «Персонажи» уже достаточно описывает исходное положение героев — и тогда Pilot Story может начинаться позже по сюжету. Даже если статус-кво занимает первые 20% готового сценария, незаче\",\"slug\":\"skip-restating-status-quo-in-pilot-story-if-character-sectio\"},{\"title\":\"Не притворяйтесь, что знаете компанию — изучите её\",\"tags\":\"pitfall tactical-rule\",\"excerpt\":\"\\\"…это люди, которые делают вид, будто знают мою компанию и наши работы. Не лгите мне, что обожаете наши фильмы, если не смотрели ни одного. По возможности изучайте компанию, узнавайте о ней как можно \",\"slug\":\"dont-fake-familiarity-with-a-production-companys-credits-res\"},{\"title\":\"Не спорьте с партнёрами при покупателе\",\"tags\":\"pitfall practice-story\",\"excerpt\":\"«\\\"В лифте он сказал, что всё прошло хорошо. Я ответил: \\\"Нет, и раз ты показал покупателю нашу несогласованность — они откажут\\\". Так и вышло. Мы расстались с этим парнем. Урок? Никогда не спорь с партн\",\"slug\":\"never-disagree-with-your-pitch-partners-in-front-of-a-buyer\"},{\"title\":\"Не указывай тип истории в обзоре байбла\",\"tags\":\"tactical-rule principle overview\",\"excerpt\":\"\\\"Не советую указывать тип истории или что-либо слишком техническое с точки зрения структуры: если читатель не разделяет ту же теоретическую базу или не согласен с вашей оценкой, обсуждение уйдёт в бес\",\"slug\":\"avoid-specifying-story-type-or-structural-theory-in-the-bibl\"},{\"title\":\"Не уложился в минуту — питч провален\",\"tags\":\"pitfall tactical-rule logline concept-testing\",\"excerpt\":\"\\\"Самое раздражающее в слабом питче — неспособность объяснить concept за минуту или меньше.\\\"\",\"slug\":\"failing-to-articulate-the-concept-in-under-a-minute-is-the-m\"},{\"title\":\"Незакрытые вопросы в pilot — обещание продолжения\",\"tags\":\"principle pilot mystery-suspense end-hook\",\"excerpt\":\"\\\"Эти сцены — загадки, намеренно посеянные в pilot. В них кроется важная особенность pilot'а: незакрытые вопросы и оборванные нити — это нормально. Свободные концы заставляют читателя или зрителя думат\",\"slug\":\"pilots-may-plant-unanswered-questions-as-a-promise-of-more-t\"},{\"title\":\"Незаслуженная беда — лучший способ влюбить в героя\",\"tags\":\"principle tactical-rule show-example empathy protagonist\",\"excerpt\":\"\\\"Вызывайте сочувствие. Читатель отождествляет себя с тем, кого жалеет, — дайте герою незаслуженный удар судьбы. Гарри Поттера запирают под лестницей ужасные родственники в Harry Potter and the Sorcere\",\"slug\":\"undeserved-misfortune-creates-sympathy-and-gets-audiences-ro\"},{\"title\":\"Незнание жанра — типичная слабость питча\",\"tags\":\"pitfall practice-story genre premise\",\"excerpt\":\"\\\"Чаще всего мы сталкиваемся с такими слабостями: • Автор не может сформулировать premise в двух предложениях или изложить ключевые beats истории и главных персонажей за три-пять минут. • Автор не увер\",\"slug\":\"writers-pitching-without-certainty-about-their-own-genre-is\"},{\"title\":\"Необратимые повороты держат зрителя на крючке\",\"tags\":\"principle show-example character-arc serialization cliffhangers\",\"excerpt\":\"\\\"Что касается переломных моментов и рисков — мы уже говорили: чем хуже приходится твоим персонажам, тем сильнее зрителю не всё равно. Однажды мы вывезли Токио из Монетного двора привязанной к носилкам\",\"slug\":\"money-heist-showrunner-lex-pina-argues-irreversible-characte\"},{\"title\":\"Неподвижность на сцене сильнее суеты\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"Сознательно расслабьтесь, встаньте прямо, крепко упритесь ногами в пол и возьмите сцену под контроль. Неподвижность всегда захватывает сильнее, чем лишние движения. Стойте спокойно, руки вдоль тела, \",\"slug\":\"stillness-on-stage-is-more-engaging-than-excess-movement\"},{\"title\":\"Непрерывное время разгоняет историю\",\"tags\":\"principle pacing\",\"excerpt\":\"\\\"Непрерывное время разгоняет историю. Оно меняет ритм повествования и нередко порождает более длинные, многослойные сцены.\\\"\",\"slug\":\"continuous-time-builds-story-momentum-and-produces-longer-mo\"},{\"title\":\"Нервозность автора забудут, если история сулит деньги\",\"tags\":\"principle\",\"excerpt\":\"\\\"Покупатель хочет, чтобы у вас получилось. Он знает, что вы волнуетесь, и сочувствует вам. Но важнее другое: он отчаянно ищет хороший материал. Так что можете заикаться, трястись и обливаться потом — \",\"slug\":\"buyers-disregard-a-writers-nervousness-when-the-story-might\"},{\"title\":\"Несколько сюжетных линий нужно связать\",\"tags\":\"principle show-example storylines theme serialization\",\"excerpt\":\"\\\"Если у вас больше одной сюжетной линии, они должны быть связаны — через тему (когда сериал движется темой, как Game of Thrones или Succession) или через сюжет (когда он движется событиями, как The Wa\",\"slug\":\"multiple-storylines-must-be-connected-through-theme-or-plot\"},{\"title\":\"Нет в пилоте — нет в шоу\",\"tags\":\"principle show-example pilot ensemble characters\",\"excerpt\":\"\\\"Запомните: нет в пилоте — нет в шоу. Если в сериале несколько главных персонажей, играющих ключевую роль, — запускайте их уже в пилоте. В Stranger Things несколько сюжетных линий крутятся одновременн\",\"slug\":\"if-its-not-in-the-pilot-its-not-in-the-show\"},{\"title\":\"Нет ответа неделю — звони продюсеру\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если продюсер не подтвердил получение treatment или сценария в течение недели, я звоню — убедиться, что материал не потерялся.\\\"\",\"slug\":\"phone-the-producer-if-treatment-receipt-is-unacknowledged-wi\"},{\"title\":\"Нет причинности — сюжет можно вырезать без потерь\",\"tags\":\"principle concept-testing storylines\",\"excerpt\":\"\\\"Чтобы проверить причинно-следственную связь, попробуй убрать одну из сюжетных линий из сериала, сезона или эпизода. Если это удаётся и почти ничего не меняется, то...\\\"\",\"slug\":\"if-removing-a-storyline-doesnt-change-much-it-may-lack-causa\"},{\"title\":\"Нет эмоции в репетиции — сломан pilot, не питч\",\"tags\":\"principle tactical-rule pilot pilot-goals concept-testing\",\"excerpt\":\"\\\"Но если автор не может питчевать перед зеркалом, или друзьям, супругу, партнёрам — и при этом эмоционально не включается в свою историю pilot'а, ему и его партнёрам стоит честно спросить себя: а рабо\",\"slug\":\"inability-to-emotionally-connect-when-rehearsing-the-pitch-s\"},{\"title\":\"Неуверенность в материале губит питч\",\"tags\":\"pitfall hook\",\"excerpt\":\"\\\"Неуверенность при подаче собственного материала. Если вы сами не горите идеей — почему должен гореть я?\\\"\",\"slug\":\"lack-of-confidence-in-your-own-material-weakens-the-pitch\"},{\"title\":\"Никогда не извиняйтесь до и после питча\",\"tags\":\"tactical-rule pitching\",\"excerpt\":\"\\\"Наконец-то — ваш выход. И в этот момент вас, скорее всего, накроет острое желание извиниться: мол, не совсем готов, очень молод, очень стар, очень нервничаю… Никогда не извиняйтесь перед питчем. И по\",\"slug\":\"never-apologize-before-or-after-pitching\"},{\"title\":\"Никогда не начинай питч с извинений\",\"tags\":\"tactical-rule principle hook\",\"excerpt\":\"\\\"Будь профессионалом. Приходи вовремя и будь готов. Никогда не начинай питч с оговорок. Если день выдался ужасным и по дороге тебя остановил гаишник — соберись и оставь свои неприятности за дверью.\\\"\",\"slug\":\"never-begin-a-pitch-with-a-disclaimer\"},{\"title\":\"Новички губят питч, думая о сюжете\",\"tags\":\"pitfall principle concept-testing characters\",\"excerpt\":\"\\\"Главная ошибка начинающих сценаристов и продюсеров — они зацикливаются на сюжете и забывают потратить большую часть времени на отработку concept и персонажей. Нас зажигает ИДЕЯ и ПЕРСОНАЖИ. Их не най\",\"slug\":\"neophyte-writers-mistakenly-focus-on-plot-instead-of-concept\"},{\"title\":\"Новички не могут объяснить свою историю просто\",\"tags\":\"principle pitfall practice-story logline concept-testing\",\"excerpt\":\"\\\"Это происходит без исключений: большинство начинающих авторов не могут описать свою историю просто и внятно. Девяносто процентов преподавания сценарного мастерства — это снова и снова спрашивать «В ч\",\"slug\":\"most-new-writers-cannot-describe-their-stories-in-a-simple-t\"},{\"title\":\"Обещать жанр, которого нет — значит разочаровать\",\"tags\":\"pitfall genre\",\"excerpt\":\"\\\"Чего точно не стоит делать — продавать проект под жанровым обещанием, которого материал не выполняет. Да, назвать своё детище триллером, комедией или хоррором — верный способ привлечь внимание. Но ес\",\"slug\":\"branding-a-project-with-a-genre-it-does-not-deliver-disappoi\"},{\"title\":\"Одна А-история делится между персонажами с общей целью\",\"tags\":\"principle definition show-example storylines ensemble serialization\",\"excerpt\":\"«Может быть несколько А-историй, связанных с одной общей целью, — тогда их обозначают А1, А2, А3, А4: единая А-история, разбитая между разными персонажами, которые решают одну и ту же проблему. Это хо\",\"slug\":\"a-single-a-story-can-be-split-across-different-characters-al\"},{\"title\":\"Одна камера и анимация идут куда угодно\",\"tags\":\"definition show-example format setting\",\"excerpt\":\"\\\"Однокамерные комедии ведут нас везде: в помещении, на улице, в открытом космосе, в океане — куда требует история, туда отправляется и зритель. Анимационные комедийные сериалы (The Simpsons, Rick \u0026 Mo\",\"slug\":\"single-camera-and-animated-comedies-can-go-anywhere-the-stor\"},{\"title\":\"Одна камера — больше персонажей, сцен и локаций\",\"tags\":\"definition show-example format\",\"excerpt\":\"\\\"Однокамерные ситкомы — The Office, Parks \u0026 Rec, Community, Modern Family, 30 Rock — снимают одной камерой и охватывают больше персонажей, сцен и локаций.\\\"\",\"slug\":\"single-camera-sitcoms-use-one-camera-and-shoot-more-characte\"},{\"title\":\"Однокамерные комедии и драмеди захватили рынок\",\"tags\":\"definition show-example format genre\",\"excerpt\":\"\\\"Однокамерные шоу — комедии и драмеди — стали нормой: Schitt's Creek и Ted Lasso, Insecure, Kim's Convenience, PEN15 и часовая комедия из Франции Call My Agent!\\\"\",\"slug\":\"single-camera-comedies-and-dramedies-have-become-more-preval\"},{\"title\":\"Однострочные биты — лучший источник клиффхэнгеров\",\"tags\":\"tactical-rule cliffhangers act-structure\",\"excerpt\":\"\\\"Один из способов — бить по Act Outs изо всех сил! Однострочные биты — лучшее место для самых мощных клиффхэнгеров.\\\"\",\"slug\":\"single-scene-beats-are-the-best-place-to-find-your-strongest\"},{\"title\":\"Опасность для героя усиливает нашу связь с ним\",\"tags\":\"principle tactical-rule show-example empathy hook\",\"excerpt\":\"\\\"Поставьте героя под угрозу. Мы сживаемся с теми персонажами, за которых тревожимся. The Bourne Supremacy, Kill Bill, все фильмы о Джеймсе Бонде и Индиане Джонсе открываются сценами, где герои на воло\",\"slug\":\"putting-the-hero-in-jeopardy-physical-or-otherwise-increases\"},{\"title\":\"Описание в письме: между logline и 60-секундным питчем\",\"tags\":\"tactical-rule logline hook\",\"excerpt\":\"\\\"Описание истории должно быть больше, чем logline — он слишком короток и плоск, чтобы вызвать нужную эмоцию на бумаге. Но и меньше, чем 60-секундный питч: записанный целиком, он займёт всю страницу. Н\",\"slug\":\"query-letter-story-description-should-be-a-paragraph-between\"},{\"title\":\"Оригинальная идея — два крутых жанра в одном\",\"tags\":\"principle premise comparables\",\"excerpt\":\"\\\"Большинство оригинальных идей — это два крутых элемента, впервые смешанных вместе. Как арахисовое масло с шоколадом: порознь хорошо, вместе — отлично.\\\"\",\"slug\":\"most-original-ideas-are-two-cool-things-merged-for-the-first\"},{\"title\":\"Осколок стекла — это корень изъяна персонажа\",\"tags\":\"definition principle backstory character-arc\",\"excerpt\":\"\\\"Определив изъяны персонажа, можно нащупать его осколок стекла. Осколок стекла — это история происхождения изъяна. Может, персонаж не доверяет людям, потому что родители бросили его в детстве. Может, \",\"slug\":\"the-shard-of-glass-is-the-origin-story-of-a-characters-flaw\"},{\"title\":\"Ответ на вопрос покупателя — не дольше 10 секунд\",\"tags\":\"tactical-rule pitfall overview\",\"excerpt\":\"\\\"Первое правило ответов на вопросы покупателей — краткость. Я видел, как авторы делали блестящий питч, чётко укладывались в 60 секунд, а потом использовали простой вопрос как повод для немыслимого: на\",\"slug\":\"keep-answers-to-buyers-questions-under-ten-seconds\"},{\"title\":\"Отказ — норма. Важно лишь, как ты реагируешь\",\"tags\":\"principle\",\"excerpt\":\"\\\"Отказ — часть жизни писателя. Каждый автор, сколь бы велик и успешен он ни был, получал от ворот поворот. Вопрос в том, что он делал дальше.\\\"\",\"slug\":\"rejection-is-universal-among-writers-including-the-great-and\"},{\"title\":\"Отказной pilot почти никогда не берёт другой network\",\"tags\":\"show-example pitfall pilot\",\"excerpt\":\"\\\"Попытки продать готовый сценарий конкурирующим networks предпринимаются, но почти никогда не дают результата — и тому есть несколько причин. Во-первых, у первого network, скорее всего, были веские тв\",\"slug\":\"shopping-a-passed-pilot-script-to-competing-networks-rarely\"},{\"title\":\"Отношения — связь, динамика — поведение на экране\",\"tags\":\"principle definition relationships subtext\",\"excerpt\":\"«\\\"Отношения\\\" описывают связь между персонажами. \\\"Динамика\\\" — то, как персонажи думают и ведут себя друг с другом: внешнее проявление чувств, которое зрители видят на экране.»\",\"slug\":\"relationships-describe-character-connections-while-dynamics\"},{\"title\":\"Очередь перед отправкой: дайте себе 5–10 минут\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если система позволяет, настройте отложенную отправку. Я сбился со счёта, сколько раз новая мысль приходила ко мне через несколько минут после того, как query letter был дописан. Если письмо уже ушло\",\"slug\":\"queue-query-emails-for-five-to-ten-minutes-before-sending-to\"},{\"title\":\"Парадокс Barry: убийца и актёр — полные противоположности\",\"tags\":\"practice-story show-example premise protagonist story-engine\",\"excerpt\":\"«Почти сразу мы начали думать о возможностях, которые таит этот парадокс. Убийца действует в тени — актёр выходит на свет. Убийца давит в себе любую эмоцию — актёр обязан открыть их все. Убийца должен\",\"slug\":\"barrys-central-paradox-came-from-the-sharp-opposites-between\"},{\"title\":\"Параллельный монтаж спасает ансамбль\",\"tags\":\"practice-story pilot ensemble\",\"excerpt\":\"\\\"Studio дали любопытные замечания: в первых вариантах Кинг разносил истории четырёх девочек по отдельным актам — и studio сказали, что девочки слишком оторваны друг от друга и от ансамбля в целом. Сце\",\"slug\":\"studio-note-on-pretty-little-liars-pilot-forced-intercutting\"},{\"title\":\"Первая работа в индустрии: переезд и напор\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Лучшая стратегия для первой работы: 1) переехать в Лос-Анджелес и 2) не сидеть на месте. Действуй, знакомься, заявляй о себе. Спрашивай всех своих знакомых в Лос-Анджелесе, не работает ли кто-то из и\",\"slug\":\"land-a-first-entertainment-job-by-moving-to-la-and-hustling\"},{\"title\":\"Первые две строки письма: зачем вы пишете\",\"tags\":\"tactical-rule hook\",\"excerpt\":\"\\\"В первом абзаце объясни, почему письмо стоит читать дальше. Не начинай с преамбулы или хитрого вступления. Не место здесь и блестящему остроумию, и умению напустить страху. Если занятой executive за \",\"slug\":\"make-clear-why-youre-writing-within-the-first-two-lines-of-a\"},{\"title\":\"Первые минуты — для контакта, не для pitch\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"Чего точно не стоит делать — так это питчить. Первые минуты решают всё: именно сейчас вы выстраиваете контакт. Не губите всё, что уже сделали, обращаясь с человеком напротив как с мишенью. Обращайтес\",\"slug\":\"do-not-start-pitching-in-the-first-minutes-of-the-meeting-us\"},{\"title\":\"Первый акт в сериале — почти всегда самый длинный\",\"tags\":\"tactical-rule principle act-structure pacing pilot-structure\",\"excerpt\":\"\\\"Тизер не в счёт — первый акт в сериале почти всегда самый длинный. Это и практично, и выгодно. С практической стороны: есть время раскрыть персонажей и мир, раскрутить сюжет и выйти на сильный финал \",\"slug\":\"first-acts-are-almost-always-the-longest-acts-in-tv\"},{\"title\":\"Первый вопрос к сериалу: хватит ли ему дыхания?\",\"tags\":\"principle pitfall premise concept-testing serialization\",\"excerpt\":\"«Когда я работаю над сериальным проектом, первый вопрос такой: выдержит ли он дистанцию? Есть ли у сериала \\\"ноги\\\"? Понимаю, что оба выражения — штампы, но они не зря стали штампами. Это очень распрост\",\"slug\":\"the-first-question-for-any-series-project-is-whether-it-has\"},{\"title\":\"Первый кадр пилота задаёт тему, жанр и тон\",\"tags\":\"principle tactical-rule opening-image pilot hook\",\"excerpt\":\"\\\"С чего открывать pilot? Часто помогает найти первый кадр — яркий, неожиданный, интригующий. Что-то визуальное, что говорит больше, чем видно на поверхности: не просто красивый пейзаж. Ваша задача — з\",\"slug\":\"a-striking-original-or-puzzling-opening-image-can-help-set-t\"},{\"title\":\"Первый образ — портрет «до» с изъяном героя\",\"tags\":\"definition tactical-rule opening-image character-arc pilot-structure\",\"excerpt\":\"\\\"Первый образ задаёт тон, формирует голос и вбивает тематический кол в землю. Часто писатели используют его, чтобы познакомить нас с героем и наглядно показать его изъяны. Это фотография «до»: порок, \",\"slug\":\"opening-image-often-visually-illustrates-the-heros-flaw-as-t\"},{\"title\":\"Первый эпизод: десять минут продают следующие пятьдесят\",\"tags\":\"principle tactical-rule pilot hook pilot-goals\",\"excerpt\":\"«В сериале у тебя есть примерно десять минут в первом эпизоде, чтобы продать следующие пятьдесят. За это время нужно представить мир истории и запустить сюжет.»\",\"slug\":\"first-episode-has-ten-minutes-to-sell-the-next-fifty\"},{\"title\":\"Персонажи должны держать зрителя неделю за неделей\",\"tags\":\"principle tactical-rule characters ensemble empathy\",\"excerpt\":\"\\\"Персонажи должны захватывать. Люди, населяющие вашу историю, обязаны быть достаточно интересными, живыми и разными, чтобы зрители хотели возвращаться к ним снова и снова — каждую неделю.\\\"\",\"slug\":\"episodic-series-characters-must-be-compelling-enough-to-sust\"},{\"title\":\"Пилот Better Call Saul: разорванный чек как сломанный компас\",\"tags\":\"show-example pilot character pilot-structure\",\"excerpt\":\"Пилот Better Call Saul использует сцену, где Джимми рвёт чек брата, чтобы сразу показать его сломанный моральный компас. Один жест — и зритель видит главное про героя, без объяснений.\",\"slug\":\"better-call-saul-pilot-uses-jimmy-ripping-up-his-brothers-ch\"},{\"title\":\"Пилот Breaking Bad доказал concept делом\",\"tags\":\"show-example principle pilot concept-testing story-engine\",\"excerpt\":\"«Пилот Breaking Bad настолько силён во многом потому, что Гиллиган не просто убедил нас в логике замысла Уолтера — он пошёл дальше и показал, как тот впервые воплощает этот замысел в жизнь, со всем см\",\"slug\":\"breaking-bad-pilot-proved-its-series-concept-by-dramatizing\"},{\"title\":\"Пилот Breaking Bad: Уолт — неудачник на дне\",\"tags\":\"show-example pilot empathy protagonist\",\"excerpt\":\"\\\"• Он застрял. Пятидесятилетие отмечает завтраком с беконом, выложенным в форме «50» на яичнице. Хуже того — бекон из сои: следит за холестерином. Позже жена дарит ему самый бесстрастный секс на свете\",\"slug\":\"breaking-bad-pilot-establishes-walt-as-underdog-dying-chemis\"},{\"title\":\"Пилот I May Destroy You: ловушка из мелочей\",\"tags\":\"show-example pilot pilot-structure\",\"excerpt\":\"«\\\"Eyes Eyes Eyes Eyes\\\" — пилотный эпизод сериала — это плавное сползание к трагедии через цепочку решений, каждое из которых само по себе обходится максимум головной болью. Именно безобидность этих ре\",\"slug\":\"i-may-destroy-you-pilot-uses-a-chain-of-innocuous-decisions\"},{\"title\":\"Пилот Mandalorian скрывает сериальную завязку\",\"tags\":\"show-example pilot-type serialization pilot-structure\",\"excerpt\":\"\\\"The Mandalorian — вестерн про безымянного антигероя-охотника за головами. Первый эпизод — «почти» non-premise pilot: очередная опасная работа охотника, привкус «задания недели», баланс между сквозным\",\"slug\":\"the-mandalorian-pilot-is-almost-a-non-premise-pilot-whose-fi\"},{\"title\":\"Пилот SVU: все ансамблевые персонажи — в Set-Up\",\"tags\":\"show-example principle ensemble pilot-structure pilot\",\"excerpt\":\"\\\"SET-UP (2–6): В сцене «на ходу» мы получаем быструю экскурсию по «офису». Знакомимся со всеми копами, которые войдут в шоу, чувствуем их характеры и манеры. В этом эпизоде им уделено мало времени — н\",\"slug\":\"law-order-svu-pilot-introduces-every-recurring-ensemble-char\"},{\"title\":\"Пилот The Sopranos: жертва тревоги делает убийцу своим\",\"tags\":\"principle show-example empathy pilot protagonist\",\"excerpt\":\"\\\"Рассмотрим праотца всех антигероев — Тони Сопрано. Как Дэвид Чейз, создатель The Sopranos, придумал сделать закоренелого преступника, который в одном из ранних эпизодов убьёт человека голыми руками, \",\"slug\":\"the-sopranos-pilot-establishes-tony-as-victim-of-his-own-anx\"},{\"title\":\"Пилот Transparent: саспенс без конфликта\",\"tags\":\"show-example principle pilot mystery-suspense subtext\",\"excerpt\":\"«Как видно, здесь нет никакого управления конфликтом: никаких препятствий, драк или споров между персонажами. Всё решается куда тоньше — через управление информацией: тайна, неожиданность и драматичес\",\"slug\":\"transparent-pilot-generates-suspense-purely-through-managing\"},{\"title\":\"Пилот без процедурала: финал должен цеплять\",\"tags\":\"principle tactical-rule end-hook pilot serialization\",\"excerpt\":\"\\\"Если речь не о процедурале и не о ситкоме, в конце pilot нужен hook — потому что этот эпизод первый из многих. Он должен продать всю остальную серию.\\\"\",\"slug\":\"non-procedural-non-sitcom-pilots-need-an-end-of-episode-hook\"},{\"title\":\"Пилот требует запаха перемен в протагонисте\",\"tags\":\"definition principle show-example pilot character-arc pilot-goals\",\"excerpt\":\"«Запах перемен — вот что делает pilot особенным. Это секретный ингредиент, который придаёт пилоту катарсис, тогда как обычный четвёртый эпизод намеренно оставляет тебя ни с чем. В pilot The Marvelous \",\"slug\":\"pilot-episodes-require-a-whiff-of-change-in-the-protagonist\"},{\"title\":\"Письмо — в тело письма, не вложением\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если пишете по email — вставляйте текст прямо в сообщение: многие получатели не открывают вложения из-за риска вирусов.\\\"\",\"slug\":\"put-your-letter-in-the-email-message-body-not-as-an-attachme\"},{\"title\":\"Питч Dead to Me родился на встрече без подготовки\",\"tags\":\"practice-story premise logline\",\"excerpt\":\"«Я пошла на встречу только потому, что они искали шоу для двух женщин. И вдруг — как будто из воздуха — я говорю: \\\"Одна из них вдова, она знакомится со второй на группе поддержки для скорбящих, только\",\"slug\":\"liz-feldmans-dead-to-me-pitch-emerged-spontaneously-in-a-mee\"},{\"title\":\"Питч Wedding Crashers: жанровый зачин и what-if hook\",\"tags\":\"example hook comparables genre\",\"excerpt\":\"\\\"Я всегда обожал романтические комедии — особенно такие, как Hitch, Working Girl или There's Something About Mary, где герой вынужден врать о том, кто он есть на самом деле, лишь бы получить желаемое.\",\"slug\":\"sample-pitch-for-wedding-crashers-using-fan-of-genre-opening\"},{\"title\":\"Питч без сценария убил два финансирования\",\"tags\":\"practice-story tactical-rule pilot-goals\",\"excerpt\":\"«Писательница написала два черновика. Второй всё ещё требовал доработки, она привлекла меня ещё на два. Прошёл год. Когда она вернулась к своим инвесторам с отполированным сценарием, один устал ждать \",\"slug\":\"pitching-without-a-finished-script-cost-a-writer-both-her-fi\"},{\"title\":\"Питч бьёт и в голову, и в сердце\",\"tags\":\"principle tactical-rule overview\",\"excerpt\":\"«Две главные цели любого TV питча: слушатель должен понять, что ему предлагают, — и что-то почувствовать. Питч обязан задействовать и разум, и эмоции. Интеллект должен схватить суть шоу, а чувства — о\",\"slug\":\"a-tv-pitch-must-appeal-to-both-the-buyers-intellect-and-emot\"},{\"title\":\"Питч делает автор, не продюсер\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Начнём с вопроса «кто?». В Голливуде питч делает автор. Это правило действовало в кино ещё до появления телевидения — и в TV так было всегда. Питчует автор. Не продюсер, не кто-либо ещё. Автор смотри\",\"slug\":\"the-writer-delivers-the-tv-pitch-not-the-producer\"},{\"title\":\"Питч длится 15–25 минут\",\"tags\":\"tactical-rule definition format overview\",\"excerpt\":\"\\\"Автор делает питч устно, лично, «в комнате» на network. Большинство TV-питчей длятся от 15 до 25 минут (хотя питчи для проектов straight-to-series могут быть значительно длиннее).\\\"\",\"slug\":\"most-tv-pitches-run-between-15-and-25-minutes\"},{\"title\":\"Питч должен вызывать эмоцию\",\"tags\":\"principle tactical-rule tone hook\",\"excerpt\":\"\\\"Следующая ключевая цель любого TV-питча — и, пожалуй, самая важная — вызвать у слушателя эмоциональный отклик. Задеть чувства. Заставить что-то почувствовать. Питчишь комедию — рассмеши. Смех — это ф\",\"slug\":\"a-tv-pitch-must-arouse-emotion-in-the-listener\"},{\"title\":\"Питч должен длиться около 20 минут\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Обязательно хронометрируй питч — 20 минут оптимальный хронометраж. Держи его максимально плотным.\\\"\",\"slug\":\"time-the-pitch-to-roughly-20-minutes\"},{\"title\":\"Питч за 10 секунд: Герой, Желание, Конфликт + уникальное\",\"tags\":\"tactical-rule logline premise\",\"excerpt\":\"\\\"Возьмите тот же список из десяти ключевых элементов истории и сократите его до трёх-четырёх самых сильных. Как правило, это Герой, Желание и Конфликт — плюс один дополнительный элемент, который делае\",\"slug\":\"a-10-second-pitch-should-pare-ten-story-elements-down-to-her\"},{\"title\":\"Питч закончен — уходи сразу\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"И вдруг всё. Разговор обрывается. Не задерживайся. Чем бы всё ни кончилось — закончи и уходи.\\\"\",\"slug\":\"dont-overstay-your-welcome-in-a-pitch-meeting-finish-and-get\"},{\"title\":\"Питч не читают — смотрят в глаза\",\"tags\":\"tactical-rule pitfall overview\",\"excerpt\":\"\\\"Никогда, ни при каких обстоятельствах не читайте питч по бумаге. На этом этапе нет ничего ценнее зрительного контакта.\\\"\",\"slug\":\"never-read-the-pitch-aloud-maintain-eye-contact-instead\"},{\"title\":\"Питч нельзя читать с листа\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"«Питч нельзя читать с листа.»\",\"slug\":\"never-read-your-pitch\"},{\"title\":\"Питч нельзя читать — даже по телефону\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"НЕ ЧИТАЙТЕ ПИТЧ! Заметки — допустимы. Читать по бумажке — нет. Вы не сможете смотреть покупателю в глаза, создастся впечатление, что вы не знаете собственную историю, и весь азарт испарится. Питч над\",\"slug\":\"never-read-your-pitch-from-a-transcript-even-on-the-phone\"},{\"title\":\"Питч после обеда: покупатель засыпает\",\"tags\":\"pitfall practice-story\",\"excerpt\":\"«Сценарист Шелли Кац рассказывает: \\\"Встреча в половине третьего с тучным, знаменитым американским продюсером. Он вошёл весёлый, румяный — я выкладывалась по полной. Обычных 'у нас уже есть фильм про ю\",\"slug\":\"post-lunch-pitch-meetings-risk-the-buyer-falling-asleep\"},{\"title\":\"Питч работает, когда за ним стоит текст\",\"tags\":\"principle pitch\",\"excerpt\":\"\\\"Лучший питч — тот, что заканчивается сделкой. А сделка случится только тогда, когда за питчем стоит отличный сценарий или отличный роман.\\\"\",\"slug\":\"a-pitch-only-succeeds-when-backed-by-a-great-screenplay-or-n\"},{\"title\":\"Питч решается в первых двух фразах\",\"tags\":\"definition tactical-rule logline premise hook\",\"excerpt\":\"\\\"Самая важная часть питча — первое предложение, максимум два. В деловом мире это называют «питч в лифте»: встретил нужного человека в лифте — успей убедить до его этажа. В индустрии то же самое называ\",\"slug\":\"the-most-important-part-of-a-pitch-is-the-first-sentence-or\"},{\"title\":\"Питч с несколькими протагонистами: найди общее\",\"tags\":\"tactical-rule show-example ensemble theme logline\",\"excerpt\":\"\\\"Задача здесь очень похожа на питч эпизодического сериала. Нужно отступить и увидеть, что объединяет все эти цели и сюжетные линии. Почему они вообще оказались в одной истории? Что-то их неизбежно свя\",\"slug\":\"pitch-multi-protagonist-stories-by-identifying-what-unites-a\"},{\"title\":\"Питч с первых секунд раскрывает бюджет и рынок\",\"tags\":\"principle pitfall logline concept-testing hook\",\"excerpt\":\"\\\"Слабость большинства питчей — в том, что они не связывают concept с рынком. Независимо от длины питча, слушатель должен почти сразу понять уровень бюджета, маркетинговые составляющие (каст, жанр, hoo\",\"slug\":\"pitches-must-let-the-listener-ascertain-budget-marketing-ele\"},{\"title\":\"Питч сериала не требует визуальной поддержки\",\"tags\":\"tactical-rule visual-style\",\"excerpt\":\"\\\"Хороший питч игрового проекта, как правило, не требует визуальной поддержки.\\\"\",\"slug\":\"fiction-pitches-normally-need-no-visual-back-up\"},{\"title\":\"Питч сериала состоит из восьми разделов\",\"tags\":\"definition tactical-rule overview format\",\"excerpt\":\"\\\"Телевизионный питч устроен сложнее. Вот разделы типичного TV-питча: 1. Личный путь автора к материалу (объясню в главе 7) 2. Concept сериала 3. Мир сериала 4. Описание персонажей 5. История pilot'а 6\",\"slug\":\"a-tv-pitch-has-eight-standard-sections\"},{\"title\":\"Питч строит карьеру, а не разовую сделку\",\"tags\":\"principle practice-story overview\",\"excerpt\":\"\\\"Питч — это не на один раз. Питч — это отношения, которые могут длиться десятилетиями.\\\"\",\"slug\":\"pitching-builds-decades-long-relationships-not-one-off-sales\"},{\"title\":\"Питч — диалог, а скрипт — приговор без апелляции\",\"tags\":\"definition principle practice-story overview\",\"excerpt\":\"\\\"Одно не меняется: студии и продюсеры любят питчи за их гибкость — они открывают очевидные возможности для совместной работы. Питчуешь медицинскую драму... и вдруг это уже адвокатское шоу. У тебя силь\",\"slug\":\"pitches-are-conversations-that-invite-buyers-to-collaborate\"},{\"title\":\"Питч — про нужды покупателя, не продавца\",\"tags\":\"principle practice-story\",\"excerpt\":\"\\\"Если бы питчеры сами были покупателями, они бы знали, как строить питч. Авторы понимают свои нужды: продать сценарий, книгу, фильм. Но им нужно знать, чего хочет покупатель, и говорить именно об этом\",\"slug\":\"pitchers-must-address-the-buyers-needs-not-their-own\"},{\"title\":\"Питч: как можно меньше, не больше\",\"tags\":\"principle overview\",\"excerpt\":\"«Дело не в том, сколько вы можете втиснуть — а в том, сколько можно себе позволить выбросить.»\",\"slug\":\"a-pitch-should-convey-as-little-as-possible-not-as-much-as-p\"},{\"title\":\"Питч: сначала общее, потом детали\",\"tags\":\"tactical-rule overview specificity\",\"excerpt\":\"\\\"Самая частая слабость питчей — размытость. Хороший питч начинается с общего и движется к частному. Дайте мне понять, что за кино вы предлагаете («экшн-приключение, действие в Индии»), — и только пото\",\"slug\":\"pitch-should-start-general-and-get-more-specific\"},{\"title\":\"Питч-документ — инструмент продажи, не план рума\",\"tags\":\"definition principle overview\",\"excerpt\":\"\\\"Важно помнить: питч-документы, series bibles и treatment'ы — исключительно инструменты продажи (то есть доказательство жизнеспособности идеи), а не дорожные карты, которым writers' room обязан строго\",\"slug\":\"pitch-documents-serve-as-selling-tools-not-writers-room-road\"},{\"title\":\"Питч-документ — это «облегчённая библия»\",\"tags\":\"definition tactical-rule overview format\",\"excerpt\":\"\\\"Питч-документ — это «библия-лайт». Он содержит много той же информации, что и библия шоу, но рассчитан на совершенно другую аудиторию. Библии шоу нужны людям, работающим над уже запущенными проектами\",\"slug\":\"a-pitch-document-is-bible-lite-similar-content-to-a-show-bib\"},{\"title\":\"Питч-документ: 5–10 страниц, идеал — 8, не больше 10\",\"tags\":\"definition tactical-rule format\",\"excerpt\":\"\\\"Питч-документ должен занимать 5–10 страниц. Я обычно целюсь в 8. Больше 10 — нельзя.\\\"\",\"slug\":\"pitch-documents-should-be-510-pages-ideally-8-never-over-10\"},{\"title\":\"Питчи нон-фикшна — через людей, не шаги\",\"tags\":\"principle tactical-rule\",\"excerpt\":\"\\\"Если ваша книга — инструкция или самопомощь, продвигайте рукопись или proposal через тех, кому она поможет, а не через конкретные шаги к богатству, здоровью, счастью, красоте или идеальному удару по \",\"slug\":\"pitch-instructional-books-through-the-people-they-will-benef\"},{\"title\":\"Питчи по художественным — только со скриптом на руках\",\"tags\":\"tactical-rule pilot\",\"excerpt\":\"\\\"Питчи по художественным историям байерам — только когда у тебя готов отполированный скрипт, который можно сразу отправить.\\\"\",\"slug\":\"pitch-fiction-to-buyers-only-when-a-polished-script-is-ready\"},{\"title\":\"Питчи: 2 эпизода вперёд, ещё 6 loglines — наготове\",\"tags\":\"tactical-rule episode-loglines\",\"excerpt\":\"\\\"Для этого вы питчуете один-два примера сразу, но должны держать наготове не менее шести loglines для следующих эпизодов — на случай, если спросят.\\\"\",\"slug\":\"pitch-one-or-two-episode-examples-up-front-and-have-at-least\"},{\"title\":\"Питчинг продюсеру — это питчинг себя\",\"tags\":\"principle tactical-rule pitch\",\"excerpt\":\"\\\"Когда питчишь продюсеру — питчишь себя. Продюсер покупает прежде всего тебя. Твою страсть к сценарию. Твою уверенность в нём. Твой голос.\\\"\",\"slug\":\"pitching-to-a-producer-is-pitching-yourself\"},{\"title\":\"Питчинг — всегда повод продать себя\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"КТО ВЫ Спросит она или нет — найдите способ продать себя.\\\"\",\"slug\":\"pitcher-must-seize-an-opportunity-to-sell-themselves-whether\"},{\"title\":\"Питчинг — это мастерство, стратегия и психология\",\"tags\":\"practice-story overview\",\"excerpt\":\"\\\"Хороший питчинг держится на трёх вещах: нужно уметь создать сильный питч, нужно знать, кому и когда питчить — и нужны психологические навыки, которые я называю Ментальной Игрой.\\\"\",\"slug\":\"pitching-well-requires-craft-skills-strategy-and-the-mental\"},{\"title\":\"Питчите ассистентам и ридерам — они читают первыми\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Не упускайте возможность выйти напрямую на ассистентов и ридеров в этих компаниях. Именно они обычно читают материал первыми. Убедите их взглянуть на ваш проект — и если он им понравится, боссы об эт\",\"slug\":\"consider-pitching-directly-to-assistants-and-readers-who-usu\"},{\"title\":\"Питчить не по профилю — значит выглядеть дилетантом\",\"tags\":\"principle tactical-rule comparables\",\"excerpt\":\"\\\"Прийти к продюсеру со сценарием или идеей документального фильма, которые он никогда в жизни не возьмёт, — это дилетантство. Так что делайте домашнюю работу.\\\"\",\"slug\":\"pitching-a-producer-a-project-they-would-never-consider-look\"},{\"title\":\"Повтор темы усиливает питч\",\"tags\":\"tactical-rule theme\",\"excerpt\":\"\\\"Питчующие боятся утомить слушателей повторами — но важные вещи вроде тем от повторения только выигрывают.\\\"\",\"slug\":\"repetition-of-themes-increases-pitch-impact\"},{\"title\":\"Погоня за всеми зрителями рождает «фильм ниоткуда»\",\"tags\":\"principle definition pitfall genre concept-testing\",\"excerpt\":\"\\\"Главная опасность попытки угодить всем — провалиться между двумя стульями: мультиплексом и арт-хаусом — и снять то, что один из руководителей Miramax назвал мне 'tweener movie'. Это не про возраст, а\",\"slug\":\"targeting-both-multiplex-and-art-house-audiences-risks-produ\"},{\"title\":\"Подтекст говорит то, что не произнесено\",\"tags\":\"definition principle subtext\",\"excerpt\":\"\\\"Подтекст даёт голос тому, что не сказано, но подразумевается. Он живёт в жестах, мимике, интонации и неловких паузах. Как бы блестяще вы ни писали диалог — не забывайте о глубокой силе молчания.\\\"\",\"slug\":\"subtext-gives-voice-to-what-is-not-spoken-but-implied\"},{\"title\":\"Подтекст нельзя выносить на сцену\",\"tags\":\"principle subtext\",\"excerpt\":\"\\\"Древние греки понимали это, Шекспир нас этому учил: пьеса разыгрывается на сцене, но выносит на неё лишь внешние слои — текст. Подтекст не должен показываться никогда. Знай Эдип, что убьёт отца и жен\",\"slug\":\"subtext-must-never-show-on-stage-drama-works-by-exciting-ima\"},{\"title\":\"Подтекст — это невысказанное, читаемое в жесте и интонации\",\"tags\":\"definition subtext\",\"excerpt\":\"\\\"Подтекст — это невысказанное, которое передаётся интонацией, мимикой и жестом. Мы все знаем: то, что люди говорят, и то, что они имеют в виду, нередко — полная противоположность.\\\"\",\"slug\":\"subtext-is-unspoken-communication-conveyed-through-intonatio\"},{\"title\":\"Покупатель отказал — не спорь\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если покупатель не хочет читать твой сценарий — не переубеждай его.\\\"\",\"slug\":\"do-not-argue-when-a-buyer-rejects-your-script\"},{\"title\":\"Полицейский, врач, юрист, детектив — конфликт по профессии\",\"tags\":\"principle definition genre story-engine\",\"excerpt\":\"\\\"Полицейские, врачи, юристы и частные детективы — это профессии, определяющие телевизионные жанры, способные давать надёжный, встроенный конфликт.\\\"\",\"slug\":\"cop-doctor-lawyer-and-pi-jobs-deliver-inherent-conflict-that\"},{\"title\":\"Получасовая драма вернулась после 60 лет забвения\",\"tags\":\"definition show-example format\",\"excerpt\":\"\\\"Получасовая драма дремала с 1960-х, и ни один network почти не развивал этот формат — вплоть до последних лет. Такие сериалы, как The Girlfriend Experience, Homecoming и Sorry for Your Loss вернули е\",\"slug\":\"half-hour-drama-format-has-been-rediscovered-in-recent-serie\"},{\"title\":\"Получасовой pilot делится на три акта\",\"tags\":\"tactical-rule act-structure pilot format\",\"excerpt\":\"\\\"Если у вас получасовое шоу — то же самое, только пишите три акта. Это немного условно. Но по опыту: три работают лучше, чем два. Хотя есть пространство для манёвра. Пока что берите три.\\\"\",\"slug\":\"break-a-half-hour-pilot-into-three-acts\"},{\"title\":\"Получасовой: ~14 карточек, разбитых 4-8/3-6/3-6\",\"tags\":\"tactical-rule act-structure format\",\"excerpt\":\"\\\"В получасовом эпизоде около 14 карточек. КАРТОЧЕК НА АКТ В ПОЛУЧАСОВОМ АКТ 1: 4–8 карточек АКТ 2: 3–6 карточек АКТ 3: 3–6 карточек\\\"\",\"slug\":\"half-hour-episodes-use-roughly-14-cards-split-4-8-3-6-3-6-ac\"},{\"title\":\"Получил «да» — закрой рот\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Положительный ответ — значит, вы выиграли. Всё, хватит. Вы добились своего. Теперь уходите. Самая частая ошибка сценаристов в этот момент — продолжать продавать уже проданное. Вы хотели, чтобы байер \",\"slug\":\"stop-selling-once-the-buyer-says-yes\"},{\"title\":\"Попросили скрипт — тяни максимум неделю-две\",\"tags\":\"tactical-rule pilot\",\"excerpt\":\"\\\"Итак, если вы слышите заветное «пришлите скрипт» — будьте готовы отдать его быстро. В лучшем случае можно выиграть неделю-другую, сославшись на финальную правку. Но не дольше.\\\"\",\"slug\":\"when-asked-for-the-script-stall-at-most-a-week-or-two-for-fi\"},{\"title\":\"Попросили финал — рассказывай, даже теряя интригу\",\"tags\":\"tactical-rule pitfall pitch-meeting\",\"excerpt\":\"\\\"Да, на все эти вопросы. Но если она попросила конец — вы обязаны его раскрыть. Финал вашей истории, как мы видели, придаёт смысл всему целому. Не зная, чем заканчивается, она не сможет по-настоящему \",\"slug\":\"when-an-executive-asks-for-the-ending-reveal-it-even-at-the\"},{\"title\":\"После logline — молчи: тишина давит сильнее слов\",\"tags\":\"tactical-rule logline\",\"excerpt\":\"\\\"Молчание пугает — и большинство людей готовы говорить что угодно, лишь бы его заполнить. Вот почему так важно остановиться сразу после logline. Дай слушателю почувствовать давление паузы. Он обязател\",\"slug\":\"stop-talking-after-the-logline-pitch-and-let-silence-pressur\"},{\"title\":\"После голоса важнее всего — ясность\",\"tags\":\"principle tactical-rule overview\",\"excerpt\":\"\\\"За уникальным голосом следует ясность — второй важнейший принцип любого TV pitch. Питчи обязаны быть понятными. Автор должен найти слова, фразы, идеи и структуру, чтобы объяснить, что за сериал он пр\",\"slug\":\"clarity-is-the-second-most-important-goal-of-a-tv-pitch-afte\"},{\"title\":\"После письма звони через пару дней\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если вы уже отправили запрос письмом или по электронной почте — позвоните через пару дней. Попросите к телефону именно того человека, которому писали, и скажите, что он должен был ждать вашего звонка\",\"slug\":\"follow-up-a-query-letter-with-a-phone-call-a-few-days-later\"},{\"title\":\"После питч-феста — высылай, не вручай\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Никогда не пытайтесь вручить рукопись прямо на питч-фесте или конференции. Даже если человек согласился прочесть ваш book proposal или сценарий, он не хочет таскать его с собой весь день. Лучше отпра\",\"slug\":\"
