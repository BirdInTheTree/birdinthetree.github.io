те сезон 1 крупными мазками. Ключевое слово — КРУПНЫМИ. Ещё. Раз. КРУПНЫМИ! Вам нужно всего 1–2 страницы арки сезона: главные поворотные точки и где оказываются пер\",\"slug\":\"sketch-season-1-at-high-level-on-1-2-pages-before-going-deep\"},{\"title\":\"Сезон меняет персонажа, но не лечит его\",\"tags\":\"principle tactical-rule character-arc season-arc\",\"excerpt\":\"«Фокус в том, чтобы дать персонажу какой-то сдвиг за сезон — и всё же оставить ему достаточно изъянов и внутренних демонов на будущее.»\",\"slug\":\"a-season-should-deliver-some-character-change-while-preservi\"},{\"title\":\"Секреты в pilot добавляют ставки и напряжение\",\"tags\":\"principle practice-story pilot hook\",\"excerpt\":\"\\\"Стоит повторить: секреты в пилотах работают мощно. В сериале они тоже помогают — но именно на этапе разработки pilot секрет способен добавить целый пласт напряжения и ставок: драматических или комеди\",\"slug\":\"secrets-in-pilots-add-a-powerful-layer-of-jeopardy-and-stake\"},{\"title\":\"Семейные истории универсальны — среда нет\",\"tags\":\"principle theme relationships\",\"excerpt\":\"\\\"Современный зритель, возможно, не поймёт, каково это — быть агентом КГБ в 1980-х, отмывать деньги для картеля, носить корону или тренировать футбольную команду. Но что такое семья — знает каждый. В э\",\"slug\":\"family-stories-are-universal-even-when-the-specific-milieu-i\"},{\"title\":\"Сериал vs мини-сериал: одна история на эпизоды\",\"tags\":\"definition principle example format serialization\",\"excerpt\":\"\\\"Есть два вида серий. Первый — одна история, разбитая на части; второй — в каждом эпизоде своя история. СЕРИАЛ / МИНИ-СЕРИАЛ В Великобритании серию с единой историей называют Serial, в США — Mini-Seri\",\"slug\":\"a-serial-uk-or-mini-series-us-is-a-single-story-broken-into\"},{\"title\":\"Сериал ведёт сюжет через эпизоды и сезоны\",\"tags\":\"definition show-example serialization format\",\"excerpt\":\"\\\"Сериалы строятся на сложных сюжетах, которые тянутся через несколько эпизодов или даже сезонов. Многие используют прямую стыковку (direct pickup, DPU): новый эпизод начинается ровно там, где оборвалс\",\"slug\":\"serial-dramas-carry-storylines-across-multiple-episodes-or-s\"},{\"title\":\"Сериал знает: люди не меняются\",\"tags\":\"principle character-arc serialization\",\"excerpt\":\"\\\"На первом же занятии в киношколе нам объяснили: протагонист фильма обязан измениться за время действия. Рад сказать, что этот канон давно сломан — но именно здесь проходит одна из главных границ межд\",\"slug\":\"tv-series-differ-from-movies-by-recognizing-that-people-do-n\"},{\"title\":\"Сериал раскрывает сюжет слой за слоем лучше всех\",\"tags\":\"principle serialization mystery-suspense pacing\",\"excerpt\":\"\\\"Или, как однажды сказал великий автор детективов и сценарист/producer Уолтер Мосли: «Сюжет — это откровение». Постепенно разворачивать сюжет — всё равно что снимать слои с луковицы, и эпизодический с\",\"slug\":\"episodic-tv-unravels-plot-gradually-like-peeling-an-onion-be\"},{\"title\":\"Сериал растягивает сюжет до финала\",\"tags\":\"definition serialization format\",\"excerpt\":\"\\\"Сериал (или открытая серия) Определение: в сериалах сюжет разворачивается через множество эпизодов и сезонов без заранее заданного конца — вплоть до финала.\\\"\",\"slug\":\"serials-serialise-storylines-across-open-ended-episodes-and\"},{\"title\":\"Сериал требует сотни историй, фильм — одну\",\"tags\":\"definition principle format\",\"excerpt\":\"\\\"Фильму нужна одна великая история. Сериалу — много. Десятки или даже сотни.\\\"\",\"slug\":\"tv-series-require-many-stories-where-movies-require-one\"},{\"title\":\"Сериал — движок вопросов, а не ответов\",\"tags\":\"principle definition story-engine\",\"excerpt\":\"«Сериал — не история, которая даёт ответы. Это движок, который порождает вопросы.»\",\"slug\":\"a-series-is-a-story-engine-that-generates-questions-not-a-st\"},{\"title\":\"Сериал — не история, а машина историй\",\"tags\":\"principle definition story-engine logline serialization\",\"excerpt\":\"\\\"Logline описывает историю. Но сериал — не история, а машина историй. И если ваш сериал не из тех жёстко сериализованных, что напоминают «растянутое кино», у него не будет зафиксированной Story DNA.\\\"\",\"slug\":\"shows-are-story-machines-not-stories\"},{\"title\":\"Сериал — отношения, а не интрижка\",\"tags\":\"principle definition serialization story-engine\",\"excerpt\":\"\\\"Кино — это интрижка... Сериал — это отношения. А любые отношения должны выдержать испытание временем. Нельзя строить на ярком огне, который гаснет к третьему эпизоду или к концу первого сезона.\\\"\",\"slug\":\"tv-shows-must-be-built-to-last-like-relationships-not-flings\"},{\"title\":\"Сериальная комедия на network TV — новый тренд\",\"tags\":\"show-example serialization genre format\",\"excerpt\":\"\\\"Сериальные комедии на network TV — явление новое. The Good Place и Last Man on Earth умудряются рассказывать истории с неожиданными поворотами — из тех, что смотришь запоем, — и при этом сохраняют лё\",\"slug\":\"the-good-place-and-last-man-on-earth-are-examples-of-the-new\"},{\"title\":\"Сериальный bible: 8–15 логлайнов эпизодов\",\"tags\":\"tactical-rule definition episode-loglines format serialization\",\"excerpt\":\"\\\"Для сериалов мы обычно даём восемь-пятнадцать логлайнов эпизодов. Для мини-сериала или ограниченного сериала их может быть всего два — но тогда, скорее всего, потребуются более подробные синопсисы.\\\"\",\"slug\":\"serial-bibles-usually-contain-eight-to-fifteen-episode-logli\"},{\"title\":\"Сериальный нарратив растягивает историю на эпизоды\",\"tags\":\"definition serialization episode-pattern\",\"excerpt\":\"\\\"Один из структурных приёмов, который прайм-таймовые мыльные оперы позаимствовали у дневных, — «сериальный нарратив»: истории, разворачивающиеся на протяжении нескольких эпизодов или даже сезонов. Бол\",\"slug\":\"serialized-storytelling-tells-stories-across-multiple-episod\"},{\"title\":\"Сессия заметок: headlines и постраничные правки\",\"tags\":\"definition tactical-rule overview\",\"excerpt\":\"\\\"Как правило, сессия заметок делится на два больших раздела: «общие замечания» (headlines) и «постраничные правки». Общие замечания касаются всего сценария или большей его части: «Тональность местами \",\"slug\":\"notes-sessions-split-into-headlines-and-page-notes\"},{\"title\":\"Сжимай материал, а не растягивай\",\"tags\":\"principle tactical-rule format pacing\",\"excerpt\":\"\\\"Смотри на свой материал и сжимай его, а не растягивай — разве что он требует пространства ради по-настоящему сложного персонажа\\\"\",\"slug\":\"compress-your-content-rather-than-extend-it-unless-complex-c\"},{\"title\":\"Сильные истории исследуют пирамиду Маслоу по вертикали\",\"tags\":\"principle character-arc theme\",\"excerpt\":\"\\\"Сильные истории исследуют пирамиду по вертикали — находят материал почти в каждом слое.\\\"\",\"slug\":\"great-stories-tend-to-explore-maslows-pyramid-vertically-fin\"},{\"title\":\"Сильные препятствия рождают сильных героев\",\"tags\":\"principle pitfall protagonist character-arc\",\"excerpt\":\"\\\"Сделай препятствия на пути бедолаги-героя нестерпимо тяжёлыми. У этих пыток должны быть слои. Лазанья из агонии! Препятствия проверяют героя физически, интеллектуально, духовно. Доведи его до некраси\",\"slug\":\"stronger-obstacles-produce-stronger-heroes\"},{\"title\":\"Сильный pilot задаёт тему сериала — явно или молча\",\"tags\":\"principle pilot theme\",\"excerpt\":\"\\\"По моим наблюдениям, сильные TV pilot'ы, как правило, задают центральную тему всего сериала — явно или молча, прямым текстом или намёком.\\\"\",\"slug\":\"great-tv-pilots-establish-a-strong-central-theme-for-the-ser\"},{\"title\":\"Сильный pitch не нуждается в визуальных опорах\",\"tags\":\"principle tactical-rule pitfall visual-style\",\"excerpt\":\"\\\"Хороший pitch, как правило, не требует визуального подкрепления. Особенно в художественном кино. Задача автора — словами создавать историю и персонажей в воображении читателя. Трейлеры, арты, фотогра\",\"slug\":\"a-strong-fiction-pitch-should-not-rely-on-visual-aids\"},{\"title\":\"Сильный антагонист делает сериал. Слабый — ломает.\",\"tags\":\"principle show-example antagonist\",\"excerpt\":\"\\\"Один из важнейших персонажей — антагонист, особенно в сюжетно-ориентированном сериале. Антагонист нужен не всегда, но если он есть — сделай его сильным и запоминающимся. Даже харизматичным. Возьми Не\",\"slug\":\"a-great-antagonist-can-make-a-series-a-weak-one-can-break-it\"},{\"title\":\"Симпатичный протагонист упорно борется за лучшую жизнь\",\"tags\":\"principle protagonist empathy\",\"excerpt\":\"\\\"3. Они упорно борются за то, чтобы жизнь стала лучше. • Мечтатели — у них есть мечта, выход или план. • Неудачники — они то и дело падают лицом в грязь. Но встают и пробуют снова.\\\"\",\"slug\":\"one-trait-of-a-likable-protagonist-is-trying-very-hard-to-ma\"},{\"title\":\"Симпатичный протагонист — прежде всего живой\",\"tags\":\"principle protagonist empathy\",\"excerpt\":\"\\\"4. Они живые. • Смешные — будь то дар болтовни, как у Buffy the Vampire Slayer или Чендлера из Friends, или просто неотразимое обаяние, как у The Marvelous Mrs. Maisel, Lucifer или The New Girl. • Тр\",\"slug\":\"likable-protagonists-are-fun-funny-sweet-charming-sexy-or-ad\"},{\"title\":\"Синопсис pilot — 1–2 страницы, без деталей\",\"tags\":\"tactical-rule pilot pilot-structure\",\"excerpt\":\"\\\"Рассказывайте историю pilot так, будто пересказываете другу серию, которую он пропустил вчера вечером. Выдайте ему всё крутое. Всё захватывающее. Всё, от чего захочется смотреть ваше шоу. И ещё: поск\",\"slug\":\"keep-the-pilot-story-section-to-1-2-pages-in-broad-strokes\"},{\"title\":\"Синопсис до питча — на стол не класть\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Даже если вы не готовы оспаривать просьбу байера о синопсисе так, как я описал, — никогда не выкладывайте его на стол в начале питча. Он будет лежать между вами и байером, отвлекая внимание и мешая е\",\"slug\":\"never-place-your-synopsis-on-the-table-before-pitching\"},{\"title\":\"Синопсис: возьми с собой, но не предлагай\",\"tags\":\"tactical-rule author-opinion pitch-mechanics\",\"excerpt\":\"\\\"Вот мой совет. Подготовьте лучший, максимально сильный синопсис своей истории. Получите на него обратную связь — так же, как и на остальные материалы, — чтобы убедиться: он передаёт эмоцию истории ка\",\"slug\":\"hauge-advises-bringing-a-synopsis-to-conferences-but-not-off\"},{\"title\":\"Ситком умирает, когда герои начинают меняться\",\"tags\":\"principle definition characters character-arc genre\",\"excerpt\":\"\\\"Настоящий ситком держится на персонажах с изъяном — занудах, ревнивцах, лентяях. Мы видим их недостатки, но меняться не хотим: именно они нас и смешат. Стоит персонажу начать меняться — ситком кончае\",\"slug\":\"sitcom-characters-must-not-change-because-their-flaws-are-th\"},{\"title\":\"Скрытая выгода от провала губит питч\",\"tags\":\"practice-story\",\"excerpt\":\"«Однажды я питчил фильм, который очень хотел снять — история разворачивалась почти целиком ночью, в разгар зимы. Питч был сильный, но я чувствовал: продаю хуже, чем мог бы. Я остановился и разобрался,\",\"slug\":\"hidden-secondary-gains-can-sabotage-a-pitch-until-you-restru\"},{\"title\":\"Слабый питч сильной истории ценнее обратного\",\"tags\":\"principle author-opinion concept-testing\",\"excerpt\":\"\\\"Слабый питч великой истории куда ценнее блестящего питча посредственной. Даже если ты запинаешься, мямлишь, затягиваешь и говоришь не то — хорошие байеры разглядят за слабостью питча потенциал истори\",\"slug\":\"a-weak-pitch-of-a-great-story-beats-a-great-pitch-of-a-medio\"},{\"title\":\"Следи за актёрами, а не за планами\",\"tags\":\"practice-story principle characters\",\"excerpt\":\"«Можно строить сколько угодно планов, но надо смотреть, что делают актёры; надо смотреть на шоу, которое ты реально снимаешь, и ориентироваться на него — а не на грандиозные идеи, которые были до нача\",\"slug\":\"showrunners-must-take-cues-from-what-actors-actually-do-on-s\"},{\"title\":\"Слова, которые знаешь лучше всего, проверяй особо\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Перед отправкой прочитай письмо — и прочитай ещё раз. Ищи ошибки, пропущенные слова, опечатки. Ещё раз проверь имя адресата. Почему-то мы чаще всего ошибаемся именно в самых важных словах. Если ты эк\",\"slug\":\"proofread-query-letters-multiple-times-especially-the-words\"},{\"title\":\"Сложная структура «перемотки» оказалась лишней при монтаже\",\"tags\":\"practice-story show-example pacing act-structure\",\"excerpt\":\"«Мы придумали очень сложную структуру — с прецедентом из Breaking Bad, — по которой каждый раз, переходя к истории Майка, мы немного отматывали назад, чтобы дать понять: это происходит, но не в тот же\",\"slug\":\"better-call-saul-writers-over-engineered-a-timeline-rewind-s\"},{\"title\":\"Сломанный компас ведёт героя не туда\",\"tags\":\"definition character-arc protagonist\",\"excerpt\":\"\\\"СЛОМАННЫЙ КОМПАС Сломанный компас — навигатор, который указывает неверный путь, и герой одержимо следует за ним на протяжении всей своей духовной дороги. Сценарное мастерство — это психология персона\",\"slug\":\"the-broken-compass-is-the-wrong-way-gps-a-hero-obsessively-f\"},{\"title\":\"Смежники переходят в development боком\",\"tags\":\"tactical-rule practice-story\",\"excerpt\":\"\\\"Вторая стратегия — сначала утвердиться в другой профессии, а потом использовать её как трамплин для перехода в development. Обычно это выглядит так: человек устраивается в смежный отдел network, студ\",\"slug\":\"established-professionals-in-ancillary-fields-can-move-later\"},{\"title\":\"Смена движка на ходу отталкивает зрителей\",\"tags\":\"principle pitfall story-engine serialization\",\"excerpt\":\"\\\"Но по-настоящему переизобрести шоу после выхода в эфир крайне сложно и почти никогда не срабатывает. Если бросить движок, который определяет сериал, и заменить его другим — это рискует разрушить ожид\",\"slug\":\"replacing-a-series-defining-drive-after-launch-risks-alienat\"},{\"title\":\"Сначала выясни причину правки — потом отвечай\",\"tags\":\"tactical-rule concept-testing\",\"excerpt\":\"«Если покупатель говорит, что The Last Mickey Mantle выиграет с девочкой в главной роли, не отвечайте: \\\"Вы в своём уме? Девочки не собирают бейсбольные карточки!\\\" Лучше спросите: \\\"Вы думаете, это сдел\",\"slug\":\"probe-the-buyers-underlying-concern-before-responding-to-the\"},{\"title\":\"Сначала контакт — потом pitch\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Итак, вы наконец лицом к лицу — или гарнитура к гарнитуре — с вашим покупателем. Но прежде чем нырять в суть проекта, нужно выстроить отношения.\\\"\",\"slug\":\"establish-rapport-with-the-buyer-before-pitching-the-project\"},{\"title\":\"Сначала любовь семьи — потом пистолет\",\"tags\":\"principle tactical-rule show-example empathy protagonist\",\"excerpt\":\"\\\"Хитрый приём для такого персонажа — показать, как его любят другие герои. Road to Perdition и Munich — истории профессиональных убийц. Но каждый из них поначалу показан глубоко любимым в своей семье.\",\"slug\":\"showing-a-killer-hero-as-deeply-loved-by-his-family-before-r\"},{\"title\":\"Сначала определи крайние образы — начальный и финальный\",\"tags\":\"tactical-rule beat-sheet opening-image\",\"excerpt\":\"\\\"1. Сначала расставь крайние точки: начальный и финальный образы — реши, где герой стартует и где финиширует. Какой запах перемен ты хочешь уловить в финальном образе? Понять, куда хочешь прийти, — эт\",\"slug\":\"start-by-staking-your-opening-image-and-final-image-first\"},{\"title\":\"Сначала — старт и финиш сезона, потом всё остальное\",\"tags\":\"tactical-rule season-arc character-arc\",\"excerpt\":\"\\\"Первый и главный шаг в разработке первого сезона — вбить два гвоздя-ориентира. Где герой в начале? Где он в конце? Запиши. Заполни пропуск: В начале первого сезона мой герой , в конце — .\\\"\",\"slug\":\"plant-the-season-1-start-and-end-points-before-breaking-the\"},{\"title\":\"Со-протагонисты входят во 2-й акт в разное время\",\"tags\":\"principle act-structure storylines ensemble\",\"excerpt\":\"\\\"Даже если все со-протагонисты переживают одно и то же исходное событие, они начинают действовать не одновременно — и начало 2-го акта в каждой сюжетной линии наступает по-своему.\\\"\",\"slug\":\"co-protagonists-sharing-an-inciting-event-enter-dramatic-act\"},{\"title\":\"Социальные проблемы — не универсальные темы\",\"tags\":\"principle definition theme\",\"excerpt\":\"«Но это социальные и политические проблемы, а не универсальные темы.»\",\"slug\":\"social-or-political-issues-are-not-universal-themes\"},{\"title\":\"Спорить с продюсером в питче — нельзя\",\"tags\":\"tactical-rule pitfall concept-testing\",\"excerpt\":\"\\\"Чего нельзя делать ни в коем случае — так это возражать. Неважно, насколько она вас не поняла и насколько ужасными кажутся её идеи с первого взгляда. Возможно, в самих словах питча что-то спровоциров\",\"slug\":\"never-argue-back-when-a-producer-misunderstands-or-pushes-ba\"},{\"title\":\"Ссылаться на рекомендателя — только с его разрешения\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Предостережение: никогда не ссылайтесь на рекомендацию, если не получили явного согласия от того, кем прикрываетесь. Это нечестно, и в итоге поставит в неловкое положение всех участников — а то и раз\",\"slug\":\"never-claim-a-referral-without-explicit-permission-from-the\"},{\"title\":\"Ставки в ситкоме должны ощущаться как жизнь и смерть\",\"tags\":\"principle tone\",\"excerpt\":\"\\\"В большинстве live-action ситкомов и романтических драмедий ставки — не жизнь и не смерть. Но для персонажей они должны ощущаться именно так.\\\"\",\"slug\":\"sitcom-stakes-should-feel-like-life-and-death-to-the-charact\"},{\"title\":\"Ставки реальны, только если бездействие невозможно\",\"tags\":\"principle characters\",\"excerpt\":\"\\\"Чтобы проверить, достаточно ли высоки ставки, спросите себя: может ли ваш персонаж просто не делать ничего перед лицом кризиса? Если угроза потерять что-то важное не вынуждает его действовать — ставк\",\"slug\":\"stakes-are-sufficient-only-when-doing-nothing-is-not-a-viabl\"},{\"title\":\"Ставки — что теряет протагонист, не достигнув цели\",\"tags\":\"definition principle protagonist\",\"excerpt\":\"\\\"В терминах сторителлинга ставки — это то, что потеряет главный герой, если не достигнет своей цели.\\\"\",\"slug\":\"stakes-are-what-is-at-risk-if-the-protagonist-fails-to-achie\"},{\"title\":\"Стори-эдитор крупного агентства — путь к нужному агенту\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"В крупных агентствах есть стори-эдиторы — люди, которые управляют командой ридеров, но сами агентами не являются. Это отличные кандидаты для контакта: если им понравится ваш материал, они направят ег\",\"slug\":\"target-story-editors-at-large-agencies-because-they-route-ma\"},{\"title\":\"Страсть автора перебивает скепсис байера\",\"tags\":\"principle\",\"excerpt\":\"«Мне не раз говорили редакторы и агенты: \\\"История звучала совсем не коммерчески, но автор был так заряжён и убеждён, что я просто не мог не прочитать сам\\\". Если эта страсть переходит на страницу — име\",\"slug\":\"a-writers-contagious-passion-can-override-a-buyers-skepticis\"},{\"title\":\"Страсть к истории ≠ её продаваемость\",\"tags\":\"pitfall author-opinion concept-testing premise\",\"excerpt\":\"\\\"Ещё одна частая ошибка — путать страсть с хорошей историей. То, что это случилось с вами, не делает это интересным. То, что вы горите этим, не значит, что публика повалит на показы. Верить в то, что \",\"slug\":\"personal-passion-for-a-story-does-not-make-it-commercially-s\"},{\"title\":\"Страсть на питче — из тем шоу, не из актёрства\",\"tags\":\"principle theme\",\"excerpt\":\"\\\"Как автор показывает страсть? Снова — не «играя» её. А по-настоящему чувствуя. Откуда берётся это чувство? Хорошее место для поиска — темы сериала, о которых мы говорили раньше. О чём шоу на самом де\",\"slug\":\"pitch-passion-comes-from-connecting-to-the-shows-themes-not\"},{\"title\":\"Страсть не объявляют — её слышат в голосе\",\"tags\":\"principle tone\",\"excerpt\":\"«Страсть — это не то, что провозглашают на питче. Это отношение, которое сквозит в каждом слове. Страсть заразна: азарт, сосредоточённость, интонация — всё вместе должно передавать твою влюблённость в\",\"slug\":\"passion-is-conveyed-through-attitude-and-tone-not-announced\"},{\"title\":\"Стримеры дают больше свободы и сразу берут сериал\",\"tags\":\"definition principle format\",\"excerpt\":\"\\\"Онлайн-стримеры, как правило, заказывают сразу целый сериал и дают создателям куда больше творческой свободы, тогда как network'и и студии...\\\"\",\"slug\":\"online-streamers-commission-straight-to-series-and-grant-cre\"},{\"title\":\"Стриминг сжал сезоны до 6–10 эпизодов, подняв бюджеты\",\"tags\":\"principle episodes format\",\"excerpt\":\"\\\"Раньше сезон — это около двадцати двух еженедельных эпизодов по шестьдесят минут. Теперь на стриминге и премиальных каналах их в среднем шесть-десять, бюджет на эпизод вырос, и обычным networks стало\",\"slug\":\"streaming-and-premium-seasons-have-shrunk-from-twenty-two-ep\"},{\"title\":\"Структура питча подчиняется шоу, а не шаблону\",\"tags\":\"principle overview format\",\"excerpt\":\"\\\"Восемь разделов питча, описанных в этой главе и выстроенных в указанном порядке, — самый распространённый формат. Но, как и каждое шоу, каждый питч уникален. Лучшее правило: выясни, что работает имен\",\"slug\":\"structure-each-tv-pitch-to-fit-the-specific-show-rather-than\"},{\"title\":\"Структура — сюжет, персонаж, тема и конфликт\",\"tags\":\"definition act-structure\",\"excerpt\":\"\\\"Начнём с моего определения структуры как совокупности элементов: сюжета, персонажа и темы — и, что важнее всего, управления конфликтом и информацией.\\\"\",\"slug\":\"story-structure-combines-plot-character-theme-and-management\"},{\"title\":\"Студии удерживают позиции через брендовый IP\",\"tags\":\"principle\",\"excerpt\":\"\\\"Этот тренд вынуждает студии искать проекты, без которых network-байеры просто не обойдутся. Один из способов — использовать брендовый IP. Warner Bros. владеет DC Comics. Disney владеет Marvel, а его \",\"slug\":\"studios-leverage-owned-branded-ip-to-stay-relevant-as-networ\"},{\"title\":\"Студия владеет шоу вечно, network — лишь лицензирует\",\"tags\":\"definition\",\"excerpt\":\"\\\"Итак, повторим: студии делают шоу. И студии ими владеют. Network не владеет шоу — она только лицензирует сериал на ограниченный срок или ограниченное число показов. Шоу принадлежит студии — и принадл\",\"slug\":\"tv-studios-own-shows-forever-while-networks-only-license-the\"},{\"title\":\"Студия забирает минимум 65% прибыли шоу\",\"tags\":\"definition tactical-rule overview\",\"excerpt\":\"\\\"Студии, как правило, оставляют себе не менее 65% всей прибыли от шоу, а их бизнес-директора совместно с топ-менеджментом делят оставшиеся 35% между остальными участниками — теми, чья роль в процессе \",\"slug\":\"studios-retain-at-least-65-of-show-profits-and-negotiate-the\"},{\"title\":\"Сцена «спаси кошку» — герой заслуживает сочувствия\",\"tags\":\"principle definition empathy protagonist\",\"excerpt\":\"\\\"Коротко: сцена «спаси кошку» показывает, что за героя стоит переживать. Пусть он психопатичный убийца — но он нашёл время спасти маленького котёнка, а значит, где-то в его холодном расчётливом злодей\",\"slug\":\"a-save-the-cat-scene-shows-the-hero-is-worth-fighting-for\"},{\"title\":\"Сцена без эмоционального сдвига — под нож\",\"tags\":\"principle tactical-rule pitfall act-structure pacing\",\"excerpt\":\"\\\"В каждой сцене должен быть эмоциональный сдвиг. В каждой сцене что-то поставлено на карту. Сцены, которые ничего не меняют, — вырезать!\\\"\",\"slug\":\"every-scene-must-contain-an-emotional-change-or-it-is-cuttab\"},{\"title\":\"Сценарий пилота Pretty Little Liars дал продюсеру мурашки\",\"tags\":\"practice-story show-example pilot concept-testing hook\",\"excerpt\":\"\\\"Когда я впервые читал первый драфт пилота Pretty Little Liars, я понял: у нас что-то особенное. Сценарий Марлин Кинг описывал кульминацию одной из шести историй (да, в пилоте Pretty Little Liars было\",\"slug\":\"pretty-little-liars-pilot-script-gave-producer-chills-on-fir\"},{\"title\":\"Сюжетная история: проблема вне протагониста\",\"tags\":\"principle definition act-structure protagonist\",\"excerpt\":\"\\\"Если главная проблема в вашей истории приходит извне — от антагонистов или природы — значит, вы строите сюжетную историю. В этом случае в центре стоит главное драматическое действие, а значит, трёхак\",\"slug\":\"plot-led-stories-locate-the-main-problem-outside-the-protago\"},{\"title\":\"Сюжетные линии должны быть причинно связаны\",\"tags\":\"principle storylines serialization\",\"excerpt\":\"«Сюжетные линии должны быть связаны друг с другом — события в одной влияют на другие и вытекают из того, что уже произошло в остальных.»\",\"slug\":\"storylines-should-be-causally-connected-so-events-in-one-sto\"},{\"title\":\"Сюжетные линии меняются местами между эпизодами\",\"tags\":\"definition principle show-example storylines serialization episode-pattern\",\"excerpt\":\"\\\"В этом случае главный сюжет, A-Story эпизода, может стать подсюжетом в следующем, и так они чередуются через весь сериал: одна линия выходит на первый план на эпизод, несколько эпизодов или целый сез\",\"slug\":\"storylines-can-rotate-between-a-plot-and-subplot-across-epis\"},{\"title\":\"Сюрприз — внезапное раскрытие неожиданной информации\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"Сюрприз — это резкое открытие зрителю того, чего он не ожидал. В отличие от саспенса (зритель знает больше героя) и тайны (зритель знает меньше), сюрприз ставит зрителя и героя в один момент шока.\",\"slug\":\"surprise-is-the-sudden-reveal-of-information-the-audience-wa\"},{\"title\":\"Сюрприз — неожиданное раскрытие информации\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"\\\"сюрприз — это когда вы вдруг открываете зрителю то, чего он не ждал\\\"\",\"slug\":\"surprise-is-the-sudden-reveal-of-information-the-audience-di\"},{\"title\":\"ТВ даёт эмпатию по запросу\",\"tags\":\"principle empathy\",\"excerpt\":\"\\\"Стриминговые сериалы погружают нас в жизнь персонажей, которые нам близки, чьи проблемы нас задевают — и этим утоляют куда больше, чем просто жажду развлечения, бегства от реальности или способа убит\",\"slug\":\"television-provides-empathy-on-demand-by-dropping-viewers-in\"},{\"title\":\"Тайна антагониста — да, тайна угрозы — нет\",\"tags\":\"principle definition mystery-suspense antagonist\",\"excerpt\":\"\\\"Вот ключевое условие саспенса в триллере или хорроре: природа антагониста может оставаться загадкой, но реальность угрозы — никогда. Угроза должна быть известна — с драматической иронией (зрители зна\",\"slug\":\"suspense-allows-mystery-about-the-antagonists-nature-but-req\"},{\"title\":\"Тайна начинается с намёка на незнание\",\"tags\":\"definition principle mystery-suspense\",\"excerpt\":\"\\\"Тайна — это когда даёшь аудитории ровно столько, чтобы она поняла: что-то от неё скрыто. Не дашь этого маленького кусочка — она не знает, что чего-то не знает, и никакой тайны нет. Но стоит подбросит\",\"slug\":\"mystery-requires-giving-the-audience-enough-information-to-k\"},{\"title\":\"Тайна персонажа держит зрителя пять сезонов\",\"tags\":\"show-example principle characters mystery-suspense serialization\",\"excerpt\":\"\\\"Все персонажи должны оставаться загадкой — иначе, если раскрыть их слишком быстро, с ними не сделаешь сериал на пять лет. Зритель не должен устать. А для этого нужно беречь в каждом что-то непознанно\",\"slug\":\"le-bureau-keeps-characters-mysterious-so-a-five-year-series\"},{\"title\":\"Тайна — это знание о незнании\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"\\\"Тайна — это когда ты даёшь зрителю ровно столько информации, чтобы он понял: есть что-то, чего он не знает\\\"\",\"slug\":\"mystery-is-when-you-give-the-audience-enough-information-to\"},{\"title\":\"Телевидение даёт то, чего нет в жизни\",\"tags\":\"principle theme\",\"excerpt\":\"«Прежде всего и проще всего — мы приходим к телевизору за исполнением желаний. Мы хотим видеть фантастическую версию своей жизни, версию \\\"лучше\\\". Это, пожалуй, и есть самый точный смысл фразы: \\\"Задача\",\"slug\":\"viewers-turn-to-tv-for-wish-fulfillment\"},{\"title\":\"Тема 1-го сезона Shtisel — утрата и поиск матери\",\"tags\":\"show-example author-opinion theme season-arc\",\"excerpt\":\"«Если смотреть назад, можно сказать: тема первого сезона — утрата, тоска и поиск матери, а тема второго — скорее товарищество, включая отношения двоюродных братьев, Акивы и Либби Штисель (Михаэль Алон\",\"slug\":\"indursky-identifies-shtisel-season-1-theme-as-loss-yearning\"},{\"title\":\"Тема 2-го сезона Shtisel — товарищество и кузены\",\"tags\":\"show-example author-opinion theme season-arc relationships\",\"excerpt\":\"«Тема второго сезона — больше о товариществе, в том числе об отношениях кузенов, Аки́вы и Либби Штисель (Михаэль Алони и Хадас Ярон).»\",\"slug\":\"indursky-identifies-shtisel-season-2-theme-as-camaraderie-in\"},{\"title\":\"Тема в питче — аргумент за своевременность шоу\",\"tags\":\"principle theme\",\"excerpt\":\"\\\"Ещё одна причина, по которой в питче важно формулировать темы шоу: это шанс объяснить байеру, почему шоу особенно актуально именно сейчас. Большинство байеров хотят запускать в разработку проекты, ко\",\"slug\":\"stating-themes-in-the-pitch-is-the-writers-opportunity-to-de\"},{\"title\":\"Тема письма — суть, не пустышка\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Тема письма должна чётко говорить, о чём оно, — и включать название сценария, если уместно. Например: Предложение по сценарию полного метра: Sunset over Sarajevo Или: Представление интересов сценарис\",\"slug\":\"query-email-subject-lines-must-state-the-emails-purpose-not\"},{\"title\":\"Тема работает как подтекст, а не как реплика\",\"tags\":\"definition author-opinion theme subtext\",\"excerpt\":\"\\\"В сериале тему можно выразить через персонажа — в диалоге, в закадровом голосе или другом нарративном приёме (как колонка Кэрри Брэдшоу). Но для меня тема работает лучше всего как подтекст — на уровн\",\"slug\":\"landau-holds-that-theme-works-best-as-subliminal-subtext-rat\"},{\"title\":\"Тема — идея, живущая в действии\",\"tags\":\"definition author-opinion theme storylines\",\"excerpt\":\"\\\"Тема — это центральная идея, выраженная через действие. Она добавляет глубину и резонанс. В эпизодическом телевидении тема — клей, скрепляющий несколько, порой расходящихся, сюжетных линий. Тема — эт\",\"slug\":\"theme-is-a-central-idea-expressed-through-action\"},{\"title\":\"Тема — о чём история на человеческом уровне\",\"tags\":\"definition principle show-example theme\",\"excerpt\":\"\\\"Тема(ы) для исследования: есть история, а есть то, о чём она на самом деле — на универсально понятном, человеческом уровне. Это и есть тема. House of Cards — не просто шоу о политике, а о власти. Sch\",\"slug\":\"theme-is-what-the-story-is-really-about-on-a-universally-rel\"},{\"title\":\"Тема — самый спорный вопрос среди showrunner'ов\",\"tags\":\"principle theme\",\"excerpt\":\"\\\"Тема — самый спорный вопрос среди showrunner'ов. По моим наблюдениям, сильные TV-пилоты, как правило, задают мощную центральную тему для всего сериала — явно или негласно, прямым текстом или намёком.\",\"slug\":\"theme-is-the-most-polarizing-issue-among-showrunners\"},{\"title\":\"Тема-двигатель: 3 акта — только внутри линий\",\"tags\":\"definition principle act-structure theme storylines\",\"excerpt\":\"\\\"В истории, движимой темой, три акта не работают на уровне всей истории — нет единого «до, во время и после» главного действия или трансформации. Но каждую отдельную сюжетную линию вы всё равно можете\",\"slug\":\"theme-led-stories-cannot-use-the-3-act-structure-at-story-le\"},{\"title\":\"Тема-история ставит проблему в обществе — без решения\",\"tags\":\"definition principle theme story-engine\",\"excerpt\":\"\\\"Всё меняется ещё сильнее, когда главная проблема оказывается в самом обществе. Тогда она, как правило, неразрешима: это политика, философия или духовный вопрос. Это означает, что вы разрабатываете ис\",\"slug\":\"theme-led-stories-locate-the-main-problem-in-society-where-i\"},{\"title\":\"Тема-центричная история: конфликт живёт в обществе\",\"tags\":\"definition theme storylines\",\"excerpt\":\"\\\"Тема-центричная история: многопоточный нарратив, где главная проблема коренится в обществе. Эта проблема может быть духовной или философской. Нередко она неразрешима.\\\"\",\"slug\":\"theme-led-story-is-a-multi-stranded-narrative-whose-main-pro\"},{\"title\":\"Тему нельзя нащупывать до конца сезона\",\"tags\":\"principle pitfall theme\",\"excerpt\":\"\\\"В кино многие авторы окончательно нащупывают тему лишь на втором-третьем черновике (поднимаю руку, стыдно). Потом возвращаются и переписывают — усиливают тему, правят под новое понимание. Но мы говор\",\"slug\":\"in-tv-writing-you-cannot-wait-until-the-end-of-season-1-to-f\"},{\"title\":\"Тест 1: зритель следит за внутренней историей\",\"tags\":\"definition tactical-rule character-arc genre\",\"excerpt\":\"\\\"Есть два теста на то, правомерно ли назвать историю rite of passage. Первый: зрителя в первую очередь беспокоит внутренняя история. В детективе, например, сыщик может расти и меняться, но главное — п\",\"slug\":\"rite-of-passage-test-one-audience-cares-about-the-inner-stor\"},{\"title\":\"Тест-аудитория может навязать правки вопреки логике авторов\",\"tags\":\"practice-story concept-testing pilot\",\"excerpt\":\"«Зрители сказали, что сцена лишена смысла: бармен никогда не нальёт пиво 16-летней девушке, а очевидная неправдоподобность мешала им воспринимать остальной pilot. Нам же сцена казалась совершенно убед\",\"slug\":\"test-audience-misreading-a-scene-can-force-a-change-even-whe\"},{\"title\":\"Тестируй питч на «не тех» раньше нужных\",\"tags\":\"tactical-rule concept-testing\",\"excerpt\":\"\\\"Прежде чем идти к главным адресатам, проверь питч на тех, кто ими не является.\\\"\",\"slug\":\"test-your-pitch-on-people-who-arent-your-main-targets-before\"},{\"title\":\"Технические акт-брейки — место для рекламы\",\"tags\":\"principle definition act-structure format\",\"excerpt\":\"«В сценарии нужно чётко обозначать технические акт-брейки: именно туда вещатель поставит рекламу. Есть реклама в шоу — показывай акт-брейки в сценарии. Это их главная функция.»\",\"slug\":\"logistical-act-breaks-exist-to-mark-where-commercial-breaks\"},{\"title\":\"Тизер Black-ish — это sizzle reel для зрителя\",\"tags\":\"show-example principle pilot-structure cold-open pilot-goals\",\"excerpt\":\"\\\"Вступительный монтаж работает как sizzle reel — в лучшем смысле слова. Только вместо того чтобы продавать шоу руководителям студии, тизер продаёт его новому зрителю. За две минуты он берёт на себя вс\",\"slug\":\"black-ish-pilot-teaser-functions-as-a-sizzle-reel-that-sells\"},{\"title\":\"Тизер Breaking Bad: бешеная гонка по пустыне\",\"tags\":\"show-example definition cold-open pilot-structure\",\"excerpt\":\"\\\"Пилот Breaking Bad на AMC открывается безумной гонкой Уолтера Уайта через пустыню на фургоне, превращённом в мет-лабораторию, — это и есть тизер.\\\"\",\"slug\":\"breaking-bad-pilot-opens-with-walter-whites-rv-dash-through\"},{\"title\":\"Тизер не должен раскрывать главный вопрос\",\"tags\":\"pitfall show-example cold-open hook\",\"excerpt\":\"\\\"Следите за тем, чтобы тизер не давал ответа на драматический вопрос — иначе зритель потеряет вовлечённость на протяжении всей остальной истории. Поэтому, если тизер взят из финала, лучше выбрать моме\",\"slug\":\"teasers-should-avoid-answering-the-dramatic-question\"},{\"title\":\"Тизер пилота Rick \u0026 Morty — весь сериал в двух минутах\",\"tags\":\"show-example opening-image pilot-structure concept-testing\",\"excerpt\":\"\\\"ОТКРЫВАЮЩИЙ ОБРАЗ (1–2): За две мрачно-смешных минуты тизер даёт нам всё, что нужно знать о шоу. Морти вытаскивают из постели пьяным дядей Риком и тащат в двухместный космический корабль. Рик говорит\",\"slug\":\"rick-morty-pilot-teaser-functions-as-a-proof-of-concept-micr\"},{\"title\":\"Тизер-флэшбек спасает затянутый первый акт\",\"tags\":\"principle tactical-rule show-example cold-open pilot-structure pacing\",\"excerpt\":\"\\\"Тизер оправдан, если он решает драматическую задачу — особенно тизер-флэшбек в первом эпизоде. Когда первый акт выходит слишком длинным, когда на то, чтобы выстроить мир, познакомить зрителя с персон\",\"slug\":\"teaser-flashbacks-rescue-overlong-first-acts-by-opening-on-c\"},{\"title\":\"Тип + тайна = сюрприз в pitch\",\"tags\":\"principle show-example characters specificity\",\"excerpt\":\"\\\"Её тип — «школьная отличница». Но что отличало её от всех других школьных отличниц на ТВ — тайный роман с женихом старшей сестры. Тайна делала её уникальной и помогала очертить крайности характера. «\",\"slug\":\"pairing-a-characters-type-with-a-contradicting-secret-create\"},{\"title\":\"Тип персонажа — база; второй слой делает его уникальным\",\"tags\":\"tactical-rule show-example characters specificity\",\"excerpt\":\"\\\"Когда pitch даёт базовое описание персонажа и помещает его в определённый тип, второй слой добавляет детали, которые отличают его от других внутри того же типа. «Блондинок-красоток» в подростковых шо\",\"slug\":\"after-typing-a-character-add-a-second-layer-that-makes-them\"},{\"title\":\"Типичные слабости питчей породили эту книгу\",\"tags\":\"practice-story overview\",\"excerpt\":\"«Я начал работать с авторами один на один — помогал создавать питчи, которые цепляли покупателей. Чем больше авторов я тренировал, тем яснее видел: слабости плохих питчей одни и те же — попытка расска\",\"slug\":\"recurring-weaknesses-in-coached-pitches-generated-the-pitch\"},{\"title\":\"Титры Succession: дети Роя — невинные жертвы культа\",\"tags\":\"show-example principle empathy opening-image characters\",\"excerpt\":\"«Уже по вступительным титрам понятно: каждый отпрыск макиавеллиевского патриарха Логана Роя когда-то был невинным ребёнком — он родился в привилегиях так, как рождаются в секте. Глядя на них детьми, м\",\"slug\":\"successions-opening-credits-humanize-the-roy-children-by-sho\"},{\"title\":\"Тихая эмоция в питче слышна громче всего\",\"tags\":\"principle tactical-rule empathy tone\",\"excerpt\":\"\\\"Эмоции говорят громко, когда их передают тихо. Автору нужно позволить себе чувствовать то, что чувствуют его персонажи, — пока он о них рассказывает. Этого негромкого контакта достаточно. Если автор \",\"slug\":\"subtle-emotional-connection-in-pitching-is-enough-to-transmi\"},{\"title\":\"Тон network — производная от демографии аудитории\",\"tags\":\"principle definition tone format\",\"excerpt\":\"\\\"Тон, что важно, почти всегда определяется демографией. Тон Disney Channel рассчитан на детей 6–11 лет. Тональный диапазон сериалов Showtime нацелен на взрослых 18–49. Но тон — это не только возраст и\",\"slug\":\"network-tone-is-a-function-of-target-demographics-including\"},{\"title\":\"Тон питча должен совпадать с жанром\",\"tags\":\"tactical-rule principle tone genre\",\"excerpt\":\"\\\"Питч должен звучать в том же тоне, что и жанр сериала. Если это комедия — питч обязан быть смешным.\\\"\",\"slug\":\"pitch-tone-must-match-the-series-genre\"},{\"title\":\"Тон питча — через сравнение с другим шоу\",\"tags\":\"definition tactical-rule show-example tone comparables\",\"excerpt\":\"\\\"Многие сценаристы сравнивают тон питча с тоном уже вышедшего шоу. Тон Breaking Bad можно описать как тон The Sopranos, но с чуть большей долей чёрного юмора.\\\"\",\"slug\":\"pitch-tone-by-comparing-to-an-existing-shows-tone\"},{\"title\":\"Тон — часть программной стратегии network\",\"tags\":\"principle show-example tone genre format\",\"excerpt\":\"\\\"Ещё один способ, которым networks определяют себя, — тон. Disney Channel ставит женскую получасовую комедию Andi Mack, Showtime ставит женскую получасовую комедию SMILF. Оба network работают в схожих\",\"slug\":\"tone-is-a-defining-element-of-a-networks-programming-strateg\"},{\"title\":\"Тост на свадьбе в Mrs. Maisel — сразу и характер\",\"tags\":\"show-example pilot protagonist hook\",\"excerpt\":\"«Завершает свадебный тост репликой про креветки в яичных рулетиках. Какой скандал! Блестящее представление персонажа. Мы ставим её на сцену, даём свет и показываем ту самую болтовню и умение рассказыв\",\"slug\":\"mrs-maisels-wedding-speech-teaser-doubles-as-a-character-int\"},{\"title\":\"Точный вопрос вытащит сильный питч из слабого\",\"tags\":\"practice-story logline concept-testing\",\"excerpt\":\"\\\"Я проводил мастер-класс по питчингу. Одна из участниц пыталась питчить длинный запутанный фильм-авантюру — всё выходило сложно, туманно и ни о чём. Я задал ей несколько точных вопросов, и мы вместе н\",\"slug\":\"probing-questions-can-extract-a-strong-short-pitch-from-a-co\"},{\"title\":\"Трейлер питча: 90 секунд, максимум три минуты\",\"tags\":\"tactical-rule format\",\"excerpt\":\"\\\"Трейлер для питча документального фильма — как короткий фильм: он должен быть очень коротким. Полторы минуты — хорошо, три минуты — абсолютный максимум. Качество — эфирное, лучшее, на что вы способны\",\"slug\":\"documentary-pitch-trailers-should-run-90-seconds-and-never-e\"},{\"title\":\"Третье измерение истории — кто, что и когда знает\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"«Третье измерение — безусловно, наименее обсуждаемое, но зачастую самое важное — я называю управлением информацией. В его основе вопрос: \\\"Кто, что и когда знает?\\\" — и инструменты для работы с этим (та\",\"slug\":\"managing-information-is-the-third-story-dimension-based-on-w\"},{\"title\":\"Три акта — про формат, не про структуру\",\"tags\":\"definition principle act-structure\",\"excerpt\":\"\\\"Деление на три логистических акта ничем не оправдано — это про формат, не про структуру. Если история выстроена грамотно, под ней всегда обнаружится настоящая драматическая конструкция.\\\"\",\"slug\":\"the-three-act-logistical-division-is-about-format-not-struct\"},{\"title\":\"Три вопроса до старта разработки серии\",\"tags\":\"tactical-rule principle concept-testing\",\"excerpt\":\"\\\"Прежде чем тратить месяцы или даже годы на разработку сериала, задайте себе три простых вопроса: Почему эта идея? Почему именно вы как автор/создатель/producer? Почему сейчас?\\\"\",\"slug\":\"interrogate-every-series-idea-with-why-this-why-you-why-now\"},{\"title\":\"Три стадии отклика зрителя по Ньюперту\",\"tags\":\"principle definition empathy characters character-arc\",\"excerpt\":\"\\\"Ньюперт задал вопрос: как фильм (или сериал) заставляет нас что-то чувствовать к персонажу — и почему? Он рассуждал о том, может ли это происходить мгновенно или постепенно, но процесс всегда проходи\",\"slug\":\"neuperts-three-stage-model-of-audience-response-to-character\"},{\"title\":\"Три сюжета об одном: эпизод Modern Family\",\"tags\":\"principle show-example practice-story storylines theme episodes\",\"excerpt\":\"\\\"В эпизоде «The Kiss» (2-й сезон мокьюментари-ситкома Modern Family) разворачиваются три сюжетные линии — все о нежности. Кэмерон (Эрик Стоунстрит) расстроен, что Митчелл (Джесси Тайлер Фергюсон) не л\",\"slug\":\"modern-family-episode-the-kiss-unifies-three-storylines-arou\"},{\"title\":\"Триллер рушится, если угроза герою неправдоподобна\",\"tags\":\"pitfall definition genre protagonist\",\"excerpt\":\"\\\"Главная ловушка для автора — питч не создаёт того необходимого страха. Как правило, потому что причины, по которым протагонист оказывается в опасности, недостаточно убедительны.\\\"\",\"slug\":\"thriller-pitches-fail-when-the-protagonists-jeopardy-is-not\"},{\"title\":\"Триллер — сюжетный жанр, потому что про выживание\",\"tags\":\"principle show-example genre story-engine character-arc\",\"excerpt\":\"\\\"Триллеры, как правило, сюжетны. Написать триллер, ведомый персонажем, крайне сложно. Сильные персонажи или элементы character-led истории могут быть, но структурно триллеры держатся на сюжете — потом\",\"slug\":\"thrillers-tend-to-be-plot-led-because-they-center-on-surviva\"},{\"title\":\"У истории должны быть ставки, двигающие персонажа\",\"tags\":\"principle pitfall character-arc\",\"excerpt\":\"\\\"Нет ставок — и незачем продолжать. Если убийство Ареса не остановит войну, у Чудо-женщины найдутся дела поважнее: потренироваться с лассо или начистить боевую диадему. Хуже того: без угрозы жизни или\",\"slug\":\"stories-must-have-compelling-reasons-to-keep-characters-purs\"},{\"title\":\"У истории может быть несколько героев\",\"tags\":\"principle show-example protagonist ensemble\",\"excerpt\":\"\\\"Возможно, в вашей истории больше одного героя — двое или больше персонажей, чьи желания движут сюжет, как в романах Bel Canto и A Long Way Down или фильмах Wedding Crashers, Sleepless in Seattle и Cr\",\"slug\":\"a-story-can-have-more-than-one-hero-whose-desires-drive-the\"},{\"title\":\"У каждого питч-адресата — один шанс\",\"tags\":\"tactical-rule pilot\",\"excerpt\":\"\\\"У каждого, кому вы питчите, есть ровно один шанс. Значит, нужно бить наверняка. Скрипт должен быть не просто закончен — он должен быть настолько хорош, насколько вы способны его сделать.\\\"\",\"slug\":\"you-only-get-one-chance-with-each-person-you-pitch-to-so-the\"},{\"title\":\"Угадай замечания раньше, чем их скажут\",\"tags\":\"principle tactical-rule concept-testing\",\"excerpt\":\"\\\"Телевизионные авторы шутят про «предвосхищение замечаний». Перед тем как отдать сторилайны и черновики скриптов экзекьютивам network и studio, showrunner спрашивает команду: «Какие замечания они нам \",\"slug\":\"do-your-own-anticipate-the-notes-process-before-sharing-work\"},{\"title\":\"Уныние губит столько же проектов, сколько плохой текст\",\"tags\":\"principle pitfall concept-testing\",\"excerpt\":\"\\\"Уныние хоронит столько же неизданных романов и непроданных сценариев, сколько плохое письмо. Нужно грызть землю, пока не найдёшь тех, кто откликнется на тебя и твой материал.\\\"\",\"slug\":\"discouragement-kills-as-many-projects-as-bad-writing-does\"},{\"title\":\"Управлять информацией — тоньше, чем управлять конфликтом\",\"tags\":\"principle tactical-rule cliffhangers mystery-suspense\",\"excerpt\":\"\\\"Авторы часто думают о клиффхэнгерах в терминах управления конфликтом: просто останавливают эпизод до конца драки или сцены, пока спор не исчерпан. Это работает — но управление информацией даёт более \",\"slug\":\"managing-information-creates-more-subtle-cliffhangers-than-m\"},{\"title\":\"Успех сериала — вопреки штампам, не благодаря им\",\"tags\":\"principle author-opinion beat-sheet episode-pattern\",\"excerpt\":\"«Конечно, можно вставить эти логистические сюжетные точки, если кто-то настаивает — showrunner или broadcaster. Но сериал будет успешным вопреки таким шаблонным костылям, а не благодаря им. И уж точно\",\"slug\":\"oberg-argues-series-succeed-despite-formulaic-plot-points-no\"},{\"title\":\"Успешные сериалы строятся на универсальных темах\",\"tags\":\"principle show-example author-opinion theme story-engine\",\"excerpt\":\"\\\"В основе большинства успешных сериалов — умение найти и раскрыть универсальные темы. The Sopranos и Breaking Bad — о семье, мужественности и противоречии между ними. Gossip Girl — о женской дружбе, р\",\"slug\":\"exploiting-universal-themes-is-at-the-heart-of-most-successf\"},{\"title\":\"Устный pitch: держись в рамках 15–20 минут\",\"tags\":\"tactical-rule practice-story format\",\"excerpt\":\"«Как правило, устный pitch должен занимать около 15–20 минут. Впрочем, правил нет. Мои обычно идут 25–30 минут, и хотя мне никто не говорил, что я затягиваю, — я затягиваю. Недавно один pitch растянул\",\"slug\":\"aim-to-keep-verbal-tv-pitches-to-15-20-minutes\"},{\"title\":\"Устный питч сериала — максимум 20 минут\",\"tags\":\"tactical-rule definition format\",\"excerpt\":\"\\\"Хороший устный питч сериала длится около пятнадцати-двадцати минут — не больше.\\\"\",\"slug\":\"a-verbal-series-pitch-should-last-fifteen-to-twenty-minutes\"},{\"title\":\"Уязвимость персонажа рождает эмпатию\",\"tags\":\"principle empathy characters\",\"excerpt\":\"\\\"Главный ингредиент великого сторителлинга — эмпатия. Как писатель её добивается? Через уязвимость персонажа.\\\"\",\"slug\":\"character-vulnerability-is-what-generates-audience-empathy\"},{\"title\":\"Фильм в logline должен быть прибыльным\",\"tags\":\"tactical-rule pitfall logline comparables\",\"excerpt\":\"\\\"Если вы упоминаете фильм или передачу в своём logline, он обязан соответствовать двум важным правилам: 1. Он должен выйти в прибыль — иначе вы говорите слушателю, что ваша идея похожа на ту, что прин\",\"slug\":\"films-referenced-in-a-logline-must-have-gone-into-profit\"},{\"title\":\"Фильмы об ограблении строятся вокруг кульминации в середине\",\"tags\":\"definition act-structure midpoint genre\",\"excerpt\":\"\\\"Например, фильмы об ограблении часто строятся по схеме с кульминацией в середине. Первая половина — подготовка к ограблению; само ограбление — кульминация середины (успех или провал операции); вторая\",\"slug\":\"heist-movies-often-use-a-mid-act-climax-structure\"},{\"title\":\"Финал 2 сезона Succession: Кендалл предаёт Логана\",\"tags\":\"show-example character-arc season-arc cliffhangers\",\"excerpt\":\"\\\"Кендалл почти никогда не бьёт тех, кто слабее. Весь второй сезон он затаивается, а в финале наносит удар — резкий, направленный вверх — и оборачивается против отца-Свенгали. Момент шокирующий, хотя, \",\"slug\":\"succession-season-2-finale-kendall-publicly-betrays-logan-at\"},{\"title\":\"Финал 2-го сезона Succession: Кендалл топит Логана\",\"tags\":\"show-example cliffhangers character-arc\",\"excerpt\":\"«В последние минуты эпизода Кендалл выходит на пресс-конференцию и начинает речь так, будто собирается взять на себя ответственность за нарушения компании, — но вместо этого подставляет Логана: «Правд\",\"slug\":\"succession-season-2-finale-cliffhanger-kendall-publicly-turn\"},{\"title\":\"Финал Dead to Me: Джен убивает Стива и мирится с Джуди\",\"tags\":\"show-example season-arc cliffhangers relationships\",\"excerpt\":\"«В финале первого сезона Dead to Me — эпизод называется \\\"You Have To Go\\\" — Стив (Джеймс Марсден), бывший бойфренд Джуди, плавает в бассейне мёртвым. Важно помнить: именно Джуди сбила и убила мужа Джен\",\"slug\":\"dead-to-me-season-1-finale-ends-with-jen-accidentally-killin\"},{\"title\":\"Финал pilot закрывает эпизод, но не серию\",\"tags\":\"principle pilot pilot-structure end-hook\",\"excerpt\":\"\\\"Фокус финала pilot в том, что он не может до конца решить проблему героя — иначе серии не будет. Если все конфликты персонажей закрыты, шоу кончилось. Когда питч звучит именно так, development execut\",\"slug\":\"pilot-endings-must-satisfy-without-resolving-the-series-driv\"},{\"title\":\"Финал pilot — это старт сериала\",\"tags\":\"tactical-rule principle pilot pilot-structure pilot-goals\",\"excerpt\":\"«Мантра, которую я всегда даю студентам: конец вашего pilot — это начало вашего сериала.»\",\"slug\":\"end-your-pilot-where-the-series-begins\"},{\"title\":\"Финал pilot: закрыть главу, открыть мир\",\"tags\":\"principle show-example pilot-structure end-hook pilot-goals\",\"excerpt\":\"\\\"Финал pilot-истории должен ощущаться как завершение — но такое, которое обещает новую драму, комедию и осложнения. «Эта глава закрыта, но большая история только начинается!» — вот что должен внушать \",\"slug\":\"pilot-endings-must-resolve-satisfyingly-while-promising-more\"},{\"title\":\"Финал синтезирует арки A и B: герой побеждает новым собой\",\"tags\":\"principle definition act-structure character-arc beat-sheet\",\"excerpt\":\"\\\"Главный персонаж применяет всё усвоенное в борьбе за цель — у него есть опыт арки A и контекст арки B. Финал — это синтез! Слияние старого мира с новым. Всё сходится воедино. И победа! Герой побеждае\",\"slug\":\"the-finale-synthesizes-a-story-and-b-story-so-the-hero-wins\"},{\"title\":\"Финал эпизода: ответы и новые вопросы в балансе\",\"tags\":\"principle cliffhangers pacing episode-pattern\",\"excerpt\":\"«Не забывайте о клиффхэнгерах — не только в момент, когда вы уходите от одной сюжетной линии, чтобы зритель хотел к ней вернуться, но и в финале каждого эпизода, чтобы подразнить следующим. Всё зависи\",\"slug\":\"episode-ending-cliffhangers-should-balance-answering-existin\"},{\"title\":\"Финал — не смерть героев, а прыжок с парашютом\",\"tags\":\"practice-story season-arc character-arc\",\"excerpt\":\"«Но я думаю, что трудность была ещё и в другом: мы заканчивали шоу. И это ощущалось как тюрьма. Нас освободила Эми, когда сказала: \\\"Ребята, мы всё время ведём себя так, будто шоу вот-вот кончится и жи\",\"slug\":\"reframing-series-finale-as-characters-continuing-past-the-sh\"},{\"title\":\"Финале-завершение вместо фейерверка\",\"tags\":\"principle show-example act-structure season-arc pilot-structure\",\"excerpt\":\"\\\"В редких случаях Break into 3 становится Break into Series: решение, принятое в этой точке, бросает героя в конфликт, который шире, чем десятиминутный финал способен вместить, — нередко это философск\",\"slug\":\"when-the-break-into-3-launches-a-season-long-arc-the-finale\"},{\"title\":\"Финальная фраза питча: подготовь и отрепетируй\",\"tags\":\"tactical-rule pitfall pacing\",\"excerpt\":\"\\\"Подготовь и отрепетируй сильную финальную фразу. Нет ничего хуже, чем скатиться к невнятному бормотанию в конце. Если знаешь, чем закончишь, — можешь быть уверен: как бы turbulence ни трясло в полёте\",\"slug\":\"prepare-and-rehearse-a-strong-final-sentence-for-the-pitch\"},{\"title\":\"Финальный кадр пилота SVU: снова рабочий день\",\"tags\":\"show-example pilot opening-image\",\"excerpt\":\"\\\"ФИНАЛЬНЫЙ ОБРАЗ (42): Звонок — Бенсон берёт трубку: «Special Victims Unit»... и жизнь продолжается. Пилот закрывается тем же широким планом офиса. Метафора очередного рабочего дня. Но партнёры пришли\",\"slug\":\"svu-pilots-final-image-returns-to-a-wide-office-shot-signali\"},{\"title\":\"Финальный образ pilot должен кричать: «Начинается!»\",\"tags\":\"tactical-rule pilot end-hook\",\"excerpt\":\"\\\"В конце бита финального образа, там, где логично поставить «КОНЕЦ», напишите: «Пусть игра начнётся!» Сделайте это. Не шутка. Важно. [...] Теперь — заработайте это право. Будь то миссис Мейзел, решающ\",\"slug\":\"pilot-final-image-must-earn-a-let-the-games-begin-reaction-f\"},{\"title\":\"Финальный образ пилота The Mandalorian — «Спаси Йоду»\",\"tags\":\"show-example pilot-structure beat-sheet\",\"excerpt\":\"\\\"ФИНАЛЬНЫЙ ОБРАЗ (36): Мандалорец тянется, чтобы коснуться малыша. Вся история вела к этому великолепному моменту «Спаси Йоду!» для нашего героя. Пусть игры начнутся!\\\"\",\"slug\":\"the-mandalorian-pilots-final-image-is-mando-reaching-out-to\"},{\"title\":\"Флоу сериала: слабости повторяются, не уходят\",\"tags\":\"principle characters character-arc\",\"excerpt\":\"«У персонажей сериала нет арки — не такой, как в романе или кино. Их слабости и недостатки будут возвращаться снова и снова, в новых обличьях, каждую неделю.»\",\"slug\":\"series-characters-lack-arcs-because-their-flaws-recur-weekly\"},{\"title\":\"Флэшбэк освещает конфликт, тайну или подтекст\",\"tags\":\"definition show-example backstory serialization subtext\",\"excerpt\":\"\\\"Параллельные временны́е пласты, эпизодические или регулярные флэшбэки, работающие на настоящее действие. Примеры: The Americans, Orange Is the New Black, Lupin, Euphoria, True Detective, Better Call \",\"slug\":\"flashbacks-function-to-inform-present-day-dilemmas-solve-cen\"},{\"title\":\"Флэшбэк-«маленький взрослый» убивает выбор героя\",\"tags\":\"principle pitfall backstory character-arc\",\"excerpt\":\"«Меня воротит от флэшбэков, которые иллюстрируют поговорку: \\\"ребёнок — отец человека\\\". Не хочу видеть просто уменьшенную копию взрослого персонажа. Это может быть мило и забавно — но, на мой взгляд, э\",\"slug\":\"flashbacks-that-show-characters-as-miniature-versions-of-the\"},{\"title\":\"Флэшфорвард в тизере оправдывает долгую экспозицию\",\"tags\":\"tactical-rule show-example principle hook pilot-structure cold-open\",\"excerpt\":\"\\\"В таком случае попробуйте тизерный флэшфорвард: начните с фрагмента из дальнейшей истории — там, где всё уже по-настоящему интересно и напряжённо, — а затем вернитесь к началу и представьте зрителю с\",\"slug\":\"teaser-flashbacks-earn-a-longer-set-up-by-hooking-the-audien\"},{\"title\":\"Формат = жанр + хронометраж\",\"tags\":\"definition tactical-rule format genre\",\"excerpt\":\"\\\"Формат — это два элемента: жанр и хронометраж.\\\"\",\"slug\":\"format-is-genre-plus-running-time\"},{\"title\":\"Формат — категория, заданная средой, стилем и жанром\",\"tags\":\"definition format\",\"excerpt\":\"\\\"Формат — категория развлекательного продукта, которую определяют среда, стиль производства, хронометраж и общий жанр. В игровом телевидении два базовых формата — часовая драма и получасовая комедия, \",\"slug\":\"format-is-a-category-of-entertainment-product-defined-by-med\"},{\"title\":\"Формула — попытка навязать всем историям одну структуру\",\"tags\":\"definition author-opinion act-structure beat-sheet\",\"excerpt\":\"\\\"Формула, формульность: любая попытка убедить авторов, что все истории обязаны следовать одной структуре или парадигме — предписывающей, догматичной. Как правило, в основе лежит обязательное число лог\",\"slug\":\"formula-refers-to-dogmatic-attempts-to-convince-creators-tha\"},{\"title\":\"Фрактальность: одна структура строит всё\",\"tags\":\"definition act-structure\",\"excerpt\":\"\\\"Фрактальный аспект драматической структуры: свойство, позволяющее строить по одной схеме и целую историю, и её части. Если мы используем драматическую структуру для построения истории вокруг главного\",\"slug\":\"fractal-aspect-of-story-structure-means-the-same-dramatic-st\"},{\"title\":\"Ханну для Pretty Little Liars нашли за день до дедлайна\",\"tags\":\"practice-story characters\",\"excerpt\":\"\\\"Дата начала съёмок надвигалась, а Ханны у нас не было. Мы начали нервничать. Когда время совсем поджало, Марлин, Лесли и я пришли в офис Гейл на очередной кастинг — и увидели, что она светится от воз\",\"slug\":\"casting-hanna-for-pretty-little-liars-came-down-to-the-wire\"},{\"title\":\"Хвалите конкретно — не вообще\",\"tags\":\"tactical-rule pitfall specificity\",\"excerpt\":\"\\\"Но будьте конкретны. Сказать «Я обожаю Titanic — а теперь послушайте мой питч» — не лучший способ расположить к себе. А вот объяснить, что именно вас в нём зацепило, — другое дело.\\\"\",\"slug\":\"generic-praise-of-a-buyers-work-may-not-ingratiate-you-sayin\"},{\"title\":\"Хейдер: питч требует уверенности и страсти\",\"tags\":\"author-opinion overview\",\"excerpt\":\"«Самое главное — питч всегда должен звучать уверенно и страстно. Мэтт Хейдер»\",\"slug\":\"hader-a-great-pitch-is-always-confident-and-passionate\"},{\"title\":\"Хорошее название — половина питча\",\"tags\":\"principle hook\",\"excerpt\":\"\\\"Авторам не стоит недооценивать название в питче. Хорошее название — это уже половина победы. Много раз осмеянное Snakes on a Plane рассказывало всю историю целиком — и принесло авторам их гонорар.\\\"\",\"slug\":\"a-good-title-can-be-half-the-battle-in-a-pitch\"},{\"title\":\"Хотение — внешнее, потребность — внутренняя\",\"tags\":\"principle definition characters character-arc\",\"excerpt\":\"\\\"Когда мы говорим о цели, мы говорим о том, чего персонаж хочет. У проработанного персонажа есть и желания, и потребности. Если у вашего героя нематериальная цель — «справиться с горем», «победить стр\",\"slug\":\"wants-are-tangible-external-goals-distinct-from-intangible-i\"},{\"title\":\"Хронометраж часовой драмы зависит от платформы\",\"tags\":\"definition format\",\"excerpt\":\"\\\"Один из самых распространённых форматов scripted TV — часовая драма: около 42 минут на рекламном телевидении, около 56 минут на премиальном кабельном канале и от 45 до 75 минут и больше на стримингов\",\"slug\":\"one-hour-drama-runtime-varies-by-distribution-platform\"},{\"title\":\"Хронометраж: 40+ минут — час, до 35 — полчаса\",\"tags\":\"definition tactical-rule format\",\"excerpt\":\"«Оговорка: час-лонги редко длятся целый час, а полчаса — обычно около 22 минут. The Mandalorian регулярно выходит на 42 минуты, но его всё равно называют «час-лонгом». Простое правило: если эпизод дли\",\"slug\":\"runtime-rule-of-thumb-40-minutes-is-hour-long-under-35-is-ha\"},{\"title\":\"Худший pitch: нет logline, нет цели, пересказ всего\",\"tags\":\"pitfall tactical-rule logline protagonist pitch\",\"excerpt\":\"\\\"Худшие pitch'и: нет logline, цель протагониста не ясна, а автор настаивает на том, чтобы пересказать мне сценарий от начала до конца — до последней детали.\\\"\",\"slug\":\"worst-pitches-lack-a-logline-leave-the-protagonists-goal-unc\"},{\"title\":\"Цель pilot-истории: конкретно, не размыто\",\"tags\":\"principle practice-story pilot-goals specificity\",\"excerpt\":\"\\\"Лучшие цели pilot-истории — конкретные и осязаемые, а не смутные, аморфные, теоретические желания. Однажды во время обеда на локейшн-скаутинге у меня вышел неловкий разговор со старшим членом команды\",\"slug\":\"pilot-story-goals-should-be-concrete-and-specific-not-vague\"},{\"title\":\"Цель героя должна быть видимой снаружи\",\"tags\":\"principle tactical-rule protagonist pilot-goals\",\"excerpt\":\"\\\"Пожалуйста. Пожалуйста. Пожалуйста. Делайте цель героя ВИДИМОЙ! Выбирайте цель, за которой зрители следят без телепатии — не заставляйте их читать мысли актёра (и не вынуждайте себя писать сцену танц\",\"slug\":\"heros-goal-should-be-tangible-meaning-external-and-audience\"},{\"title\":\"Цель героя — после первого поворота pilot\",\"tags\":\"tactical-rule show-example pilot-goals pilot-structure\",\"excerpt\":\"\\\"Во время или сразу после описания первого крупного поворота в истории pilot эффективные питчи сообщают слушателям, чего хочет главный герой. В Breaking Bad цель Уолтера раскрывается в сцене, когда он\",\"slug\":\"state-the-lead-characters-goal-during-or-after-the-pilots-fi\"},{\"title\":\"Цель любой истории — вызвать эмоцию\",\"tags\":\"principle theme\",\"excerpt\":\"«Цель каждого сценария, каждого фильма, каждого романа, каждой истории любого рода — и в конечном счёте каждого произведения искусства — одна: вызвать эмоцию.»\",\"slug\":\"every-storys-primary-objective-is-to-elicit-emotion\"},{\"title\":\"Цель пилота без ставок — незачем болеть\",\"tags\":\"principle pilot-goals pilot\",\"excerpt\":\"\\\"Третье качество хорошей цели в pilot — ставки. (Я говорил, что ставки вернутся в разговор о разработке, и вот они здесь.) Если герой не добьётся своего, что-то должно быть поставлено на карту — иначе\",\"slug\":\"pilot-story-goals-must-carry-stakes-consequences-if-the-hero\"},{\"title\":\"Цель сцены — часть Story DNA, а не она сама\",\"tags\":\"definition pilot-structure beat-sheet\",\"excerpt\":\"\\\"Важная оговорка: цель героя или препятствие в конкретной сцене не обязательно совпадает с той Story DNA pilot'а, что вы задали изначально (хотя может совпадать). Чаще это подцель. Кроме того, в сцена\",\"slug\":\"a-scenes-goal-or-obstacle-is-often-a-sub-goal-of-the-pilots\"},{\"title\":\"Цель — это то, чего персонаж хочет осознанно\",\"tags\":\"definition protagonist character-arc\",\"excerpt\":\"\\\"Цель: то, чего персонаж хочет (осознанная цель) в истории. То же самое, что Задача. То, чего протагонист хочет на протяжении всей истории, — это главная цель.\\\"\",\"slug\":\"goal-is-what-a-character-consciously-wants-in-a-story\"},{\"title\":\"Центральная тайна — в прошлом персонажей\",\"tags\":\"definition show-example mystery-suspense backstory serialization\",\"excerpt\":\"\\\"Центральные тайны Центральная тайна касается прошлого. Что случилось с персонажами в прошлом, что сделало их такими, какие они есть? Как, когда, где и почему — и как это отзовётся в настоящем и будущ\",\"slug\":\"a-central-mystery-concerns-the-characters-past\"},{\"title\":\"Цифровая революция убила рейтинги Nielsen\",\"tags\":\"definition principle overview\",\"excerpt\":\"\\\"С приходом цифровой телевизионной революции всё перевернулось с ног на голову. Ночные рейтинги Nielsen потеряли смысл.\\\"\",\"slug\":\"digital-television-revolution-made-overnight-nielsen-ratings\"},{\"title\":\"Час — 24–28 карточек, полчаса — 12–16\",\"tags\":\"tactical-rule beat-sheet pilot-structure format\",\"excerpt\":\"«Держитесь в диапазоне 24–28 карточек для часового pilot и 12–16 — для получасового.»\",\"slug\":\"target-2428-cards-for-hour-long-pilots-and-1216-cards-for-ha\"},{\"title\":\"Часовая драма: 48–63 страницы сценария\",\"tags\":\"tactical-rule definition format pilot\",\"excerpt\":\"\\\"Большинство сценариев часовых драм занимают от 48 до 63 страниц. Однако многие пилотные эпизоды пишутся длиннее, а потом урезаются в процессе производства — особенно на монтаже.\\\"\",\"slug\":\"one-hour-drama-teleplays-typically-run-48-to-63-pages\"},{\"title\":\"Частное место в Mare of Easttown — универсально\",\"tags\":\"show-example principle specificity theme setting\",\"excerpt\":\"\\\"Истаун Ингелсби — вымышленный городок в округе Делавэр, штат Пенсильвания — прорисован так точно, что становится универсальным. Такой Истаун есть у каждого из нас. Эти травмы, стыд и душевная пустота\",\"slug\":\"mare-of-easttowns-hyper-specific-local-setting-takes-on-an-a\"},{\"title\":\"Четыре видимые цели героя в кино\",\"tags\":\"principle definition tactical-rule protagonist logline\",\"excerpt\":\"\\\"Почти в каждом голливудском фильме герой преследует одну из четырёх видимых целей: Победить — в соревновании, как в Remember the Titans или Miracle, или завоевать любовь другого персонажа, как в любо\",\"slug\":\"almost-all-hollywood-movies-feature-one-of-four-visible-goal\"},{\"title\":\"Четыре квадранта делят рынок взрослого кино\",\"tags\":\"definition principle overview\",\"excerpt\":\"\\\"Первая концепция — «Четыре квадранта». Согласно ей, рынок взрослого кино (в отличие от детского) делится на четыре сегмента.\\\"\",\"slug\":\"the-four-quadrants-divide-the-adult-movie-market-into-four-d\"},{\"title\":\"Четыре типа non-writing executive producer\",\"tags\":\"definition\",\"excerpt\":\"\\\"Non-writing EP-ы делятся на четыре типа.\\\"\",\"slug\":\"non-writing-executive-producers-fall-into-four-categories\"},{\"title\":\"Четыре элемента любой хорошей истории\",\"tags\":\"principle tactical-rule protagonist logline\",\"excerpt\":\"\\\"Любую хорошую историю можно описать так: 1. Есть протагонист (ГЕРОЙ)... 2. ...который чего-то очень хочет (ЦЕЛЬ), 3. но кто-то или что-то стоит у него на пути (ПРЕПЯТСТВИЕ или АНТАГОНИСТ)... 4. ...и \",\"slug\":\"all-good-stories-share-four-elements-a-hero-a-goal-an-obstac\"},{\"title\":\"Число рекламных пауз диктует структуру эпизода\",\"tags\":\"definition principle act-structure format\",\"excerpt\":\"«Хочу поговорить о том, что я называю стандартным дизайном сериала: количество рекламных пауз определяет логистический формат истории в каждом эпизоде.»\",\"slug\":\"conventional-series-design-lets-ad-break-count-dictate-logis\"},{\"title\":\"Чистая антология: эпизоды разные — тема одна\",\"tags\":\"definition show-example format\",\"excerpt\":\"\\\"«Чистая» антологическая серия предлагает зрителям самостоятельные эпизоды, объединённые единой темой. The Twilight Zone Рода Серлинга (CBS, 1959–1964) — пожалуй, самая известная и живучая антология в\",\"slug\":\"pure-anthology-series-offer-individually-crafted-episodes-un\"},{\"title\":\"Читая толпу, легко ошибиться\",\"tags\":\"tactical-rule practice-story pitfall\",\"excerpt\":\"\\\"Остерегайтесь читать мысли аудитории. Однажды на воркшопе я заметил мужчину в последнем ряду: руки скрещены на груди, лицо грозовой тучей. Ясно, решил я, — что-то его обидело, но что именно, понять н\",\"slug\":\"mind-reading-the-crowd-can-lead-you-to-wrong-conclusions-abo\"},{\"title\":\"Читка может убить скрипт и уволить актёра\",\"tags\":\"definition practice-story pilot\",\"excerpt\":\"\\\"Если читка прошла плохо, сценарий могут переписать кардинально, а актёров — уволить.\\\"\",\"slug\":\"table-reads-can-trigger-last-minute-script-rewrites-and-acto\"},{\"title\":\"Чувственный язык бьёт абстрактный в питче\",\"tags\":\"principle tactical-rule specificity\",\"excerpt\":\"\\\"Абстрактный язык — «он понимает», «она думает», «мы осознаём» — не рождает никаких чувственных образов и потому лишён живой силы. У него есть своё место, но питч на нём звучит вяло и без страсти. Чем\",\"slug\":\"sensory-language-outperforms-abstract-language-in-pitches\"},{\"title\":\"Чужак учит зрителя правилам нового мира\",\"tags\":\"principle show-example world-rules world-building protagonist\",\"excerpt\":\"\\\"Вводя аудиторию в незнакомый мир — сверхъестественный или любой другой — приведите туда чужака, который поможет зрителям разобраться на ходу. В Ted Lasso на AppleTV+ главный герой, уроженец Уичиты, ш\",\"slug\":\"use-an-outsider-character-to-teach-the-audience-the-rules-of\"},{\"title\":\"Чужие похвалы без денег слабят питч\",\"tags\":\"pitfall concept-testing\",\"excerpt\":\"\\\"Не упоминайте чужие отзывы. «Это высоко оценили в CAA», «редактор HarperCollins сказала, что лучшего дебютного романа не читала», «маме очень понравилось» — всё это только топит питч. Если кто-то из \",\"slug\":\"citing-third-party-praise-without-firm-commitment-weakens-th\"},{\"title\":\"Чёрный юмор привлекает тех, кто бежит от экодрамы\",\"tags\":\"practice-story principle tone concept-testing\",\"excerpt\":\"«Но я хотел найти свежий подход — такой, который привлёк бы зрителя, обычно не смотрящего серьёзные экологические страшилки. Я решил сделать ставку на чёрный юмор. Предложил идею продюсеру Фрэнсис Бер\",\"slug\":\"using-black-humour-in-pitching-an-environmental-documentary\"},{\"title\":\"Шаблон pitch: жанр + протагонист + цель + препятствие\",\"tags\":\"tactical-rule example logline genre premise\",\"excerpt\":\"\\\"Итак, наш pitch выглядит так: Это (жанр/жанры) о (протагонист), который хочет (видимая внешняя цель с высокими ставками), но (внешнее препятствие). Последние два элемента можно менять местами, а преп\",\"slug\":\"pitch-template-genre-protagonist-visible-outer-goal-with-hig\"},{\"title\":\"Шаблон Хауге: любовная линия поверх основной цели\",\"tags\":\"example logline genre\",\"excerpt\":\"«[Используй любой из предыдущих вариантов зачина — вплоть до момента, где появляется любовный интерес. Затем говори:] Итак, моя история о [имя героя] — [роль/симпатия/ситуация], который хочет [внешняя\",\"slug\":\"hauge-provides-a-romance-add-on-pitch-template-that-layers-a\"},{\"title\":\"Шаблон питча по Хоугу: опыт + выдумка\",\"tags\":\"example logline premise comparables\",\"excerpt\":\"\\\"Начну с того, что я всегда обожал [жанр вашего фильма или романа] — особенно такие истории, как [прецедент №1] и [прецедент №2], или даже [прецедент №3], где [то общее, что объединяет эти прецеденты \",\"slug\":\"hauges-combined-personal-experiencefictional-story-pitch-tem\"},{\"title\":\"Эволюция персонажа: он другой в финале\",\"tags\":\"definition character-arc\",\"excerpt\":\"\\\"Эволюция персонажа (или арка персонажа): когда персонаж в финале истории стал другим — он прошёл эволюцию. Она бывает двух видов: изменение или рост (см. выше).\\\"\",\"slug\":\"character-evolution-is-when-a-character-is-different-at-the\"},{\"title\":\"Экспозиция — рассказ о том, что было до\",\"tags\":\"definition backstory\",\"excerpt\":\"\\\"Экспозиция: сообщение зрителю о том, что произошло до начала истории или между сценами. Она бывает нужна и даже необходима, но это литературная часть драмы — и когда её слишком много или она подана н\",\"slug\":\"exposition-is-telling-the-audience-what-happened-before-the\"},{\"title\":\"Экшн и триллер строятся вокруг единой цели\",\"tags\":\"principle show-example genre season-arc serialization\",\"excerpt\":\"\\\"То же справедливо для экшна, приключений и триллеров — таких как 24 или Prison Break. Эти жанры часто используют единую цель, которая формирует один или несколько сезонов.\\\"\",\"slug\":\"actionadventurethriller-franchises-use-a-unifying-goal-to-sh\"},{\"title\":\"Эллиптическое повествование — история «в монтаже»\",\"tags\":\"show-example definition pacing\",\"excerpt\":\"\\\"К концу эпизода проблема с крысами решается: Пегги заводит кошку. Правда, мы не видим, как она её берёт, — в финале кошка просто сидит рядом с заметно успокоившейся Пегги на диване. Хороший пример эл\",\"slug\":\"elliptical-storytelling-tells-the-story-in-the-cut\"},{\"title\":\"Эмоция питчера заражает слушателей\",\"tags\":\"principle tactical-rule pilot\",\"excerpt\":\"\\\"Важный приём — самому чувствовать то, о чём говоришь. Эмоция, которую питчер проявляет во время питча pilot-истории, подсказывает слушателям, что именно они должны переживать.\\\"\",\"slug\":\"pitchers-displayed-emotion-cues-listeners-to-feel-the-same-e\"},{\"title\":\"Эмпатия к герою создаётся при знакомстве, не позже\",\"tags\":\"principle pitfall empathy protagonist pilot-structure\",\"excerpt\":\"\\\"Эмпатию нужно выстроить в момент, когда герой появляется впервые. Сделать его жертвой в середине фильма или показать, как он становится добрее и нежнее, — это обогатит историю, но эмпатии и отождеств\",\"slug\":\"empathy-for-the-hero-must-be-created-at-the-heros-introducti\"},{\"title\":\"Эпизод вмещает не больше 4–5 сюжетных линий\",\"tags\":\"definition principle episodes storylines\",\"excerpt\":\"\\\"Одни линии занимают больше места и весят больше других, но в каждом эпизоде их обычно не больше четырёх-пяти — даже если на уровне сезона или сериала их куда больше.\\\"\",\"slug\":\"episodes-typically-handle-at-most-four-or-five-storylines-ev\"},{\"title\":\"Эпизод не должен закрывать все вопросы\",\"tags\":\"principle episodes serialization\",\"excerpt\":\"«Час
