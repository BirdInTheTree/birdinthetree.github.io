их хоть отчасти, — иначе получится сухая академическая схема. Есл\",\"slug\":\"writing-inner-story-requires-the-writer-to-share-the-charact\"},{\"title\":\"Внутренняя история — арка роста протагониста\",\"tags\":\"principle definition character-arc\",\"excerpt\":\"\\\"ВНУТРЕННЯЯ ИСТОРИЯ Внутренняя история следует за аркой персонажа — за тем, как протагонист растёт и меняется. Если главная причина смотреть кино и сериалы — это эмоции (жанр), то вторая, не менее важ\",\"slug\":\"inner-story-is-the-protagonists-character-journey-of-growth\"},{\"title\":\"Возврат персонажа из кроссовера надо заслужить\",\"tags\":\"principle show-example characters serialization\",\"excerpt\":\"«Я постоянно повторяю: удовольствия нужно заслуживать. Кроссоверы — тоже. Если мы возвращаем любимого персонажа, с которым зрители провели столько времени, у него должна быть причина появиться; его пр\",\"slug\":\"crossover-character-returns-must-be-earned-by-illuminating-t\"},{\"title\":\"Возможность бросает героя в новую ситуацию\",\"tags\":\"principle show-example hook\",\"excerpt\":\"\\\"Под действием возможности герой попадает в новую ситуацию. Когда в романе Bel Canto партизаны захватывают дом вице-президента (возможность), заложники вынуждены разобраться, что происходит, и как-то \",\"slug\":\"the-opportunity-moves-the-hero-into-a-new-situation\"},{\"title\":\"Вопросы после питча — признак интереса\",\"tags\":\"principle concept-testing\",\"excerpt\":\"\\\"Вопросы слушателей — не знак того, что автор не сказал нужного. Знак того, что он заинтриговал. Автор и хочет, чтобы спрашивали. Хочет, чтобы люди подались вперёд и просили подробностей. Это выражени\",\"slug\":\"questions-from-listeners-after-a-pitch-signal-genuine-engage\"},{\"title\":\"Восклицательный знак — признак неуверенного автора\",\"tags\":\"tactical-rule pitfall format\",\"excerpt\":\"\\\"Присмотритесь к восклицательному знаку. Если не хотите, чтобы ваши сценарии выглядели любительски, — используйте его крайне редко. Почти никогда. Восклицательный знак в ремарках, а зачастую и в диало\",\"slug\":\"use-exclamation-points-almost-never-in-scripts\"},{\"title\":\"Время — главная ловушка питча перед аудиторией\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Главная ловушка — время. Уже нельзя просто произнести logline и замолчать в ожидании вопросов. Нужно сказать чуть больше. Но под давлением волнения легко начать лить воду — и трудно остановиться. Узн\",\"slug\":\"managing-time-is-the-biggest-trap-in-audience-pitching\"},{\"title\":\"Все инструменты нарратива — про то, что знает зритель\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"\\\"Как видите, у всех этих инструментов одно общее: они строятся на том, сколько зритель знает о происходящем — или не знает.\\\"\",\"slug\":\"narrative-tools-share-a-common-thread-they-all-turn-on-how-m\"},{\"title\":\"Всегда иметь при себе 3 вещи\",\"tags\":\"tactical-rule logline\",\"excerpt\":\"\\\"Итак, вы должны всегда носить с собой три вещи: готовый 60-секундный питч; готовый 10-секундный питч (см. главу 10); ручку и блокнот — чтобы, если покупатель заинтересуется, сразу записать его контак\",\"slug\":\"always-carry-a-60-second-pitch-a-10-second-pitch-and-a-pen-a\"},{\"title\":\"Всё важное для шоу — в pilot\",\"tags\":\"principle tactical-rule pilot pilot-goals pilot-structure\",\"excerpt\":\"\\\"ЕСТЬ В ШОУ — ЕСТЬ В PILOT Pilot часто снимают как тест: посмотреть, работает ли шоу, прежде чем дать зелёный свет всей серии. Если какой-то элемент сыграет в шоу ключевую роль — будь то персонаж, лок\",\"slug\":\"every-element-that-will-play-a-major-part-in-the-show-belong\"},{\"title\":\"Герой = экспертиза плюс уязвимость\",\"tags\":\"principle show-example characters protagonist\",\"excerpt\":\"\\\"Каждый герой — это экспертиза в связке с уязвимостью. Вспомните Уолтера Уайта, Оливию Поуп, Теда Лассо, Тони Сопрано, Бет Хармон. Когда я беседовал с создателем и showrunner'ом Breaking Bad Винсом Ги\",\"slug\":\"heroes-are-constructed-as-expertise-paired-with-a-liability\"},{\"title\":\"Герой, мотив, конфликт, страсть — четыре кита питча\",\"tags\":\"tactical-rule principle overview\",\"excerpt\":\"\\\"Из десяти элементов списка четыре я считаю почти обязательными для любого хорошего питча: герой, внешняя мотивация, конфликт и страсть.\\\"\",\"slug\":\"hero-outer-motivation-conflict-and-passion-are-the-four-near\"},{\"title\":\"Герою нужны изъян, цель и урок\",\"tags\":\"principle definition tactical-rule characters protagonist character-arc\",\"excerpt\":\"\\\"Для начала у вашего героя должно быть три составляющих: 1. Изъян — личная проблема, которую нужно исправить. 2. Цель — конкретная задача, которую он преследует. 3. Урок — жизненный вывод, который он \",\"slug\":\"tv-heroes-need-a-flaw-a-want-and-a-need\"},{\"title\":\"Гибрид меняет тип истории на ходу\",\"tags\":\"definition principle show-example story-engine character-arc serialization\",\"excerpt\":\"\\\"Гибрид — это история, где вы переходите от одного типа к другому: например, история начинается как персонажная и становится сюжетной (как в Edge of Tomorrow) или начинается как сюжетная и становится \",\"slug\":\"hybrid-stories-shift-from-one-story-type-to-another-mid-narr\"},{\"title\":\"Гибридные истории меняют тип по ходу\",\"tags\":\"definition show-example character-arc story-engine\",\"excerpt\":\"\\\"Гибрид использует больше одного типа истории на протяжении повествования. Например, Edge of Tomorrow начинается как история персонажа (трус должен обрести стержень), а затем становится сюжетной (бывш\",\"slug\":\"hybrid-stories-use-more-than-one-story-type-across-the-narra\"},{\"title\":\"Гибридный сериал сочетает два и более типа историй\",\"tags\":\"principle definition format genre\",\"excerpt\":\"\\\"скорее всего, вы разрабатываете нечто иное — гибрид: сериал, в котором сочетаются два или больше типа историй\\\"\",\"slug\":\"hybrid-series-combine-two-or-more-story-types\"},{\"title\":\"Гибридный сериал: арка плюс эпизод-самостоятельность\",\"tags\":\"definition show-example serialization episode-pattern format\",\"excerpt\":\"«Всё чаще в телевидении появляется то, что я называю гибридным сериалом, — такие как The West Wing или The Good Wife. В гибридном сериале есть и сквозная история, и отдельная история каждого эпизода. \",\"slug\":\"hybrid-series-combine-an-ongoing-arc-with-self-contained-epi\"},{\"title\":\"Гибриды строятся на управлении информацией\",\"tags\":\"principle definition story-engine act-structure serialization\",\"excerpt\":\"«В таких случаях трёхактную структуру не используешь для построения всего сериала или всего сезона — ведь это исключение или гибрид. Но её можно применить для отдельных частей. А главным структурным и\",\"slug\":\"hybrid-and-exception-series-often-use-managing-information-a\"},{\"title\":\"Главная ирония Breaking Bad: Уолтер скрыт от всех\",\"tags\":\"show-example principle mystery-suspense subtext\",\"excerpt\":\"\\\"В Breaking Bad почти нет тайн, зато хватает сюрпризов — и всё повествование на протяжении пяти сезонов выстроено вокруг главной драматической иронии: мы знаем, что Уолтер Уайт не просто учитель химии\",\"slug\":\"breaking-bads-main-dramatic-irony-is-that-most-characters-do\"},{\"title\":\"Главная ошибка питча — пересказать всё\",\"tags\":\"pitfall principle author-opinion pacing overview\",\"excerpt\":\"«Желание рассказать слишком много — пожалуй, самая распространённая слабость питча. Он становится длинным, размытым и в итоге скучным. Вместо того чтобы хотеть узнать больше и задавать вопросы об этом\",\"slug\":\"trying-to-tell-too-much-of-the-story-is-the-most-common-pitc\"},{\"title\":\"Главная слабость питча — автор не знает свою историю\",\"tags\":\"pitfall logline specificity\",\"excerpt\":\"«Как бывший development exec и участник питч-фестов в роли судьи, я снова и снова вижу одно: авторы не знают свою историю достаточно хорошо, чтобы изложить её ясно и сжато. Конкретнее — они не понимаю\",\"slug\":\"most-common-pitch-weakness-is-writers-not-knowing-their-stor\"},{\"title\":\"Главная эмоция криминального жанра — жажда справедливости\",\"tags\":\"definition principle genre\",\"excerpt\":\"«Главная эмоция в криминальном жанре — чувство несправедливости и желание восстановить справедливость.»\",\"slug\":\"the-primary-emotion-of-the-crime-genre-is-injustice-and-desi\"},{\"title\":\"Главное в оценке pilot — хочется ли болеть за героев\",\"tags\":\"principle pilot empathy\",\"excerpt\":\"\\\"Важнее всего: переживает ли читатель за персонажей? Дочитав сценарий, хочется ли ему болеть за кого-то из них — в идеале за тех, кто ближе всего к центру сериала, за главных героев? Вот главные вопро\",\"slug\":\"rooting-interest-in-the-lead-characters-is-the-primary-crite\"},{\"title\":\"Голливудский TV development — профессиональная среда\",\"tags\":\"practice-story author-opinion overview\",\"excerpt\":\"«Вопреки худшим страхам, когда я переехал в Лос-Анджелес много лет назад, культуру телебизнеса в Голливуде определяет профессиональная этика. Большинство development-встреч и созвонов проходят в атмос\",\"slug\":\"levy-found-hollywood-tv-development-culture-to-be-profession\"},{\"title\":\"Готовый сценарий — 60 страниц поводов отказать\",\"tags\":\"practice-story principle pitfall pilot\",\"excerpt\":\"«Когда люди говорят: \\\"Лучше иметь готовый сценарий\\\", — я вспоминаю своего наставника из NYU. У него была отличная фраза: \\\"Помни: сценарий — это ещё и 60 страниц поводов сказать нет\\\"»\",\"slug\":\"a-finished-script-gives-buyers-60-pages-of-reasons-to-say-no\"},{\"title\":\"Готовься к каверзному вопросу заранее\",\"tags\":\"tactical-rule principle comparables concept-testing\",\"excerpt\":\"\\\"Если ваш питч про мир, слишком похожий на уже выходящий сериал, — встречайте это в лоб и объясните, чем отличаетесь. Если новый сериал больше смахивает на фильм, чем на TV-шоу, — именно на этом они и\",\"slug\":\"anticipate-the-tricky-question-the-room-will-ask-and-prepare\"},{\"title\":\"Групповые идеи превосходят любого одиночку\",\"tags\":\"author-opinion principle\",\"excerpt\":\"\\\"Когда меня спрашивают, что мне больше всего нравится в моей работе, ответ прост: творческое сотрудничество. Два, три, двенадцать человек перебрасываются идеями, питчуют, латают дыры, тянут друг друга\",\"slug\":\"levys-favorite-part-of-the-job-is-creative-collaboration-whe\"},{\"title\":\"Гулд выбирает саспенс, а не сюрприз — вслед за Хичкоком\",\"tags\":\"principle author-opinion mystery-suspense\",\"excerpt\":\"«Я всегда вспоминаю одну из первых книг о кино, которую прочитал, — интервью Трюффо с Хичкоком. Хичкок настаивает: там, где можно выбирать, выбирай саспенс, а не сюрприз. Я с ним согласен. Пусть зрите\",\"slug\":\"peter-gould-prefers-suspense-over-surprise-following-hitchco\"},{\"title\":\"Два жанра в одном — способ освежить историю\",\"tags\":\"tactical-rule principle genre\",\"excerpt\":\"\\\"Один из частых способов освежить историю — скрестить два разных жанра. Чисто однозанровых фильмов почти не бывает. Они существуют, но намеренно старомодны — почти ретро.\\\"\",\"slug\":\"combining-two-genres-is-a-common-way-to-bring-freshness-to-a\"},{\"title\":\"Два из пяти методов — сразу, чтобы зацепить читателя\",\"tags\":\"principle tactical-rule empathy pilot protagonist\",\"excerpt\":\"\\\"Чтобы читатель пережил этот опыт, нужно немедленно задействовать хотя бы два из пяти ключевых методов установления психологической связи:\\\"\",\"slug\":\"employ-at-least-two-of-five-key-methods-immediately-to-estab\"},{\"title\":\"Дедлайн для протагониста нагнетает напряжение\",\"tags\":\"principle pacing pilot\",\"excerpt\":\"\\\"Подумайте о роли времени в вашем сериале. В любом жанре персонажи всегда куда-то торопятся — им надо успеть что-то сделать, иначе... Поставьте себе и своему протагонисту дедлайн. Это нагнетает драмат\",\"slug\":\"giving-the-protagonist-a-deadline-ratchets-up-dramatic-tensi\"},{\"title\":\"Детали — только после главного\",\"tags\":\"tactical-rule logline\",\"excerpt\":\"\\\"Но если основное вы уже изложили, а время ещё есть — добавьте детали: что именно встанет на пути героя и как он с этим справится.\\\"\",\"slug\":\"add-story-details-only-after-essentials-are-conveyed-and-tim\"},{\"title\":\"Детализировать сезоны дальше второго — пустая трата\",\"tags\":\"tactical-rule principle season serialization\",\"excerpt\":\"\\\"Если только речь не идёт об адаптации известного произведения — где зрители знают оригинал и ждут ключевых сюжетных элементов — детализировать историю дальше второго сезона почти бессмысленно. Все по\",\"slug\":\"detailing-seasons-beyond-season-2-in-a-pitch-is-rarely-worth\"},{\"title\":\"Дизайн шоу — нелинейная итерация\",\"tags\":\"principle overview world-building format\",\"excerpt\":\"\\\"Когда проектируешь шоу, движущихся частей много. Сильная идея, найденная при работе над персонажем, может изменить и типы историй, которые нужно рассказать, и тему. Это нормально. Вернись и скорректи\",\"slug\":\"show-design-iterates-non-linearly-across-character-world-the\"},{\"title\":\"Для pilot достаточно beat sheet сезона на 1–2 стр.\",\"tags\":\"tactical-rule beat-sheet season-arc pilot\",\"excerpt\":\"\\\"Можно написать 20-страничный treatment по первому сезону, если душа требует, — но чтобы написать pilot, хватит высокоуровнего beat sheet. Одна-две страницы. Три-пять — если совсем не можешь остановит\",\"slug\":\"to-write-your-pilot-you-only-need-a-high-level-season-1-beat\"},{\"title\":\"Для документалок: подготовь детальный proposal\",\"tags\":\"tactical-rule format\",\"excerpt\":\"\\\"Для документального кино подготовь детальный proposal — и будь готов его сразу отправить.\\\"\",\"slug\":\"have-a-detailed-proposal-ready-before-pitching-documentaries\"},{\"title\":\"До первых денег — десяток сценариев\",\"tags\":\"practice-story tactical-rule\",\"excerpt\":\"\\\"Сценарии! Сценарии! Сценарии! Скорее всего, вы напишете с десяток сценариев, прежде чем окажетесь достаточно хороши или достаточно удачливы, чтобы кто-то обратил на вас хоть малейшее внимание. Мой са\",\"slug\":\"expect-to-write-a-dozen-scripts-before-anyone-pays-attention\"},{\"title\":\"Документальный pitch: покажи, как снимешь\",\"tags\":\"principle definition visual-style format\",\"excerpt\":\"\\\"Главное отличие от игрового кино — нужно показать, как документальный фильм будет работать на экране. В игровом pitch продюсера меньше волнует, как история будет снята, — его интересует суть истории \",\"slug\":\"documentary-pitches-must-show-how-the-film-will-work-on-scre\"},{\"title\":\"Дома балрума — страховка для отвергнутых ЛГБТК\",\"tags\":\"show-example world theme\",\"excerpt\":\"«Стивен: Проще всего это описать так: дома — это страховочная сеть. Вот что они значат для молодых, часто отвергнутых всеми ЛГБТК-людей. Это то, чем дома и сообщество балрума всегда были: место для бр\",\"slug\":\"ballroom-houses-function-as-safety-nets-built-on-community-l\"},{\"title\":\"Дорогой сценарий требует мультиплекс-аудитории\",\"tags\":\"principle tactical-rule genre format\",\"excerpt\":\"\\\"Если ваш сценарий дорог в производстве, он должен привлекать мультиплекс-аудиторию — прежде всего возраст 14–24 лет: широкий эмоциональный охват, крепкий сюжет, яркие роли, ради которых звёзды первой\",\"slug\":\"expensive-scripts-will-need-elements-that-appeal-to-the-mult\"},{\"title\":\"Доступ к людям, местам и авторским материалам — обязателен\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"ЕСТЬ ЛИ У ВАС ДОСТУП? Это ключевое. Можете ли вы сделать всё, о чём заявляете? Есть ли у вас нужные разрешения? Вы нашли нужных людей и получили их согласие? Вы можете снимать там, где планируете? Ну\",\"slug\":\"documentary-proposals-should-show-you-have-or-can-get-access\"},{\"title\":\"Драма решается через общение, не через действие\",\"tags\":\"definition genre\",\"excerpt\":\"\\\"Драма — сборный термин для историй, не подпадающих ни под один другой жанр. Истории без (в основном) стрельбы, гонок, космических кораблей, спортивных трофеев и призраков — истории, которые разыгрыва\",\"slug\":\"drama-resolves-conflict-through-social-interaction-rather-th\"},{\"title\":\"Драматическая ирония рождает комедию ситуаций\",\"tags\":\"definition principle genre\",\"excerpt\":\"\\\"Драматическая ирония — мощный инструмент для создания комедии. На ней держится ситуационная комедия, и в следующем разделе мы увидим это на примере Friends.\\\"\",\"slug\":\"dramatic-irony-generates-comedy-including-situation-comedy\"},{\"title\":\"Драматическая ирония — двигатель саспенса\",\"tags\":\"principle show-example mystery-suspense antagonist tone\",\"excerpt\":\"\\\"Если хочешь саспенс, напряжение и эмоциональную вовлечённость — например, если шоу должно бить в жанр триллера — используй драматическую иронию. Либо сообщи зрителю, откуда исходит угроза, скрыв это \",\"slug\":\"dramatic-irony-generates-suspense-and-emotional-involvement\"},{\"title\":\"Драматическая ирония: зритель знает больше героя\",\"tags\":\"definition principle subtext\",\"excerpt\":\"\\\"Драматическая ирония — когда зрители знают то, чего не знает хотя бы один персонаж на экране.\\\"\",\"slug\":\"dramatic-irony-is-when-the-audience-knows-information-at-lea\"},{\"title\":\"Драматическая ирония: зритель знает больше персонажа\",\"tags\":\"definition show-example subtext\",\"excerpt\":\"\\\"Драматическая ирония: зритель знает то, о чём хотя бы один персонаж на экране не догадывается. Это нагнетает саспенс в триллере (хичкоковская «бомба под столом»), рождает комизм в комедии (большинств\",\"slug\":\"dramatic-irony-is-when-the-audience-knows-something-that-at\"},{\"title\":\"Драматическая ирония: зритель знает — персонаж нет\",\"tags\":\"definition principle mystery-suspense\",\"excerpt\":\"\\\"Один из главных способов создать напряжение — драматическая ирония: зритель знает об угрозе, а персонаж — нет. Мы боимся за него именно потому, что он не подозревает об опасности.\\\"\",\"slug\":\"dramatic-irony-generates-suspense-by-revealing-the-danger-to\"},{\"title\":\"Драматическая ирония: зритель знает, жертва — нет\",\"tags\":\"definition mystery-suspense\",\"excerpt\":\"\\\"Драматическая ирония — когда даёшь информацию зрителю, но скрываешь её хотя бы от одного персонажа: его и называют жертвой драматической иронии.\\\"\",\"slug\":\"dramatic-irony-withholds-information-from-at-least-one-chara\"},{\"title\":\"Драматическая последовательность — сцены ради одной подцели\",\"tags\":\"definition act-structure\",\"excerpt\":\"\\\"Главное драматическое действие часто дробится на более удобные единицы — драматические последовательности: цепочки сцен, объединённых одной подцелью (способом достичь цели).\\\"\",\"slug\":\"dramatic-sequences-are-successions-of-scenes-connected-to-th\"},{\"title\":\"Драматический вопрос держит зрителя в Act 2\",\"tags\":\"definition hook act-structure\",\"excerpt\":\"\\\"Драматический вопрос: главный hook, удерживающий зрителя в драматическом Act 2. В сюжетной истории это «Получит ли протагонист то, чего хочет?» В истории, ведомой персонажем, — «Получит ли протагонис\",\"slug\":\"dramatic-question-is-the-act-2-hook-asking-whether-the-prota\"},{\"title\":\"Драматический вопрос держит зрителя до финала\",\"tags\":\"definition principle act-structure pacing\",\"excerpt\":\"\\\"Драматический третий акт показывает последствия действия — когда мы наконец отвечаем на то, что называем драматическим вопросом: вопросом, удерживающим интерес зрителя на протяжении почти всей истори\",\"slug\":\"the-dramatic-question-is-what-sustains-audience-interest-acr\"},{\"title\":\"Драматический вопрос — Hero, Goal, Obstacle, Stakes в одном\",\"tags\":\"principle definition logline story-engine\",\"excerpt\":\"\\\"Story DNA ставит вопрос. Этот вопрос создаёт главное напряжение истории: «Сумеет ли герой преодолеть препятствие и достичь цели — или его настигнет ужасная участь (то есть stakes)?» Это и есть драмат\",\"slug\":\"the-dramatic-question-boils-down-hero-goal-obstacle-and-stak\"},{\"title\":\"Драматический язык — лучший переводчик\",\"tags\":\"principle serialization empathy protagonist\",\"excerpt\":\"\\\"Во-первых, драматический язык помогает пересекать границы куда лучше, чем любой естественный язык, включая английский. Жёсткая драматическая структура — на уровне сериала, сезона, сюжетной линии и эп\",\"slug\":\"dramatic-language-crosses-borders-better-than-any-natural-la\"},{\"title\":\"Единицы хронометража — условный счёт страниц\",\"tags\":\"definition format act-structure\",\"excerpt\":\"\\\"Единицы хронометража определяются по условному числу страниц или минут — примерно одна страница в минуту.\\\"\",\"slug\":\"logistical-units-are-defined-by-an-arbitrary-page-or-minute\"},{\"title\":\"Единого стандарта структуры pilot не существует\",\"tags\":\"principle tactical-rule author-opinion pilot-structure format\",\"excerpt\":\"\\\"Единого отраслевого стандарта структуры и формата больше нет. Нестандартная композиция, гибридный тон, размытые жанры, которые ломают формулу или выходят за её рамки — всё это оправдано, если в резул\",\"slug\":\"no-single-industry-standard-for-pilot-structure-and-format-r\"},{\"title\":\"Жанр в TV — про эпизод, не про шоу\",\"tags\":\"definition principle show-example genre season-arc episodes\",\"excerpt\":\"\\\"В телевидении жанры напрямую применимы к аркам сезонов и эпизодам, но не к шоу в целом. Шоу может менять жанры от эпизода к эпизоду. Сериал вроде Buffy the Vampire Slayer...\\\"\",\"slug\":\"tv-genres-apply-to-season-arcs-and-episodes-not-whole-shows\"},{\"title\":\"Жанр — основа TV-разработки даже в эпоху гибридов\",\"tags\":\"principle genre\",\"excerpt\":\"\\\"Жанр — в центре того, как профессионалы TV-разработки думают о своей работе, даже в эпоху смешения и разрушения жанров. Какому жанру принадлежит новый pitch? Каковы его традиционные правила — и хочет\",\"slug\":\"genre-framing-remains-central-to-tv-development-even-in-genr\"},{\"title\":\"Жанр — это мир, профессия или тема серии\",\"tags\":\"definition genre format\",\"excerpt\":\"\\\"Жанры — это категории сериалов, определяемые миром истории, профессией персонажей или темой. Жанр — подмножество формата.\\\"\",\"slug\":\"tv-genres-are-categories-defined-by-series-world-character-p\"},{\"title\":\"Жанр — это прежде всего обещание эмоции\",\"tags\":\"principle tactical-rule genre tone\",\"excerpt\":\"\\\"Прежде всего жанр обещает эмоцию. Комедия обещает смех. Хоррор обещает ужас. Триллер обещает страх. И так далее. Именно за эмоцией мы покупаем билет в кино или включаем телевизор. Поэтому первый вопр\",\"slug\":\"genres-primary-function-is-to-promise-a-sustained-emotion\"},{\"title\":\"Жанровые мотивы требуют неожиданного поворота\",\"tags\":\"principle genre\",\"excerpt\":\"\\\"Но есть загвоздка. Если просто выдать все эти мотивы в точности так, как зритель ожидает, история покажется предсказуемой. Выходит, не угодишь ни так, ни этак. На самом деле — угодишь. Большинству мо\",\"slug\":\"genre-motifs-must-be-twisted-to-avoid-predictability\"},{\"title\":\"Жанровый сдвиг удивляет сильнее сюжетного твиста\",\"tags\":\"principle genre tone\",\"excerpt\":\"«Свежесть рождается из смешения жанров — как на американских горках. Да, зрителя нужно удивлять нарративными твистами и клиффхэнгерами, но куда острее удивлять жанровыми сдвигами. Думаешь, начинается \",\"slug\":\"combining-genres-surprises-viewers-more-than-narrative-twist\"},{\"title\":\"Жанры Save the Cat! — цели, темы, архетипы\",\"tags\":\"definition genre\",\"excerpt\":\"\\\"Жанры Save the Cat! устроены иначе. Они говорят о целях персонажей, тематических тенденциях и общих архетипах, которые снова и снова повторяются в историях, что мы смотрим и читаем.\\\"\",\"slug\":\"save-the-cat-genres-classify-stories-by-character-goals-them\"},{\"title\":\"Жертва в пилоте — и зритель уже за него\",\"tags\":\"principle empathy pilot\",\"excerpt\":\"\\\"Если сделать персонажа жертвой — особенно в pilot, когда мы только знакомимся с ним, — мы сразу проникаемся к нему симпатией, начинаем болеть за него и полюбим его. Однажды журналист спросил Клинта И\",\"slug\":\"victimizing-a-character-early-in-a-pilot-makes-the-audience\"},{\"title\":\"Жизненные события как клиффхэнгер\",\"tags\":\"principle cliffhangers relationships character-arc\",\"excerpt\":\"\\\"Жизненные события: многие клиффхэнгеры в драмах строятся на событиях жизненного цикла — свадьбах, изменах, разводах, помолвках, расставаниях, беременностях и родах — и сталкивают персонажей с силами,\",\"slug\":\"life-event-cliffhangers-pit-characters-against-forces-that-m\"},{\"title\":\"Жизнь полна магического реализма\",\"tags\":\"principle theme\",\"excerpt\":\"\\\"Жизнь полна магического реализма. Каждый из нас сталкивается с ним ежедневно. Объяснить это, как правило, невозможно. Сколько раз мы натыкаемся на случайное совпадение, хватаемся за голову и говорим:\",\"slug\":\"daily-life-is-full-of-magic-realism-through-chance-events-th\"},{\"title\":\"Журналист меняет мир косвенно — и это проблема для franchise\",\"tags\":\"principle story-engine\",\"excerpt\":\"\\\"Вторая причина: журналисты ведут активное расследование, но не влияют на исход напрямую. Полицейские сажают убийц за решётку. Врачи спасают жизни. Кульминация журналистской истории — публикация матер\",\"slug\":\"one-reason-journalism-struggles-as-a-tv-franchise-is-that-jo\"},{\"title\":\"Журналистика так и не стала жизнеспособным TV-franchise\",\"tags\":\"show-example principle story-engine genre concept-testing\",\"excerpt\":\"\\\"Журналистика не стала успешным TV-franchise. Казалось бы, должна была: неограниченный поток дел, высокие ставки (пусть и редко со смертельным исходом), моральная сложность и бесконечный конфликт. Но \",\"slug\":\"journalism-has-not-proven-to-be-a-viable-tv-drama-franchise\"},{\"title\":\"Жёсткие точки перелома убивают непредсказуемость\",\"tags\":\"tactical-rule principle act-structure pacing\",\"excerpt\":\"\\\"Точки перелома не обязаны случаться на конкретной странице или минуте — особенно в стриминге и на премиум-каналах. Напротив: чем строже следуешь заданным вехам, тем предсказуемее и шаблоннее становит\",\"slug\":\"following-set-milestones-for-turning-points-makes-stories-fe\"},{\"title\":\"Завязка в процедурале сдвинулась с 10-й минуты на 5-ю\",\"tags\":\"principle tactical-rule pacing act-structure episode-pattern\",\"excerpt\":\"«Завязка в процедурале — событие, запускающее главное драматическое действие эпизода, — раньше случалась примерно на 10-й или 12-й минуте часового эпизода. Теперь её сдвинули на 5-ю или 6-ю, а то и ра\",\"slug\":\"procedural-inciting-incidents-have-moved-from-minute-1012-to\"},{\"title\":\"Завязка — цепочка событий, запускающих цель протагониста\",\"tags\":\"definition act-structure\",\"excerpt\":\"\\\"Завязка-действие: иногда в истории нет одного завязочного события (см. ниже), а есть завязка-действие — цепочка событий в первом драматическом акте, которая запускает цель протагониста.\\\"\",\"slug\":\"inciting-action-is-a-succession-of-events-in-the-first-act-t\"},{\"title\":\"Загадка открывает скобку — мозг хочет закрыть\",\"tags\":\"principle mystery-suspense hook\",\"excerpt\":\"«Так работает тайна: стоит её задать — открывается скобка, которую человеческий разум всегда будет стремиться закрыть.»\",\"slug\":\"setting-up-a-mystery-opens-a-bracket-the-human-mind-wants-to\"},{\"title\":\"Закадровый голос — костыль, если им злоупотреблять\",\"tags\":\"principle author-opinion show-example pilot hook\",\"excerpt\":\"\\\"С закадровым голосом работает принцип «меньше — лучше». Используй его скупо, искусно, иронично или с юмором — иначе это костыль повествования. Меня лично закадровый голос в pilot Outlander поначалу п\",\"slug\":\"voice-over-becomes-a-narrative-crutch-unless-used-sparingly\"},{\"title\":\"Закадровый голос — типичная правка после тест-показа\",\"tags\":\"definition show-example pilot-structure\",\"excerpt\":\"\\\"Ещё одно частое решение, когда тестовая аудитория запутывается, — добавить закадровый голос. (Закадровый монолог персонажа Стефана в начале pilot'а The Vampire Diaries был добавлен в постпродакшне, ч\",\"slug\":\"voice-over-narration-is-a-common-post-production-fix-for-tes\"},{\"title\":\"Закажи хотя бы один профессиональный разбор скрипта\",\"tags\":\"practice-story tactical-rule\",\"excerpt\":\"\\\"Это значит: обязательно закажи хотя бы один профессиональный разбор у рецензента или компании, которым доверяешь, — и оставь время, чтобы воплотить их рекомендации. Лично я заказываю минимум два полн\",\"slug\":\"commission-at-least-one-professional-script-report-from-a-re\"},{\"title\":\"Закон защищает исполнение, а не идею\",\"tags\":\"principle tactical-rule specificity\",\"excerpt\":\"\\\"Идеи закон не защищает — он защищает только конкретное воплощение идей. Идея «бухгалтер днём, супергерой ночью» не защищена. Но её детальная и проработанная реализация защищена: имена персонажей, мес\",\"slug\":\"copyright-protects-specific-execution-not-the-idea-itself\"},{\"title\":\"Закройте пробел в бэкстори протагониста как можно раньше\",\"tags\":\"principle tactical-rule show-example backstory pilot\",\"excerpt\":\"«Первый вариант — следить за тем, чтобы тайна бэкстори протагониста не затягивалась слишком долго. Хороший пример — первый сезон Happy Valley: протагонист, Кэтрин Кавуд, поначалу знает о ключевых собы\",\"slug\":\"ideally-bridge-the-protagonists-backstory-information-gap-ea\"},{\"title\":\"Закрывай питч прямым вопросом: «Прочтёте?»\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Остался последний шаг — закрыть сделку. Любой хороший продавец скажет: это значит попросить о покупке. В нашем случае — напрямую спросить покупателя, готов ли он прочесть ваш сценарий, рукопись или b\",\"slug\":\"close-the-pitch-by-directly-asking-the-buyer-to-read-the-mat\"},{\"title\":\"Закрытая история начинается и кончается в одном эпизоде\",\"tags\":\"definition serialization\",\"excerpt\":\"\\\"Закрытая история — приём, при котором история начинается и заканчивается в рамках одного эпизода сериала, в отличие от сериализованного, или открытого, повествования.\\\"\",\"slug\":\"closed-ended-storytelling-tells-stories-that-begin-and-end-w\"},{\"title\":\"Закрытая тайна скрыта и от героя, и от зрителя\",\"tags\":\"definition show-example principle mystery-suspense serialization\",\"excerpt\":\"\\\"True Detective, Broadchurch, The Killing, The Girl With the Dragon Tattoo… В профессиональном сленге TV это называют закрытыми тайнами. Смысл простой: протагонист не знает о тайне — и зритель тоже не\",\"slug\":\"closed-mysteries-hide-the-mystery-from-both-protagonist-and\"},{\"title\":\"Записывать фидбэк — знак уважения\",\"tags\":\"tactical-rule practice-story\",\"excerpt\":\"\\\"Если вам повезло получить обратную связь — слушайте внимательно. Если собеседник углубляется в детали, спросите, можно ли делать заметки. Записывать — это знак уважения. Бывает, я даю подробный фидбэ\",\"slug\":\"taking-notes-when-given-detailed-feedback-is-a-sign-of-respe\"},{\"title\":\"Запрос работает только как часть процесса\",\"tags\":\"principle author-opinion\",\"excerpt\":\"\\\"Я не говорю, что рассылать письма покупателям не стоит. Но они работают лишь тогда, когда вы видите их частью процесса, в который входят рекомендации, холодные звонки, pitch fest'ы и конкурсы. Считай\",\"slug\":\"query-letters-work-best-as-one-step-in-a-multi-channel-outre\"},{\"title\":\"Запрос — не длиннее одной страницы\",\"tags\":\"tactical-rule format\",\"excerpt\":\"\\\"Коротко. Запрос занимает меньше одной страницы. Точка.\\\"\",\"slug\":\"query-letters-must-be-less-than-one-page\"},{\"title\":\"Зарубежные питчи: мир есть, истории нет\",\"tags\":\"pitfall practice-story world-building premise\",\"excerpt\":\"\\\"Большинство слабых питч-документов приходит ко мне с международного рынка. Скажу прямо: в них зачастую вообще нет истории. Много картинок, слайдов, всякой всячины. Вот этот мир, вот тот мир… А я дума\",\"slug\":\"international-pitch-documents-often-contain-a-world-but-no-s\"},{\"title\":\"Застрявший гроб — метафора всего сериала\",\"tags\":\"show-example opening-image tone pilot-structure\",\"excerpt\":\"\\\"ОТКРЫВАЮЩИЙ ОБРАЗ (0–2 мин.): «Наступает ночь», — говорит Гильермо, наш обычный человек на службе у вампиров, готовясь к торжественному пробуждению своего хозяина Нандора. Гроб застрял. Это микрокосм\",\"slug\":\"what-we-do-in-the-shadows-opens-on-guillermo-preparing-for-n\"},{\"title\":\"Защитите идею копирайтом до питча\",\"tags\":\"tactical-rule author-opinion\",\"excerpt\":\"\\\"Прежде чем отправить сценарий или рукопись кому-либо — прежде чем питчить идею или вообще рассказывать о ней — зарегистрируйте авторское право. (Информация на www.copyright.gov.) Это лучшая юридическ\",\"slug\":\"register-your-screenplay-for-copyright-before-sending-pitchi\"},{\"title\":\"Звоните продюсерам рано утром или после работы\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"СОВЕТ ПО ЗВОНКАМ — КОГДА ЗВОНИТЬ Многие занятые продюсеры работают дольше своих ассистентов. Чтобы попасть напрямую, попробуйте звонить рано утром или после окончания рабочего дня — тогда он может ок\",\"slug\":\"phone-producers-early-morning-or-after-hours-to-bypass-assis\"},{\"title\":\"Зеркало интимной сцены бьёт сильнее смерти\",\"tags\":\"show-example principle subtext relationships visual-style\",\"excerpt\":\"«Крис: Зеркальное отражение сцены адюльтера, которую Марти записал на видео, было для нас огромной вещью. Мы делаем много эффектных сцен смерти, но когда Марти и Венди наконец пытаются снова сблизитьс\",\"slug\":\"mirroring-an-earlier-intimate-scene-can-land-harder-than-spl\"},{\"title\":\"Злодей ≠ антагонист: в чём разница\",\"tags\":\"definition characters antagonist\",\"excerpt\":\"\\\"Злодей — концептуально отрицательный персонаж, противостоящий концептуально положительному протагонисту (герою). Злодей — это не то же самое, что антагонист, и далеко не каждая история нуждается в зл\",\"slug\":\"a-villain-is-a-conceptually-negative-character-opposing-a-co\"},{\"title\":\"Знай конкурентов по жанру — объясни, чем ты другой\",\"tags\":\"tactical-rule principle comparables genre\",\"excerpt\":\"\\\"Если вы нашли нужных людей для питча, они разбираются в вашем жанре профессионально. Вы должны знать о нём не меньше, а лучше — больше. Изучите все конкурирующие шоу, похожие на ваше. Сделайте домашн\",\"slug\":\"know-rival-shows-in-your-genre-and-be-ready-to-explain-what\"},{\"title\":\"Знакомство до питча улучшает его приём\",\"tags\":\"tactical-rule pitch\",\"excerpt\":\"\\\"Общайтесь. Иногда лучше сначала познакомиться с человеком, а не идти сразу с питчем. Если executive или продюсер проникнется симпатией к вам ещё до того, как услышит питч, шансы на то, что он отнесёт\",\"slug\":\"socializing-with-executives-before-pitching-improves-recepti\"},{\"title\":\"Знакомый мир свеж, если он предельно конкретен\",\"tags\":\"principle tactical-rule specificity world-building premise\",\"excerpt\":\"\\\"Самый простой способ сделать мир свежим — сделать его конкретным. Очень конкретным. Не надо просто приходить с шоу о женщине в бытовом сексизме 1960-х. Приходи с шоу о молодой еврейской маме, которая\",\"slug\":\"make-a-familiar-world-fresh-by-making-it-very-specific\"},{\"title\":\"Знание арены делает вас экспертом на питче\",\"tags\":\"principle tactical-rule world-building specificity\",\"excerpt\":\"\\\"Очень советую исследовать арену своего сериала — копать глубже, выискивать конкретику. Это даст контекст для причуд персонажей и идей историй, а главное — сделает вас экспертом на питче. Когда вы зак\",\"slug\":\"researching-your-series-arena-makes-you-an-authority-when-pi\"},{\"title\":\"Зрители хотят смысла, а не только развлечения\",\"tags\":\"principle theme\",\"excerpt\":\"\\\"Не только executives хотят, чтобы их шоу несло глубокий смысл — зрители тоже. Да, когда мы смотрим лёгкое шоу, нам хочется сладкого десерта. Но мы хотим, чтобы к нему прилагалось и что-то сытное. Осо\",\"slug\":\"audiences-want-shows-to-feel-meaningful-not-just-entertainin\"},{\"title\":\"Зритель должен стать героем, а не наблюдать\",\"tags\":\"principle empathy protagonist\",\"excerpt\":\"\\\"Кино, сценарии и романы — это соучастные события. Чтобы пережить эмоциональные горки, которые они предлагают, зритель не может просто наблюдать за действием — он должен стать героем, вместе с ней пре\",\"slug\":\"audiences-must-become-the-hero-not-just-observe-because-stor\"},{\"title\":\"Зритель ищет в ТВ отражение себя\",\"tags\":\"principle theme empathy\",\"excerpt\":\"\\\"Мы ищем в ТВ подтверждение себя. Это не философская аффирмация. Мы смотрим ТВ, чтобы увидеть людей, похожих на нас: они живут так же, как мы, сталкиваются с теми же трудностями. Видеть себя в культур\",\"slug\":\"viewers-turn-to-tv-for-validation-by-seeing-themselves-refle\"},{\"title\":\"Зритель тянется к тому, кто в конфликте\",\"tags\":\"principle definition empathy protagonist\",\"excerpt\":\"«С точки зрения драматургии, мы склонны отождествлять себя с тем персонажем или персонажами, которые переживают наибольший конфликт в истории.»\",\"slug\":\"audiences-identify-with-the-character-experiencing-the-most\"},{\"title\":\"Иерархия Маслоу помогает оценить размер аудитории\",\"tags\":\"principle tactical-rule concept-testing premise genre\",\"excerpt\":\"\\\"Когда вы определили главную проблему истории, попробуйте найти ей место в иерархии потребностей Маслоу — это даст представление о потенциальном размере аудитории. Затем можно проверить, согласуются л\",\"slug\":\"position-the-main-problem-on-maslows-hierarchy-to-gauge-audi\"},{\"title\":\"Имена постоянных героев — с разных букв\",\"tags\":\"tactical-rule principle characters\",\"excerpt\":\"\\\"И последнее: простое, но важное правило питч-библий — давать постоянным персонажам имена, начинающиеся с разных букв.\\\"\",\"slug\":\"series-regular-names-should-begin-with-different-first-lette\"},{\"title\":\"Имя персонажа в питче — пустая трата времени\",\"tags\":\"tactical-rule principle protagonist logline\",\"excerpt\":\"\\\"Не тратьте время питча на имя выдуманного персонажа — оно ничего важного об истории не говорит. Более того, имя только навредит.\\\"\",\"slug\":\"omit-a-fictional-characters-name-when-pitching\"},{\"title\":\"Инвалидность — ситуация, не изъян персонажа\",\"tags\":\"principle pitfall character-arc characters\",\"excerpt\":\"\\\"Остерегайтесь изъяна, который не является изъяном. Некоторые кажущиеся внутренние изъяны — всего лишь внешние обстоятельства. Например, инвалидность — это не изъян. В случае физической инвалидности э\",\"slug\":\"disabilities-are-situations-not-character-flaws\"},{\"title\":\"Индустрия судит по эффективности, не по «качеству»\",\"tags\":\"principle concept-testing\",\"excerpt\":\"\\\"Все хотят работать с «хорошими» проектами. Но «хорошее» — понятие субъективное. Профессионалы индустрии обычно мыслят категориями не «хорошо», а «работает». Работает ли шоу? Справляется ли оно с зада\",\"slug\":\"industry-professionals-judge-shows-by-effectiveness-rather-t\"},{\"title\":\"Иноязычный сериал может захватить мир\",\"tags\":\"principle author-opinion overview\",\"excerpt\":\"\\\"Последние годы доказали: если сериал снят не на английском — это не значит, что он не доберётся до мирового зрителя. Для меня цель всегда была одна: делать локальные истории, которые хорошо путешеств\",\"slug\":\"non-english-language-series-can-reach-global-audiences-on-st\"},{\"title\":\"Интеллектуальный азарт — это путь к тайне\",\"tags\":\"principle show-example mystery-suspense genre\",\"excerpt\":\"«Если вас прежде всего влечёт интеллектуальное удовольствие, вы, скорее всего, выберете тайну — а возможно, и сюрприз (Broadchurch, Fortitude, Sharp Objects).»\",\"slug\":\"writers-primarily-after-intellectual-gratification-will-prob\"},{\"title\":\"Ироничный заголовок играет на контрасте\",\"tags\":\"show-example principle logline hook tone\",\"excerpt\":\"\\\"Есть ещё один подход — рискованнее, потому что он рассчитывает на зрителя, который уже немного знает сериал: придумать ироничное название, которое контрастирует с содержанием. Можно сыграть на двойно\",\"slug\":\"ironic-titles-create-contrast-between-content-and-title-and\"},{\"title\":\"Исключение — сериал без чёткого типа истории\",\"tags\":\"principle definition genre story-engine\",\"excerpt\":\"\\\"Если это про ваш проект — скорее всего, вы делаете что-то иное: гибрид, где два или больше типов истории переплетаются, либо исключение — сериал без чёткого типа. Вспомните Happy Valley, Mr. Robot, F\",\"slug\":\"an-exception-is-a-series-with-no-clear-story-type\"},{\"title\":\"Искра в глазах слушателя — суть хорошего питча\",\"tags\":\"practice-story principle concept-testing\",\"excerpt\":\"\\\"И вот однажды я питчевал идею продюсеру — и что-то пошло иначе. Я увидел это сначала в его глазах. Я задел за живое. Я случайно нащупал то, что гуру сценаристики Линда Аронсон называет искрой. Искра \",\"slug\":\"the-spark-in-a-listeners-eyes-marks-the-essence-of-a-good-pi\"},{\"title\":\"Искусственный клиффхэнгер в каждом акте убивает\",\"tags\":\"principle pitfall cliffhangers act-structure\",\"excerpt\":\"\\\"Сегодня вставлять клиффхэнгер в конец каждого акта — смерти подобно. «Писать на разрыв акта» через натяжку больше не работает.\\\"\",\"slug\":\"forcing-a-cliffhanger-at-every-act-break-is-deadly-today\"},{\"title\":\"Искушение объяснить всё убивает питч\",\"tags\":\"pitfall overview pacing\",\"excerpt\":\"\\\"Большинство авторов, которые питчат сериалы, хотят сказать слишком много. Они стремятся разжевать каждую деталь — лишь бы слушатель увидел и понял всё то, что видят они. Это раздувает питч до неприли\",\"slug\":\"pitch-writers-temptation-to-over-describe-creates-pitches-th\"},{\"title\":\"Истинный антагонист раскрывается лишь в финале\",\"tags\":\"principle show-example antagonist mystery-suspense climax\",\"excerpt\":\"\\\"Нередко истинный антагонист не открывается как враг вплоть до финала. Вспомните Lady Trieu и сенатора Джо Кина в Watchmen. А также финальные эпизоды первых сезонов The Undoing, Mare of Easttown, The \",\"slug\":\"the-true-antagonist-is-often-not-revealed-as-the-enemy-until\"},{\"title\":\"История начинается до старта путешествия героя\",\"tags\":\"principle definition show-example opening-image protagonist pilot-structure\",\"excerpt\":\"\\\"Чтобы история по-настоящему захватила нас, мы должны войти в неё раньше, чем начнётся путешествие героя. Мы хотим видеть, кто он и где живёт — до того, как случится что-то из ряда вон. Молодой фабрич\",\"slug\":\"story-setup-must-show-the-heros-everyday-life-before-the-jou\"},{\"title\":\"История начинается с персонажа в центре\",\"tags\":\"principle protagonist\",\"excerpt\":\"\\\"Когда проектируешь историю, всё начинается с персонажа. Упростим задачу: оставим в стороне многолинейные нарративы и сериалы со множеством сюжетных линий и протагонистов. Возьмём одного протагониста \",\"slug\":\"for-this-author-story-design-starts-with-character-at-its-ce\"},{\"title\":\"История семьи даёт миру сериала вес\",\"tags\":\"principle world-building backstory relationships\",\"excerpt\":\"«Чем больше вещей вращается вокруг тебя в твоей эмоциональной солнечной системе — тем сильнее притяжение. Знание семейной истории, думаю, даёт зрителям ощущение твёрдой почвы под ногами: они понимают,\",\"slug\":\"knowing-family-history-gives-the-audience-a-sense-of-solidit\"},{\"title\":\"Ищи продюсера с POD, у которого нет шоу в эфире\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Ищи телепродакшены, которые активно разрабатывают сериалы к новому питчинг-сезону. Твоя цель — продюсеры с Production Overall Deals (POD) при студиях и network'ах. Хорошая идея — найти того, у кого н\",\"slug\":\"target-producers-with-pods-who-had-a-recent-hit-but-no-curre\"},{\"title\":\"Ищи редакторов, работавших над схожими книгами\",\"tags\":\"tactical-rule comparables\",\"excerpt\":\"\\\"В издательствах ищи прежде всего редакторов — желательно тех, кто работал с книгами, которые ты берёшь за ориентир.\\\"\",\"slug\":\"at-publishing-houses-target-editors-who-worked-on-your-antec\"},{\"title\":\"Ищите покупателей с первой идеи, не после\",\"tags\":\"principle tactical-rule overview\",\"excerpt\":\"\\\"Не ждите, пока screenplay или рукопись будут готовы к продаже. Начинайте искать покупателей, как только появился concept истории, и продолжайте собирать список компаний всё время, пока пишете.\\\"\",\"slug\":\"begin-researching-potential-buyers-as-soon-as-you-have-a-sto\"},{\"title\":\"К пакету разработки добавляют продюсера, режиссёра и звезду\",\"tags\":\"definition format\",\"excerpt\":\"\\\"К творческому пакету TV-разработки можно добавить продюсера, режиссёра и, возможно, звезду. (Чуть позже объясню, почему я говорю «звезда», а не «актёр».) Сегодня большинство TV-проектов на стадии раз\",\"slug\":\"additional-tv-development-creative-elements-can-include-a-pr\"},{\"title\":\"Каждый акт заканчивается поворотом или клиффхэнгером\",\"tags\":\"definition tactical-rule cliffhangers act-structure\",\"excerpt\":\"\\\"В конце каждого из этих 12-минутных актов — поворотный момент или клиффхэнгер: чтобы зритель вернулся после рекламы. Нерешённый конфликт в финале акта держит аудиторию и заставляет её досмотреть посл\",\"slug\":\"each-logistical-act-ends-with-a-turning-point-or-cliffhanger\"},{\"title\":\"Каждый раздел питча должен быть сжатым\",\"tags\":\"principle tactical-rule overview\",\"excerpt\":\"\\\"Каждый раздел питча должен работать на экономию. Автор, питчующий сериал, выбирает слова и конструкции, которые говорят максимум — в минимуме слов.\\\"\",\"slug\":\"every-section-of-a-tv-pitch-should-aim-for-economy\"},{\"title\":\"Каждый сезон заканчивают на крючке — кроме исключений\",\"tags\":\"principle tactical-rule season-arc cliffhangers end-hook\",\"excerpt\":\"\\\"Сколько бы сезонных арок вы ни включили в bible, каждый сезон должен заканчиваться на крючке — если только это не процедурал, не ограниченная серия, не мини-сериал-антология или что-то похожее. Обычн\",\"slug\":\"each-season-arc-should-end-on-a-cliffhanger-hook-except-in-p\"},{\"title\":\"Каждый эпизод — тот же, но другой\",\"tags\":\"definition principle episodes story-engine episode-pattern\",\"excerpt\":\"\\\"Обслуживать franchise сериала — значит предлагать верным зрителям шоу, которое от эпизода к эпизоду остаётся в основе своей неизменным, но при этом другим. Базовая обстановка и premise жанра почти не\",\"slug\":\"servicing-the-franchise-means-delivering-episodes-that-are-f\"},{\"title\":\"Какие старые жанры ТВ забыты — и как их обновить?\",\"tags\":\"tactical-rule genre concept-testing\",\"excerpt\":\"\\\"Ещё один вопрос, который часто звучит на питч-сессиях: «Каких жанров сейчас нет на телевидении?» Иными словами: «Что когда-то работало, но сейчас упускается из виду?» Как я уже говорил, большинство п\",\"slug\":\"ask-which-past-tv-genres-are-absent-now-and-how-to-update-th\"},{\"title\":\"Карточка — не больше двух-трёх предложений\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Не выходите за два-три предложения. Одно предложение — вполне достаточно. Краткость описания даёт ещё одно преимущество: карточку легче выбросить.\\\"\",\"slug\":\"keep-index-cards-to-two-or-three-sentences-maximum\"},{\"title\":\"Карточки на акт в часовом телеплее: 6–10, 5–8, 5–8\",\"tags\":\"tactical-rule act-structure format\",\"excerpt\":\"\\\"КАРТОЧКИ НА АКТ (ЧАСОВОЙ ФОРМАТ) АКТ 1: 6–10 карточек АКТ 2: 5–8 карточек АКТ 3: 5–8 карточек\\\"\",\"slug\":\"hour-long-teleplay-card-budget-per-act-runs-610-for-act-1-an\"},{\"title\":\"Кендалл Рой в Succession — совесть шоу, бьющий только вверх\",\"tags\":\"show-example protagonist empathy\",\"excerpt\":\"\\\"Ответ — в Кендалле как моральном центре шоу. Кендалл топил себя в наркотиках, чтобы не чувствовать бесчеловечного уклада своей семьи. Он не мог это вынести, а компульсивная зависимость принесла собст\",\"slug\":\"successions-kendall-roy-serves-as-the-shows-moral-center-who\"},{\"title\":\"Классическое недоразумение — две иронии, питающие друг друга\",\"tags\":\"principle definition subtext\",\"excerpt\":\"\\\"Драматическая ирония может порождать классическое недоразумение — когда два персонажа становятся жертвами двух разных драматических ироний, которые питают друг друга. Возникает недоразумение, рождающ\",\"slug\":\"classical-misunderstanding-arises-when-two-characters-dramat\"},{\"title\":\"Клиффхэнгер бьёт только по любимым персонажам\",\"tags\":\"principle cliffhangers empathy\",\"excerpt\":\"\\\"Без всех этих маленьких моментов, когда любишь персонажей и узнаёшь себя в них, всё остальное не имеет значения. Это работает почти на уровне подсознания. Но без любви и привязанности клиффхэнгер не \",\"slug\":\"cliffhangers-have-no-impact-without-character-moments-that-b\"},{\"title\":\"Клиффхэнгер: герой в опасности или под ударом тайны\",\"tags\":\"definition principle cliffhangers\",\"excerpt\":\"\\\"Клиффхэнгер — приём, при котором один или несколько персонажей оказываются в смертельной опасности или лицом к лицу с потрясающим открытием.\\\"\",\"slug\":\"cliffhanger-is-a-plot-device-leaving-characters-in-danger-or\"},{\"title\":\"Клиффхэнгер-«приманка» оскорбляет зрителя\",\"tags\":\"principle cliffhangers\",\"excerpt\":\"«В сценарных комнатах есть термин, который вы наверняка знаете, — \\\"schmuck bait\\\": клиффхэнгер, который проверяет, до какой степени зритель готов закрыть глаза на неправдоподобие. Я такого не делаю. По\",\"slug\":\"schmuck-bait-cliffhangers-insult-the-audience-by-testing-wil\"},{\"title\":\"Кода в Advanced Pitch Sentence — намёк на внутреннюю арку\",\"tags\":\"tactical-rule definition logline character-arc premise\",\"excerpt\":\"\\\"Напоследок добавляется кода. Она замыкает внутреннюю историю твистом, намекая, куда движется рост персонажа — кивок в сторону финала его арки. Часто в этом твисте ощущается уместная ирония. Итоговый \",\"slug\":\"advanced-pitch-sentence-template-adds-a-coda-specifying-nece\"},{\"title\":\"Комедии делятся на multi-camera и single-camera\",\"tags\":\"definition format genre\",\"excerpt\":\"\\\"Комедии, как правило, делятся на multi-camera и single-camera sitcom'ы.\\\"\",\"slug\":\"comedies-are-generally-classified-as-either-multi-camera-or\"},{\"title\":\"Комедию питчат холодно, драму — горячо\",\"tags\":\"tactical-rule principle cold-open tone genre\",\"excerpt\":\"\\\"Питчуешь комедийный сериал — начни «холодно»: остроумным, ироничным вступлением. Питчуешь драму — начни «горячо»: с провокационного тизера.\\\"\",\"slug\":\"open-comedy-pitches-cold-and-ironic-drama-pitches-hot-and-pr\"},{\"title\":\"Комедия и драма живут только вместе\",\"tags\":\"principle show-example tone genre pilot\",\"excerpt\":\"\\\"Я убеждён: ни комедию, ни драму нельзя сделать хорошо без другой. Чтобы что-то звучало по-настоящему — нужны оба. Возьмите один из моих любимых ситкомов — Cheers. В pilot мы знакомимся с завязавшим а\",\"slug\":\"effective-comedy-and-drama-require-each-other-to-feel-real\"},{\"title\":\"Конкретность делает pitch универсальным\",\"tags\":\"principle tactical-rule author-opinion specificity\",\"excerpt\":\"\\\"Конкретность и личное переживание — вот что не даёт идее стать банальной, безликой, вторичной. Каждый из нас уникален. Каждый pilot и каждый pitch тоже должны быть уникальны и близки зрителю. Любимая\",\"slug\":\"specificity-makes-a-pitch-universal-not-narrower\"},{\"title\":\"Конфликт внутри протагониста — признак character-led истории\",\"tags\":\"principle definition protagonist character-arc story-engine\",\"excerpt\":\"\\\"Если главный конфликт истории находится внутри протагониста — то есть протагонист сам себе антагонист, борется прежде всего с собой, — значит, вы создаёте character-led историю. Её фокус — главная др\",\"slug\":\"character-led-stories-locate-the-main-problem-inside-the-pro\"},{\"title\":\"Конфликт сериала должен тянуть сто эпизодов\",\"tags\":\"principle tactical-rule story-engine episodes conflict\",\"excerpt\":\"\\\"Конфликт захватывает эмоционально. Препятствия, с которыми сталкиваются персонажи, должны быть достаточно серьёзными, чтобы — если шоу выстрелит — хватило материала на сотню эпизодов.\\\"\",\"slug\":\"episodic-series-conflict-must-sustain-a-hundred-episodes\"},{\"title\":\"Короткие питчи гибнут от слабой идеи, не подачи\",\"tags\":\"pitfall principle concept-testing premise logline\",\"excerpt\":\"\\\"Коммерческие, кинематографичные концепции редки. Большинство коротких питчей проваливаются не из-за подачи, а из-за пустоты содержания. Идея либо вовсе не тянет на фильм, либо с трудом поддаётся экра\",\"slug\":\"most-short-pitches-fail-from-lack-of-filmic-content-not-pres\"},{\"title\":\"Короткие фразы — лучший способ подать новую идею\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"Как и в любом тексте — особенно когда речь о новой идее — короткие и простые фразы всегда лучше.\\\"\",\"slug\":\"shorter-less-complex-sentence-structures-are-always-apprecia\"},{\"title\":\"Короткий фильм или подкаст — прототип pilot\",\"tags\":\"tactical-rule show-example concept-testing pilot\",\"excerpt\":\"\\\"Но не забывайте «что-то делать». Превратите один из своих скриптов в веб-сериал на YouTube (как Insecure или Broad City, выросшие из веб-серий), или в фантастический подкаст (как Homecoming), или сни\",\"slug\":\"make-short-films-podcasts-or-web-series-as-prototypes-for-tv\"},{\"title\":\"Крайние образы связывают параллельные линии в целое\",\"tags\":\"tactical-rule opening-image beat-sheet storylines\",\"excerpt\":\"\\\"Используй вступительный и финальный образы как скобки, скрепляющие параллельные истории. Эти биты показывают, как истории работают единым целым, — завязывают все нити в бант.\\\"\",\"slug\":\"use-opening-and-final-images-as-bookends-to-meld-parallel-st\"},{\"title\":\"Краткий pitch — знак чёткого мышления\",\"tags\":\"principle logline hook\",\"excerpt\":\"\\\"Короткий pitch должен быть коротким — и ёмким. Чем быстрее — тем лучше. Чаще всего так не получается. Но если человек умеет донести суть и убедить продюсера прочитать сценарий минимумом слов — это по\",\"slug\":\"brevity-in-a-short-pitch-signals-succinct-storytelling-sense\"},{\"title\":\"Крепкий мир даёт качели между фарсом и трагедией\",\"tags\":\"principle show-example world-building tone\",\"excerpt\":\"«Это как MASH. Хокай [Алан Алда] остроумничает за мартини — и вдруг они идут оперировать раненого солдата, и он умирает. По-настоящему. И ты это чувствуешь. Для меня это знаковый сериал: он доказал, н\",\"slug\":\"a-grounded-world-lets-a-show-swing-between-farce-and-tragedy\"},{\"title\":\"Критика конкурентов на питче раздражает байера\",\"tags\":\"pitfall tactical-rule\",\"excerpt\":\"«Я не в восторге, когда питчующий тратит время на объяснение, чем плоха идея конкурента.»\",\"slug\":\"spending-pitch-time-disparaging-a-competitors-idea-annoys-at\"},{\"title\":\"Кульминация Tootsie — реакция жертв на разоблачение\",\"tags\":\"show-example climax mystery-suspense\",\"excerpt\":\"\\\"Например, в Tootsie иронический вопрос становится частью кульминации: мы хотим знать, как жертвы отреагируют, когда выяснится, что Дороти Майклс — мужчина.\\\"\",\"slug\":\"tootsies-climax-hinges-on-victims-discovering-dorothy-michae\"},{\"title\":\"Купить питч — значит оплатить написание pilot-скрипта\",\"tags\":\"definition tactical-rule pilot\",\"excerpt\":\"\\\"Когда автор приходит на TV network и питчит идею шоу, network в большинстве случаев решает одно: платить ли ему за написание pilot-скрипта. Платят не только за саму идею (если она основана на IP, при\",\"slug\":\"buying-a-pitch-means-paying-the-writer-to-write-the-pilot-sc\"},{\"title\":\"Куратор эфира — голос network в текущем шоу\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"Куратор эфира — это executive от network, который следит за интересами сети в идущих сериалах. Он влияет на творческое направление шоу и служит связующим звеном между network и старшим составом коман\",\"slug\":\"current-executive-is-the-network-executive-overseeing-on-air\"},{\"title\":\"Ландау: смешное — дар, которому не учат\",\"tags\":\"author-opinion genre\",\"excerpt\":\"«Комедийное письмо и исполнение — для меня это дар: либо он есть, либо нет. Да, можно освоить комедийные приёмы (правило трёх, рыба не в своей воде, смена ролей, странная парочка)… Но если честно — ни\",\"slug\":\"landau-believes-comedy-writing-is-an-innate-gift-that-cannot\"},{\"title\":\"Левинсон переписал Euphoria, сохранив суть\",\"tags\":\"principle show-example format\",\"excerpt\":\"\\\"HBO-версия Euphoria основана на израильском телеформате (созданном Роном Лешемом и Дафной Левин), но Левинсон изменил почти всё, сохранив лишь суть: безрассудные, гедонистические, психологически трав\",\"slug\":\"levinson-changed-just-about-everything-from-euphorias-israel\"},{\"title\":\"Линейные биты — чеклист, а не история\",\"tags\":\"definition pitfall tactical-rule beat-sheet pacing\",\"excerpt\":\"\\\"«Слишком линейный» — так называют биты, которые читаются как чеклист, а не как история. Либо на пути героя нет ни одного препятствия, либо битам не хватает моментов «всё пошло не так» — тех, что заст\",\"slug\":\"too-linear-beats-read-like-a-checklist-and-make-the-story-fa\"},{\"title\":\"Лицензионный сбор network — две трети бюджета эпизода\",\"tags\":\"definition\",\"excerpt\":\"\\\"Network платит студии «лицензионный сбор» за право быть первым эксклюзивным дистрибьютором сериала. Традиционно этот сбор составляет две трети реальной стоимости производства эпизода.\\\"\",\"slug\":\"a-network-license-fee-is-traditionally-two-thirds-of-an-epis\"},{\"title\":\"Личный вход доказывает: именно этот автор\",\"tags\":\"principle tactical-rule pitch specificity\",\"excerpt\":\"\\\"Вторая причина, по которой авторы обычно начинают питч с личного входа, — он доказывает покупателю, что этот конкретный автор, среди тысяч квалифицированных телесценаристов Голливуда, именно тот, кто\",\"slug\":\"personal-way-in-signals-this-writer-is-the-right-one-to-writ\"},{\"title\":\"Личный вход косвенно задаёт темы шоу\",\"tags\":\"principle tactical-rule theme hook\",\"excerpt\":\"\\\"Личный вход в сериал попутно вводит темы шоу — те, которые автор разберёт подробнее позже в питче. В личном входе в Breaking Bad, который я привёл выше, автор задаётся вопросом: что было бы, если бы \",\"slug\":\"personal-way-in-seeds-the-shows-themes-indirectly-before-exp\"},{\"title\":\"Личный контакт при питче бьёт письма и объявления\",\"tags\":\"tactical-rule overview\",\"excerpt\":\"\\\"В поисках работы — в кино и за его пределами — большинство предпочитает откликаться на объявления или писать письма, тогда как звонок или личная встреча кажутся наименее привлекательными. Но статисти\",\"slug\":\"personal-contact-outperforms-email-and-adverts-when-pitching\"},{\"title\":\"Лишнее слово после «да» — и сделка сорвана\",\"tags\":\"pitfall tactical-rule author-opinion pacing\",\"excerpt\":\"«Он сказал: \\\"У меня перебывало немало сценаристов, которые продавали мне историю за первые пять минут — а потом за следующие пять минут продавали обратно\\\". Иными словами, питч можно затянуть. Видишь, \",\"slug\":\"continuing-to-pitch-after-the-buyer-is-sold-can-unsell-the-s\"},{\"title\":\"Лишние детали тормозят историю\",\"tags\":\"pitfall practice-story pacing\",\"excerpt\":\"«Автор перегружает историю ненужными подробностями, которые не двигают её вперёд.»\",\"slug\":\"overcomplicating-the-story-with-unnecessary-information-that\"},{\"title\":\"Лишняя информация топит питч\",\"tags\":\"pitfall tactical-rule overview\",\"excerpt\":\"«Слишком долгое вступление — предыстория сюжета и главного персонажа. Слишком много о том, почему автор написал эту историю (я, я, я). Слишком много о том, насколько мне понравится история или почему \",\"slug\":\"pitches-fail-when-they-include-too-much-information-not-spec\"},{\"title\":\"Логика и ясность: что замечают продюсеры\",\"tags\":\"definition practice-story\",\"excerpt\":\"\\\"Ещё одна категория замечаний от продюсеров и экзекьютивов — логика и ясность. Они указывают на точки в истории, которые не вяжутся, выглядят немотивированными или попросту непонятны.\\\"\",\"slug\":\"logic-and-clarity-notes-flag-story-points-that-feel-unmotiva\"},{\"title\":\"Логистическая трёхактная структура: 25/50/25\",\"tags\":\"definition principle act-structure\",\"excerpt\":\"\\\"Трёхактная структура (логистическая): история делится на три акта по произвольному числу страниц или минут. Акт I (начало) — двадцать пять процентов истории, Акт II (середина) — пятьдесят, Акт III (к\",\"slug\":\"logistical-three-act-structure-divides-a-story-by-fixed-page\"},{\"title\":\"Логистические акты — форма, не содержание\",\"tags\":\"principle definition act-structure format\",\"excerpt\":\"«Количество сосисок (логистических актов) определяет длину каждой сосиски, но ничего не говорит о начинке, составе или способе приготовления. Оно лишь показывает, сколько сосисок в связке — и хотите л\",\"slug\":\"logistical-acts-define-episode-length-and-teasercliffhanger\"},{\"title\":\"Логистический акт — финал на A или B, не ниже\",\"tags\":\"definition principle act-structure storylines\",\"excerpt\":\"«Как правило, логистический акт заканчивают на линии A или B, но не на C или D.»\",\"slug\":\"logistical-acts-usually-end-on-the-a-story-or-b-story-not-on\"},{\"title\":\"Логлайн бьёт пульс истории, слоган — нет\",\"tags\":\"definition principle logline\",\"excerpt\":\"\\\"Логлайн передаёт драматический пульс истории. Слоган — нет. Логлайн Alien — «Челюсти в космосе». Слоган на постерах — «В космосе никто не услышит твой крик!» Атмосферно, но ни слова о том, про что ис\",\"slug\":\"a-logline-conveys-the-storys-dramatic-pulse-while-a-strap-li\"},{\"title\":\"Логлайн из одного Catalyst — главная ошибка\",\"tags\":\"pitfall tactical-rule example logline\",\"excerpt\":\"\\\"Не питчуй только Catalyst — главная ошибка начинающих сценаристов: они пишут логлайны, которые питчуют лишь Catalyst, оставляя суть фильма размытой. «Мальчика кусает радиоактивный паук» — не логлайн.\",\"slug\":\"pitching-only-the-catalyst-is-the-biggest-logline-mistake-be\"},{\"title\":\"Логлайн обязан содержать слово «но»\",\"tags\":\"tactical-rule definition show-example principle logline\",\"excerpt\":\"\\\"Логлайн: должен содержать слово «но». Примеры: Ted Lasso — простодушный американский тренер по футболу из Уичиты, штат Канзас, получает приглашение тренировать футбольный (то есть soccer) клуб в Англ\",\"slug\":\"logline-must-contain-the-word-but\"},{\"title\":\"Логлайн сериала — показать повторяемость DNA\",\"tags\":\"tactical-rule principle logline story-engine\",\"excerpt\":\"\\\"Логлайн сериала должен показать аудитории потенциал для еженедельной Story DNA. Опишите мир, franchise type и персонажей так, чтобы повторяющиеся Герой/Цель/Препятствие/Ставки читались сами собой.\\\"\",\"slug\":\"a-series-logline-should-make-the-potential-for-recurring-her\"},{\"title\":\"Логлайн способен сразу дать жанр, premise и franchise\",\"tags\":\"show-example principle logline genre premise\",\"excerpt\":\"\\\"Этот логлайн умно устроен: он называет жанр — и сразу возникает связь между авторами и аудиторией. Зритель с первых слов понимает, его это или нет. Меня, например, хороший шпионский экшн-триллер берё\",\"slug\":\"a-well-designed-logline-can-convey-genre-premise-and-franchi\"},{\"title\":\"Логлайн — история в одном предложении\",\"tags\":\"definition logline\",\"excerpt\":\"«Логлайн — это история в одном предложении.»\",\"slug\":\"a-logline-is-a-one-sentence-summary-of-a-story\"},{\"title\":\"Ложные сравнения убивают доверие к питчу\",\"tags\":\"pitfall practice-story comparables\",\"excerpt\":\"\\\"Некоторые авторы сравнивают свою историю с двумя фильмами — но стоит услышать питч, и ясно: он ни капли не похож на то, что они назвали.\\\"\",\"slug\":\"comparing-your-story-to-films-the-pitch-doesnt-actually-rese\"},{\"title\":\"Лучшие семейные истории — про разные взгляды, что меняются\",\"tags\":\"principle relationships character-arc\",\"excerpt\":\"\\\"Назовите это религиозным лицемерием или семейной традицией — или тем и другим; лучшие семейные истории строятся на том, что у членов семьи разные точки зрения, способные меняться со временем.\\\"\",\"slug\":\"the-best-family-dynamics-show-families-with-divergent-viewpo\"},{\"title\":\"Лучший материал в эпизодах 2–3? Начни pilot in medias res\",\"tags\":\"principle show-example hook pilot-structure pilot\",\"excerpt\":\"\\\"На современном стриминговом рынке showrunner должен зацепить зрителя как можно быстрее. Если всё лучшее начинается в эпизодах 2 и 3, подумай: может, сделать первый эпизод предысторией и открыть сериа\",\"slug\":\"if-the-strongest-story-material-falls-in-episodes-23-conside\"},{\"title\":\"Лучший сериал рождается там, где есть место спонтанности\",\"tags\":\"principle practice-story storylines\",\"excerpt\":\"«Даже когда сценарии были готовы, в день съёмок прилетали правки, прямо на площадке рождались идеи, переворачивавшие динамику сюжетной линии — и нам приходилось нагонять. Но всё это делалось ради лучш\",\"slug\":\"making-the-best-television-requires-leaving-room-for-spontan\"},{\"title\":\"Лучших покупателей оставляй напоследок\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"Если вы питчите нескольким студиям или людям — с каждым разом вы будете делать это лучше. Если расписание гибкое, умно приберечь «главных кандидатов» напоследок. Сначала разделайтесь с теми, кто «вря\",\"slug\":\"save-best-bet-buyers-for-later-in-the-pitch-schedule\"},{\"title\":\"Любитель хочет продаж; профи хочет знать, как продать\",\"tags\":\"practice-story principle\",\"excerpt\":\"«Главное различие вот в чём: любитель хочет, чтобы мы продали его сценарий, а профессионал хочет узнать, как сделать сценарий продаваемым. Разница тонкая — но огромная.»\",\"slug\":\"amateurs-want-their-script-marketed-professionals-ask-how-to\"},{\"title\":\"Любой сериал — о семье, кровной или нет\",\"tags\":\"principle definition show-example theme relationships ensemble\",\"excerpt\":\"\\\"Каждый сериал — о семье: кровной или нет. Одни буквально о семье: Succession, Schitt's Creek, Black-ish, The Chi, Ozark, Modern Family, This Is Us, The Crown и, конечно, Game of Thrones. Другие — о р\",\"slug\":\"every-tv-series-is-about-a-family-related-by-blood-or-not\"},{\"title\":\"Любой слушатель может стать внутренним чемпионом\",\"tags\":\"principle pitfall overview\",\"excerpt\":\"\\\"Питчить нужно серьёзно каждому — без исключений. Не совершайте ошибку, считая себя слишком важной персоной для семнадцатилетнего стажёра без оплаты, который ещё не родился, когда вышли все ваши любим\",\"slug\":\"pitch-every-listener-seriously-because-any-insider-can-becom\"},{\"title\":\"МакКуори питчил 40 минут без единой заметки\",\"tags\":\"practice-story\",\"excerpt\":\"«Когда я работал development executive на NBC, сценарист и режиссёр Christopher McQuarrie (он снял Mission: Impossible – Fallout) питчил шоу сорок минут подряд — ни разу не взглянув в записи, ни разу \",\"slug\":\"christopher-mcquarrie-pitched-for-40-minutes-straight-withou\"},{\"title\":\"Маленькая команда в унисон лучше большой вразнобой\",\"tags\":\"practice-story\",\"excerpt\":\"«Вся концепция была абсурдной, но я предпочту небольшую группу, которой действительно доверяю — людей, которые понимают друг друга и вместе прорабатывают всё, — чем большой room, где я не уверена, что\",\"slug\":\"schitts-creek-writers-room-preferred-small-trusted-group-ove\"},{\"title\":\"Маски в Euphoria: от доминатрикс до токсичной маскулинности\",\"tags\":\"show-example theme characters\",\"excerpt\":\"\\\"Нил: В сериале меня поразил сквозной образ маски — не только буквальный костюм кошки-доминатрикс у Кэт, но и работа с [удостоенным «Эмми»] гримом. Маска Нейта — токсичная маскулинность, за которой он\",\"slug\":\"euphoria-uses-masks-as-a-recurring-metaphor-including-kats-d\"},{\"title\":\"Маски скрывают чувства — диалог живёт\",\"tags\":\"principle show-example subtext characters\",\"excerpt\":\"«По мере того как телевидение развивалось, зрители становились всё искушённее — именно поэтому, создавая персонажей и выстраивая диалоги, важно помнить: не каждый персонаж до конца понимает собственны\",\"slug\":\"characters-behaving-antithetically-to-their-true-feelings-cr\"},{\"title\":\"Масштаб главного конфликта должен совпадать с жанром\",\"tags\":\"principle genre story-engine\",\"excerpt\":\"\\\"Убедитесь, что главный конфликт сериала соответствует масштабу жанра — это поможет дотянуться до нужной аудитории. Но помните: более мелкие проблемы можно разрабатывать в других элементах (сюжетных л\",\"slug\":\"set-the-main-problem-in-your-series-at-the-right-level-for-i\"},{\"title\":\"Мейнстримные парадигмы учат формату, не структуре\",\"tags\":\"principle act-structure beat-sheet\",\"excerpt\":\"\\\"С тех пор как Сид Филд заговорил о трёхактной структуре несколько десятилетий назад, новые подходы пытаются выйти за рамки этой упрощённой модели — добавляют акты и шаги, становятся ещё более предпис\",\"slug\":\"mainstream-screenwriting-paradigms-teach-story-format-not-st\"},{\"title\":\"Менеджер ведёт карьеру, агент ищет работу\",\"tags\":\"definition\",\"excerpt\":\"\\\"Менеджеры отличаются от агентов. Агенты помогают клиентам находить работу, менеджеры — выстраивать карьеру. По законодательству Калифорнии менеджер не вправе искать работу для клиента — это прерогати\",\"slug\":\"managers-help-clients-navigate-careers-rather-than-get-jobs\"},{\"title\":\"Ментор в pilot может раскрыться только в следующих эпизодах\",\"tags\":\"principle pilot characters serialization\",\"excerpt\":\"\\\"Полнометражный фильм всегда полностью отыгрывает персонажа Б-истории за свои два часа. Pilot может играть вдолгую. Он бросает ментора в эту точку — а раскрывает его в следующих эпизодах. Салли занима\",\"slug\":\"pilots-can-introduce-mentor-characters-who-pay-off-in-later\"},{\"title\":\"Мидпоинт запускает смену установок героев\",\"tags\":\"definition midpoint character-arc\",\"excerpt\":\"\\\"Мидпоинт запускает и смену установок у главных персонажей. Где-то около середины — чуть раньше или чуть позже — обстоятельства становятся достаточно странными, чтобы герой понял: пора что-то менять. \",\"slug\":\"the-midpoint-begins-a-shift-in-attitude-for-main-characters\"},{\"title\":\"Мидпоинт пилота Maisel: Джоэл проваливается дважды\",\"tags\":\"show-example midpoint pilot\",\"excerpt\":\"\\\"МИДПОИНТ (29–31): В последний момент Джоэл получает вызов на сцену. Он открывается шутками про сегодняшние неприятности — теми, что подсказала Мидж. Никто не смеётся. Тогда он возвращается к старому \",\"slug\":\"the-marvelous-mrs-maisel-pilot-midpoint-has-joel-bomb-on-sta\"},{\"title\":\"Мидпоинт — ложная победа или поражение, поднимающее ставки\",\"tags\":\"definition midpoint beat-sheet\",\"excerpt\":\"\\\"МИДПОИНТ (50%) — середина истории и кульминация Fun \u0026 Games. Как правило, это ложная победа или ложное поражение. Мидпоинт поднимает ставки для героя, заставляя его сосредоточиться на победе или выжи\",\"slug\":\"midpoint-beat-is-the-culmination-of-fun-games-featuring-a-fa\"},{\"title\":\"Мидпоинт — место для разворотов и «всё серьёзно»\",\"tags\":\"definition midpoint beat-sheet\",\"excerpt\":\"\\\"МИДПОИНТ (50%) Однасценный бит Мидпоинт — место для резких разворотов, публичных побед, обернувшихся провалом, и моментов «всё, это по-настоящему».\\\"\",\"slug\":\"midpoint-is-the-beat-for-rug-pull-twists-public-victories-go\"},{\"title\":\"Мидпойнт — победа или поражение с твистом\",\"tags\":\"definition show-example midpoint act-structure\",\"excerpt\":\"\\\"3. Мидпойнт — закономерный итог погони за целью… с твистом. Как только вы нащупали Break into 2, мидпойнт почти всегда оказывается либо неизбежной победой, либо неизбежным поражением на пути к цели. \",\"slug\":\"the-midpoint-is-often-an-inevitable-victory-or-defeat-on-the\"},{\"title\":\"Мини-сериал — одна история за 4–8 эпизодов\",\"tags\":\"definition format serialization\",\"excerpt\":\"\\\"Мини-сериал, или ограниченный сериал, имеет фиксированное число эпизодов — больше одного, но меньше тринадцати, обычно от четырёх до восьми — и рассказывает одну историю с началом, серединой и концом\",\"slug\":\"mini-series-tells-one-complete-story-across-a-fixed-short-ep\"},{\"title\":\"Мир истории — мазки, не техзадание\",\"tags\":\"tactical-rule principle world-building\",\"excerpt\":\"\\\"Не вязните в деталях: задача — помочь читателю увидеть ваш мир и почувствовать его оригинальность, а не утопить его в незначимых нюансах. Вы набрасываете общую картину, а не пишете техзадание для худ\",\"slug\":\"story-world-section-should-sketch-big-picture-not-brief-the\"},{\"title\":\"Мир сериала — это место и время действия\",\"tags\":\"definition world\",\"excerpt\":\"\\\"мир — место и время действия сериала.\\\"\",\"slug\":\"a-series-world-is-its-setting-and-time-period\"},{\"title\":\"Мир сериала: место, время, атмосфера\",\"tags\":\"definition setting world-building\",\"excerpt\":\"\\\"Ключевые элементы мира сериала — место, время и «атмосфера». Где разворачивается действие? В конкретном городе или деревне? В определённом районе? В безымянном, но узнаваемом месте? В выдуманном мире\",\"slug\":\"world-of-series-is-defined-by-place-time-and-vibe\"},{\"title\":\"Многокамерная комедия снимается вживую перед зрителями\",\"tags\":\"definition show-example format\",\"excerpt\":\"\\\"Многокамерная получасовая комедия снимается тремя или четырьмя камерами, вживую, в последовательности сцен — как спектакль — перед студийной аудиторией; смех зрителей записывается и входит в саундтре\",\"slug\":\"multi-camera-half-hour-comedy-is-filmed-live-in-sequence-wit\"},{\"title\":\"Многокамерный ситком сдаёт позиции\",\"tags\":\"show-example format\",\"excerpt\":\"\\\"Многокамерный получасовой ситком — некогда главный формат — явно сдаёт позиции. В 2021 году NBC не взял ни одного ситкома в новый сезон — ни много-, ни однокамерного. Даже showrunner Чак Лорре, корол\",\"slug\":\"multi-camera-sitcoms-are-waning-as-a-dominant-format\"},{\"title\":\"Монтажная находка задала курс Pretty Little Liars на 7 лет\",\"tags\":\"practice-story theme pilot\",\"excerpt\":\"«Когда Марлин Кинг смотрела сцену, где четыре главные героини воссоединяются, пока тело Элисон грузят в фургон коронера (она только что поправила диалог с клацающими зубами у Люси), у неё встали дыбом\",\"slug\":\"edit-room-discovery-of-pretty-little-liars-friendship-theme\"},{\"title\":\"Мульти-камерные ситкомы держатся за иконичные сеты\",\"tags\":\"definition format setting\",\"excerpt\":\"\\\"Мульти-камерные ситкомы более замкнуты и снимаются в основном в одних и тех же декорациях из недели в неделю. Со временем эти места становятся нам родными и узнаваемыми.\\\"\",\"slug\":\"multi-camera-sitcoms-stay-contained-to-recurring-indoor-sets\"},{\"title\":\"Мультипротагонист: общая цель vs. разные цели\",\"tags\":\"definition ensemble protagonist\",\"excerpt\":\"\\\"Как и в случае с сериями и сериалами, здесь два типа — истории, где все протагонисты добиваются одной цели, и истории, где каждый преследует свою.\\\"\",\"slug\":\"multiple-protagonist-stories-split-into-shared-goal-and-sepa\"},{\"title\":\"Мэшап-питчи звучат пусто и самодовольно\",\"tags\":\"author-opinion logline concept-testing\",\"excerpt\":\"«Раз уж мы заговорили о мэшапах: в индустрии когда-то вошло в моду лепить вместе кучу якобы умных идей — получалось что-то броское и звонкое. Например: «Это история про пятерых гномов, три банана и пс\",\"slug\":\"harris-dislikes-clever-clever-mash-up-pitches-as-vacuous-and\"},{\"title\":\"Мягкий concept: «в каждом эпизоде герои борются за ___»\",\"tags\":\"definition tactical-rule story-engine episode-pattern\",\"excerpt\":\"\\\"В сериале с мягким concept базовый franchise — это исследование стремления главных персонажей к экстазу победы и агонии поражения, а также умения жить между ними. Удобная формула franchise для такого\",\"slug\":\"soft-concept-franchise-can-be-articulated-as-in-each-episode\"},{\"title\":\"На 10% хронометража история набирает ход\",\"tags\":\"principle tactical-rule show-example act-structure hook beat-sheet\",\"excerpt\":\"\\\"В правильно выстроенном сценарии примерно на 10% хронометража происходит крупное событие — то, что запускает историю и толкает героя вперёд. В The Ring Рэйчел узнаёт о загадочной видеокассете, связан\",\"slug\":\"a-major-event-that-gets-the-story-into-gear-occurs-10-into-a\"},{\"title\":\"На обсуждениях сначала питчуй, потом оценивай\",\"tags\":\"tactical-rule principle\",\"excerpt\":\"\\\"Затем высказывай своё мнение. Так твой руководитель знает, что услышал сильную, объективную презентацию — всё лучшее, что есть в истории. Если после убедительного питча ты скажешь, что текст написан \",\"slug\":\"in-coverage-meetings-pitch-every-story-objectively-before-vo\"},{\"title\":\"На питч берите 3–4 логлайна в разных жанрах\",\"tags\":\"tactical-rule principle logline genre\",\"excerpt\":\"«На любую питч-встречу приходите с тремя-четырьмя логлайнами — на случай, если спросят. Желательно в разных жанрах.»\",\"slug\":\"try-to-bring-three-or-four-loglinespreferably-in-different-g\"},{\"title\":\"На питч приходи заранее — опоздание оскорбляет\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Казалось бы, очевидно, но: не опаздывай. Лучше приди сильно заранее. Просидеть час в соседнем кафе — лучше, чем ввалиться на пять минут позже. Если не знаешь район — заложи время с запасом. Эти люди \",\"slug\":\"arrive-early-to-pitch-meetings-lateness-signals-disrespect\"},{\"title\":\"На питче не защищай идею — думай вместе\",\"tags\":\"tactical-rule principle concept-testing\",\"excerpt\":\"\\\"Говорить «нет» на предложения покупателей — тупик. Да и ни к чему конкретному вы не обязываетесь: просто подхватываете их идеи и вместе накидываете варианты. Если это держит их интерес — почему нет? \",\"slug\":\"respond-to-buyer-suggestions-by-brainstorming-along-not-defe\"},{\"title\":\"На питче продаёшь азарт, а не ремесло\",\"tags\":\"principle overview\",\"excerpt\":\"\\\"На питче ты продаёшь не трёхактную структуру, не умных персонажей и даже не блестящие диалоги — ты продаёшь азарт.\\\"\",\"slug\":\"pitching-sells-excitement-not-craft-elements\"},{\"title\":\"На питче — откидывайтесь на спинку стула\",\"tags\":\"tactical-rule\",\"excerpt\":\"«3. \\\"Откиньтесь на спинку стула.\\\" Это простейший и лучший совет, который мне когда-либо давали о том, как держаться на деловой встрече. Когда мы выглядим подготовленными, вовлечёнными и уверенными — н\",\"slug\":\"sit-back-in-your-chair-during-the-pitch-meeting\"},{\"title\":\"На показе pilot собираются ~60 топов со всех подразделений\",\"tags\":\"practice-story pilot\",\"excerpt\":\"\\\"Когда я работал development exec на NBC, около 60 топ-менеджеров из офисов в Лос-Анджелесе и Нью-Йорке собирались в большом конференц-зале в Лос-Анджелесе и в течение недели смотрели и обсуждали все \",\"slug\":\"network-screenings-gather-60-top-executives-across-divisions\"},{\"title\":\"На сетевых каналах лишь 10% pilot-скриптов идут в съёмки\",\"tags\":\"definition tactical-rule pilot\",\"excerpt\":\"«Большинство телевизионных проектов так и не доходят до pilot. На крупных эфирных network соотношение примерно 10:1. В производство уходит лишь около 10% pilot-скриптов.»\",\"slug\":\"at-legacy-broadcast-networks-only-about-10-of-pilot-scripts\"},{\"title\":\"На экране табу ранит сильнее, чем на странице\",\"tags\":\"principle author-opinion visual-style genre\",\"excerpt\":\"\\\"Адаптируя первоисточник, учитывай время его написания, время выхода на экране и то, как табуированные темы в книге могут не перенестись на экран. Бесчисленные романы описывают взрывоопасные ситуации \",\"slug\":\"taboo-or-incendiary-material-from-novels-can-become-alienati\"},{\"title\":\"Надуманный сюжет служит теме, а не персонажам\",\"tags\":\"definition storylines\",\"excerpt\":\"\\\"Надуманность: когда события в истории происходят ради сюжета или темы, а не вырастают из персонажей и того, что с ними случилось прежде, — такой сюжет называют над
