% из этих сил в самый захватывающий pilot, какой только возможен.»\",\"slug\":\"concentrate-90-of-effort-on-season-one-and-90-of-that-on-the\"},{\"title\":\"A-история строится по 3-актовой структуре\",\"tags\":\"principle act-structure storylines\",\"excerpt\":\"\\\"Именно так талантливые showrunners и сценаристы выстраивают нарратив — часто неосознанно. Даже когда они сознательно говорят о структуре в логистических терминах, на деле они строят сюжетные линии, и\",\"slug\":\"showrunners-design-a-stories-using-dramatic-3-act-structure\"},{\"title\":\"AVOD не даёт пропускать рекламу\",\"tags\":\"definition principle format\",\"excerpt\":\"\\\"AVOD работает как традиционный эфирный network и не позволяет зрителям пропускать рекламу.\\\"\",\"slug\":\"avod-blocks-commercial-skipping-like-traditional-broadcast\"},{\"title\":\"AVOD — бесплатный стриминг с рекламой\",\"tags\":\"definition principle format\",\"excerpt\":\"\\\"Вместо продажи рекламного времени появились две модели: AVOD — Advertiser Supported Video On Demand («бесплатное» ТВ с рекламными паузами) и SVOD — Subscription Supported Video On Demand (строится на\",\"slug\":\"avod-is-advertiser-supported-video-on-demand-free-streaming\"},{\"title\":\"Act 2 Out в получасовике: что выбрать\",\"tags\":\"tactical-rule act-structure beat-sheet format\",\"excerpt\":\"\\\"Break into 2 — для конца первого акта, а для конца второго это может быть Midpoint, All Is Lost или даже Break into 3. В получасовиках всё решает то, как ты хочешь выстроить третий акт. Если взять Mi\",\"slug\":\"half-hour-act-2-out-can-be-midpoint-all-is-lost-or-break-int\"},{\"title\":\"Ally McBeal создала формат часового драмеди в 1997-м\",\"tags\":\"definition show-example format genre tone\",\"excerpt\":\"\\\"Ally McBeal проложила дорогу часовому драмеди, выйдя в 1997 году: шоу взяло элементы часовой драмы — хронометраж, сюжетную плотность, жанровые конвенции — и насытило их комедийными интонациями, котор\",\"slug\":\"ally-mcbeal-pioneered-the-one-hour-dramedy-format-in-1997\"},{\"title\":\"Auspices — творческая команда проекта\",\"tags\":\"definition logline\",\"excerpt\":\"\\\"auspices — творческая команда за разработкой проекта: сценарист, продюсер без права письма, режиссёр и авторы исходного материала (интеллектуальной собственности). Пример: когда агент звонит директор\",\"slug\":\"auspices-are-the-creative-team-behind-a-development-project\"},{\"title\":\"B-история несёт тему и работает с потребностью героя\",\"tags\":\"definition theme relationships character-arc\",\"excerpt\":\"\\\"Запускается тематическая B-история. B-истории — шерпы темы. Их задача — нести тему и напрямую обращаться к внутренней потребности героя. Чаще всего B-история строится на отношениях или любви. Этот be\",\"slug\":\"b-story-carries-the-theme-and-addresses-the-heros-need\"},{\"title\":\"Bake-off — конкурс питчей на одно задание\",\"tags\":\"definition\",\"excerpt\":\"«\\\"Bake-off\\\" — одно из моих любимых выражений в TV-разработке. Так называют конкурентную борьбу за открытое писательское задание (OWA). В bake-off не менее двух авторов приходят на network и соревнуютс\",\"slug\":\"a-bake-off-is-the-competitive-filling-of-an-open-writing-ass\"},{\"title\":\"Barry переворачивает ставки и драму двух миров\",\"tags\":\"show-example principle world tone theme\",\"excerpt\":\"«Мы очень рано нащупали вот что: когда Барри в криминальном мире, ставки невероятно высоки, а драмы — ноль. Он не нервничает. Чистая мышечная память, автопилот. Когда он попадает в мир [актёрской студ\",\"slug\":\"barry-inverts-stakes-versus-drama-between-its-two-worlds\"},{\"title\":\"Barry признаётся Джину, но тот принимает это за игру\",\"tags\":\"show-example pilot subtext\",\"excerpt\":\"«5. Воплощение нового плана: совсем не в духе Барри — он признаётся, что умеет убивать. Впервые он говорит правду. Из самых тёмных глубин своей души наёмника. Каждая леденящая деталь. Что он делает, ч\",\"slug\":\"barry-pilot-finale-barry-confesses-his-hitman-truth-to-gene\"},{\"title\":\"Barry симпатичен нам из-за выбора в pilot\",\"tags\":\"show-example principle protagonist empathy pilot\",\"excerpt\":\"\\\"Мне кажется, Barry вызывает сочувствие благодаря выбору, который он делает в pilot. Он мог бы продолжать жить так, как жил, — зная, что это неправильно. Или мог решиться на шаг, который, он понимал, \",\"slug\":\"barrys-rootability-comes-from-his-pilot-choice-to-leave-a-li\"},{\"title\":\"Barry убивает Мосс за кадром — зритель в сомнении\",\"tags\":\"show-example principle visual-style mystery-suspense\",\"excerpt\":\"\\\"Ну, как в финале первого сезона, когда Барри убивает Мосс — Нил: — это происходит за кадром. Мы слышим только выстрел. Алек: Нам казалось, так визуально убедительнее. И зрители реагируют: «Подождите,\",\"slug\":\"barry-kills-moss-off-camera-to-make-the-audience-question-wh\"},{\"title\":\"Barry: первый кадр задаёт тон убийцы-автомата\",\"tags\":\"show-example opening-image tone protagonist\",\"excerpt\":\"\\\"ПЕРВЫЙ КАДР (0–1 мин.): Мы видим мертвеца в постели — пуля в голове. Жертва заказного убийства. Наёмный киллер Барри только что сделал своё дело. В руке — пистолет с глушителем. Работа как работа: пр\",\"slug\":\"barrys-opening-image-shows-him-standing-over-a-hit-victim-wi\"},{\"title\":\"Beat sheet сезона — скелет, а не каждый поворот\",\"tags\":\"principle tactical-rule beat-sheet season-arc pilot\",\"excerpt\":\"\\\"Beat sheet сезона должен показывать скелет, а не полную карту. Путь — есть, но простора для манёвра — тоже. И он помогает увидеть, что нужно заложить в pilot, чтобы потом было чем платить.\\\"\",\"slug\":\"season-beat-sheets-should-lay-out-the-skeleton-of-a-season-n\"},{\"title\":\"Beat sheet — маршрут, а не расписание\",\"tags\":\"principle beat-sheet format\",\"excerpt\":\"\\\"В телевидении минута-в-минуту — дело гибкое, зато общий хронометраж жёстче. Воспринимай beat sheet для TV как упорядоченный маршрут, а не как расписание с точностью до секунды.\\\"\",\"slug\":\"tv-beat-sheets-are-ordered-itineraries-not-minute-by-minute\"},{\"title\":\"Beat «Переход в 3-й акт»: новый путь к победе\",\"tags\":\"definition act-structure beat-sheet\",\"excerpt\":\"\\\"ПЕРЕХОД В 3-Й АКТ (80%) Одна сцена. Благодаря свежей идее, внезапному озарению или последнему совету персонажа линии Б протагонист видит новый путь к победе. Он решает попробовать снова — порой с сов\",\"slug\":\"break-into-3-beat-hero-finds-new-path-to-victory-via-fresh-i\"},{\"title\":\"Beverly Hills 90210 породил틴-соуп в прайм-тайм\",\"tags\":\"show-example definition genre\",\"excerpt\":\"\\\"В 1990 году сеть Fox создала вариант жанра, ориентированный на молодую аудиторию, — Beverly Hills 90210, — породив поджанр подросткового мыльного шоу в прайм-тайм.\\\"\",\"slug\":\"beverly-hills-90210-originated-the-primetime-teen-soap-sub-g\"},{\"title\":\"Black-ish: финал снимает конфликт Дре через Бромицфу\",\"tags\":\"show-example season-arc character-arc\",\"excerpt\":\"\\\"ФИНАЛ (20–22): Синтез старого и нового — Дре устраивает сыну Хип-Хоп Бромицфу. Оставаться собой — значит уметь признать ошибку. Urban может быть стильным, ярким и живым — как семья. Финал завершает и\",\"slug\":\"black-ish-finale-resolves-dres-internal-conflict-via-hip-hop\"},{\"title\":\"Black-ish: хоккей на траве бьёт Дре в больное место\",\"tags\":\"show-example pilot hook\",\"excerpt\":\"\\\"КАТАЛИЗАТОР (4–5): По дороге в школу сын Дре, Андре-младший, говорит, что хочет играть в хоккей на траве. Удар под дых! Этот «белый спорт» бьёт Дре в самое больное место. Школьные приятели к тому же \",\"slug\":\"black-ish-pilot-uses-andre-jrs-field-hockey-request-as-a-cat\"},{\"title\":\"Breaking Bad держится на эволюции Уолтера Уайта\",\"tags\":\"show-example principle character-arc protagonist serialization\",\"excerpt\":\"\\\"Breaking Bad совершенно другой, потому что он целиком построен на эволюции протагониста. Винс Гиллиган сам описал это как «персонаж, который идёт от Мистера Чипса к Scarface». У Уолтера Уайта на прот\",\"slug\":\"breaking-bad-is-driven-by-the-evolution-of-its-protagonist-w\"},{\"title\":\"Breaking Bad менял антагонистов каждый сезон\",\"tags\":\"show-example antagonist season-arc serialization\",\"excerpt\":\"\\\"В Breaking Bad работал принцип «вращающейся двери»: злодеи приходили и уходили, один за другим разбитые Уолтером Уайтом. Туко, Гас Фринг, банда белых супрематистов — каждый из антагонистов тянул один\",\"slug\":\"breaking-bad-rotated-season-long-antagonists-like-tuco-gus-f\"},{\"title\":\"Breaking Bad не строит эпизоды вокруг единой темы\",\"tags\":\"principle show-example storylines theme episode-pattern\",\"excerpt\":\"\\\"Вместе с тем есть немало отличных эпизодических сериалов, которые не выстраивают ABC-сюжеты вокруг единой темы. Breaking Bad — именно такой.\\\"\",\"slug\":\"breaking-bad-does-not-plot-abc-storylines-around-one-unifyin\"},{\"title\":\"Breaking Bad работал как криминальная процедуралка\",\"tags\":\"show-example principle genre world-rules\",\"excerpt\":\"\\\"Breaking Bad был, помимо прочего, криминальной процедуралкой. Шоу намеренно показывало — часто в мельчайших подробностях — как варят наркотики и как преступники уходят от слежки или разделываются с в\",\"slug\":\"breaking-bad-functioned-as-a-criminal-procedural-by-depictin\"},{\"title\":\"Breaking Bad: первый акт — цепь унижений Уолтера\",\"tags\":\"show-example pilot-structure empathy\",\"excerpt\":\"\\\"Первая треть пилота Breaking Bad — по сути, нарастающая цепь унижений. Пока история Уолтера Уайта только раскачивается, сценарий делает всё возможное, чтобы показать его жертвой.\\\"\",\"slug\":\"breaking-bad-pilot-opens-its-first-third-as-a-steadily-escal\"},{\"title\":\"Broadcast network регулирует FCC: контент для всех возрастов\",\"tags\":\"definition format genre\",\"excerpt\":\"«Поскольку эфирное вещание охватывает всю страну и использует радиоволны, находящиеся в общественной собственности, содержание программ broadcast networks регулирует Федеральная комиссия по связи (FCC\",\"slug\":\"broadcast-network-content-is-fcc-regulated-for-all-ages-appr\"},{\"title\":\"Buffy и Supernatural: охота на монстров как franchise\",\"tags\":\"definition principle show-example story-engine episode-pattern genre\",\"excerpt\":\"\\\"Есть и другие franchise, построенные на «деле недели». В Buffy the Vampire Slayer можно выделить то, что называют «franchise охотника на монстров». Supernatural использует ту же схему. Новые монстры,\",\"slug\":\"buffy-and-supernatural-use-a-monster-hunter-franchise-at-the\"},{\"title\":\"Cannes: связи без сделок — тоже результат\",\"tags\":\"practice-story principle\",\"excerpt\":\"«Когда я приехал в Cannes с сопродюсерами — мы работали над тем, что стало моим дебютным фильмом Paradise Grove, — мы питчили всем подряд: крупным сейлз-агентам, дистрибьюторам. Учились у каждого. Важ\",\"slug\":\"cannes-pitching-to-sales-agents-and-distributors-yielded-las\"},{\"title\":\"Catalyst — один удар, который запускает историю\",\"tags\":\"definition show-example beat-sheet act-structure\",\"excerpt\":\"\\\"CATALYST (10%) Однoscenic beat Этот action beat обрушивается на героя и запускает историю. Не осознание последствий прошлого события — а само СОБЫТИЕ! Как правило, это единственная «случайность», кот\",\"slug\":\"the-catalyst-is-the-single-scene-action-beat-that-kicks-the\"},{\"title\":\"Closed Mystery: история вокруг одной загадки\",\"tags\":\"definition show-example mystery-suspense serialization\",\"excerpt\":\"\\\"Closed Mystery — термин индустрии. История строится вокруг главной тайны: мы не знаем, что произошло, и пытаемся разгадать это вместе с протагонистом — который, в идеале, знает не больше нас. Классич\",\"slug\":\"closed-mystery-is-a-story-built-on-a-central-unknown-the-pro\"},{\"title\":\"Concept of Series называет главного персонажа\",\"tags\":\"principle logline protagonist\",\"excerpt\":\"\\\"Первый и важнейший элемент concept statement — главный персонаж сериала: «нердоватый школьный учитель химии». Любой Concept of Series в TV pitch должен чётко называть одного или нескольких главных пе\",\"slug\":\"concept-of-series-statement-must-identify-the-lead-character\"},{\"title\":\"Concept series — одна-две фразы, и больше ничего\",\"tags\":\"tactical-rule pitfall concept-testing logline\",\"excerpt\":\"\\\"В идеале раздел Concept of Series в питче — именно так прост. Автор должен уметь изложить concept своего шоу в одной-двух фразах, и слушатели сразу поймут, чем оно отличается от любого сериала, котор\",\"slug\":\"state-series-concept-in-one-or-two-sentences-that-show-why-t\"},{\"title\":\"Concept важнее умения питчить\",\"tags\":\"principle author-opinion premise concept-testing\",\"excerpt\":\"\\\"Неважно, насколько мастерски вы питчите. Одни делают это лучше других — спору нет. Но когда я вспоминаю питчи, которые я продал и которые купил как producer на TV-шоу, за каждым стоял великолепный pr\",\"slug\":\"concept-matters-more-than-pitching-skill\"},{\"title\":\"Concept сериала: персонаж, мир, цель\",\"tags\":\"definition concept-testing premise protagonist\",\"excerpt\":\"\\\"Профессионалы по разработке проектов описывают concept сериала по-разному, но большинство выделяют три базовых элемента. Первый — главный персонаж или персонажи. Кто в центре сериала? О ком шоу? Чьи \",\"slug\":\"a-tv-series-concept-comprises-lead-character-world-and-goal\"},{\"title\":\"Concept — идея, доведённая до очевидного потенциала\",\"tags\":\"definition principle concept-testing\",\"excerpt\":\"\\\"Concept — это идея шоу, развитая до такой степени, что её потенциал для сериала становится очевидным: из неё видно, чем шоу отличается от предшественников в том же жанре.\\\"\",\"slug\":\"a-concept-is-an-idea-developed-until-its-series-potential-an\"},{\"title\":\"Darrin Stephens сменили без объяснений для зрителей\",\"tags\":\"show-example characters\",\"excerpt\":\"«К концу пятого сезона актёр, игравший Дарина Стивенса (Дик Йорк), тяжело заболел и был заменён другим актёром — Диком Сарджентом. Зрителям при этом не дали никаких объяснений.»\",\"slug\":\"bewitched-recast-darrin-stephens-mid-series-with-no-on-scree\"},{\"title\":\"Dead to Me строится изнутри: сначала эмоция, потом сюжет\",\"tags\":\"show-example author-opinion principle characters tone\",\"excerpt\":\"«Я не пыталась во что бы то ни стало удивить зрителя. Я просто хотела быть честной — честной в том, как сама вижу жизнь, особенно когда человек уже в горе и потере. Вот так я нашла тон. Просто спрашив\",\"slug\":\"liz-feldman-writes-dead-to-me-from-the-inside-out-starting-w\"},{\"title\":\"Dead to Me: отсутствие мужа важнее его присутствия\",\"tags\":\"show-example principle pov mystery-suspense theme\",\"excerpt\":\"«С самого начала у меня было чёткое ощущение: его не должно быть видно. Я не хотела, чтобы сериал был о нём. Я хотела, чтобы он был о его потере — о том, как эта потеря ломает людей, которые его любил\",\"slug\":\"dead-to-me-withholds-the-deceased-husband-to-make-absence-th\"},{\"title\":\"Dead to Me: правда меняется с каждым эпизодом\",\"tags\":\"show-example pov serialization\",\"excerpt\":\"\\\"Ещё один вариант — двойной фокус. Dead to Me реализует его блестяще: POV намеренно сужен, и правда скрыта не только от зрителя, но и от самих протагонисток — Джен Хардинг (Кристина Эпплгейт) и Джуди \",\"slug\":\"dead-to-me-constrains-dual-lead-pov-between-jen-and-judy-so\"},{\"title\":\"Dead to Me: флэшбэк скрывает правду, ломая ожидания\",\"tags\":\"show-example author-opinion pilot mystery-suspense pov\",\"excerpt\":\"\\\"Pilot особенно блестящ: в первом флэшбэке мы видим Джуди в больнице — кажется, она потеряла мужа. Но когда тот же флэшбэк показывают снова, выясняется: медсестра сообщила ей об очередном выкидыше. Вы\",\"slug\":\"dead-to-me-pilot-withholds-the-truth-of-judys-flashback-to-s\"},{\"title\":\"Desperate Housewives: мёртвая рассказчица знает всё\",\"tags\":\"show-example pov\",\"excerpt\":\"\\\"В Desperate Housewives роль рассказчицы играет мёртвая женщина — Мэри Элис Янг (Бренда Стронг). Она ется и выбалтывает про новую под\",\"slug\":\"et-states-its-theme-during-the-debate-when-michael-tells-ell\"},{\"title\":\"EP Homeland избегает темы в комнате сценаристов\",\"tags\":\"principle show-example practice-story theme\",\"excerpt\":\"\\\"Один из executive producer'ов Homeland рассказал мне, что они никогда не обсуждают тему в комнате сценаристов, — и сам он намеренно избегает её в своих сценариях: слишком самосознательно, слишком «ли\",\"slug\":\"homeland-executive-producer-avoids-theme-in-the-writers-room\"},{\"title\":\"ER и Grey's Anatomy: один мир, разный тон\",\"tags\":\"show-example principle tone comparables setting\",\"excerpt\":\"\\\"ER и Grey's Anatomy — оба медицинских шоу, оба про больницу. Но по тону они — полная противоположность. ER — напряжённый, жёсткий, реалистичный, стремительный, с серьёзной драмой. Grey's Anatomy — ле\",\"slug\":\"er-and-greys-anatomy-share-the-medical-hospital-setting-but\"},{\"title\":\"ER, эпизод: Грин прячет подростка от полиции\",\"tags\":\"show-example episodes\",\"excerpt\":\"\\\"Линия Б: Доктор Марк Грин (Энтони Эдвардс) едет с бригадой скорой и лечит жертву избиения — оказывается, это 16-летний подросток, занимающийся мужской проституцией. Грин помогает парню (его играет Уи\",\"slug\":\"er-episode-b-story-dr-greene-treats-and-helps-a-teenage-gay\"},{\"title\":\"ER: «Stuck on You» объединяет арки одной темой\",\"tags\":\"show-example theme episodes storylines\",\"excerpt\":\"«Название эпизода — первая подсказка: \\\"Stuck on You\\\". Молодой проститутке везёт: ВИЧ не обнаружен, — но он возвращается к прежнему саморазрушительному поведению. Он застрял, хотя знает, чем это грозит\",\"slug\":\"er-episode-stuck-on-you-unifies-multiple-storylines-through\"},{\"title\":\"Euphoria: эмоциональный реализм важнее буквального\",\"tags\":\"show-example principle tone visual-style\",\"excerpt\":\"«Сэм: Меня очень интересовал эмоциональный реализм — вот что оставалось постоянным и неизменным. Она наркоманка. Она будет вести \\"Благодаря действиям Ив в эпизоде — правильным вопросам, любопытству, верной интуиции насчёт Вилланель — ей предлагают новую работу. Это первый клиффхэнгер в финале pilot'а: мы понимаем, что впереди е\",\"slug\":\"killing-eve-pilot-ends-on-dual-cliffhangers-eves-new-job-and\"},{\"title\":\"Pilot Story — сердце питча, остальное — глазурь\",\"tags\":\"tactical-rule principle pilot overview\",\"excerpt\":\"\\\"Раздел Pilot Story — сердце питча. Всё остальное — глазурь на торте.\\\"\",\"slug\":\"the-pilot-story-section-is-the-heart-of-the-pitch-and-everyt\"},{\"title\":\"Pilot pick up — не то же самое, что series pick up\",\"tags\":\"definition pilot\",\"excerpt\":\"\\\"Это называется «pilot pick up» — в отличие от «series pick up», который может случиться, а может и не случиться несколько месяцев спустя.\\\"\",\"slug\":\"a-pilot-pick-up-is-a-networks-greenlight-of-a-pilot-script-d\"},{\"title\":\"Pilot бьёт в конфликт сразу, не топчется в экспозиции\",\"tags\":\"pitfall tactical-rule pilot hook pilot-structure\",\"excerpt\":\"\\\"Выбирая цель героя в pilot-эпизоде, убедитесь, что на его пути стоит серьёзное препятствие. Это ваш единственный шанс произвести впечатление. Бейте в конфликт жёстко. Не мнитесь. Я вижу много новых а\",\"slug\":\"pilots-must-collide-with-conflict-head-on-rather-than-dwell\"},{\"title\":\"Pilot вламывается в жизнь невиновного героя\",\"tags\":\"tactical-rule definition pilot-type pilot-structure protagonist\",\"excerpt\":\"\\\"DUDE WITH A SEASON-LONG PROBLEM — Жизнь невиновного героя прерывает проблема. Первое столкновение с этой жизнью-\\\"\",\"slug\":\"dude-with-a-season-long-problem-pilot-interrupts-an-innocent\"},{\"title\":\"Pilot должен вкрутить осколок в рану\",\"tags\":\"principle pilot empathy hook\",\"excerpt\":\"«С эмоциональной точки зрения pilot должен надавить на осколок в душе персонажа, вкрутить его, заставить больно. Только так пробиваешься к зрителю по-настоящему.»\",\"slug\":\"pilots-should-lean-on-the-characters-shard-of-glass-and-twis\"},{\"title\":\"Pilot должен показать concept в действии\",\"tags\":\"principle show-example pilot-goals concept-testing pilot\",\"excerpt\":\"«Винс Гиллиган выстроил историю своего pilot именно так, потому что понимал: его долг — показать concept в работе. Нужно было явить Уолтера и Джесси за тем самым делом, которым они занимались бы в каж\",\"slug\":\"pilots-should-demonstrate-the-concept-in-action-so-executive\"},{\"title\":\"Pilot загоняет героя в точку невозврата\",\"tags\":\"principle pilot pilot-goals hook\",\"excerpt\":\"\\\"Pilot создан так, чтобы загнать героя в точку, из которой нет пути назад. Это может быть выбор: войти в новый мир, принять новую философию или взять курс на действие. Выбор, который нельзя не сделать\",\"slug\":\"pilots-engineer-the-hero-into-a-position-with-no-turning-bac\"},{\"title\":\"Pilot задаёт процесс, а не даёт ответы\",\"tags\":\"principle pilot premise\",\"excerpt\":\"\\\"В отличие от полного метра, pilot должен задавать процессы, а не предлагать немедленные решения. Закрепи premise — и половина работы сделана.\\\"\",\"slug\":\"a-pilot-should-define-processes-not-offer-immediate-solution\"},{\"title\":\"Pilot несёт непосильную структурную нагрузку\",\"tags\":\"principle pilot pilot-goals\",\"excerpt\":\"\\\"Pilot трудно сделать хорошо: на него давит слишком много задач. Нужно представить новых персонажей и заставить нас за них болеть. Нужно открыть новый мир — ясно и захватывающе. Нужно драматизировать \",\"slug\":\"pilots-carry-an-unusually-heavy-structural-burden\"},{\"title\":\"Pilot обещает величие — сезонами вперёд\",\"tags\":\"principle definition pilot-goals hook serialization\",\"excerpt\":\"\\\"Pilot должен обещать величие — в эпизодах и сезонах впереди. Но одним лихим клиффхэнгером зрителя не заставишь нажать «Записать серию». Pilot обязан дать аудитории достаточно, чтобы она уловила весь \",\"slug\":\"a-pilot-must-propose-a-promise-of-greatness-for-the-episodes\"},{\"title\":\"Pilot питчат в настоящем времени\",\"tags\":\"tactical-rule principle pilot\",\"excerpt\":\"\\\"История пилота питчится в настоящем времени. Не говорите: «Он сделал это, потом сделал то». Говорите: «Он делает это, он делает то». «Есть» — не «был». Настоящее время делает историю живой и сиюминут\",\"slug\":\"pitch-the-pilot-story-in-the-present-tense\"},{\"title\":\"Pilot цепляет сразу — иначе зритель уйдёт\",\"tags\":\"principle hook pilot-goals\",\"excerpt\":\"\\\"2) Зацепи зрителя с первых минут — чтобы он хотел знать, что будет дальше: сначала в самом pilot'е, потом во всём сериале. Это обязательно. Задача pilot'а не только в том, чтобы зритель захотел смотр\",\"slug\":\"a-pilot-must-hook-the-audience-immediately-so-they-finish-th\"},{\"title\":\"Pilot — пробный эпизод, решающий судьбу сериала\",\"tags\":\"definition pilot\",\"excerpt\":\"\\\"pilot — первый эпизод сериала, снятый как тестовый, чтобы решить, стоит ли заказывать проект в серию; как правило, он же выходит в эфир первым.\\\"\",\"slug\":\"a-pilot-is-the-first-episode-of-a-series-produced-as-a-test\"},{\"title\":\"Pitch deck нужен, когда есть сильная визуальная составляющая\",\"tags\":\"tactical-rule visual-style\",\"excerpt\":\"\\\"Pitch deck — очевидный выбор, когда у проекта есть мощная визуальная составляющая: адаптация графического романа, захватывающие локации или любая другая визуальная уникальность.\\\"\",\"slug\":\"use-a-pitch-deck-when-the-series-has-a-distinctive-visual-el\"},{\"title\":\"Pitch deck — документ для продажи идеи сериала\",\"tags\":\"definition show-example overview\",\"excerpt\":\"\\\"Pitch deck — документ, с помощью которого идею сериала продают потенциальным покупателям: network или studio. Как правило, он включает синопсис шоу и истории, информацию о персонажах, ключевые сюжетн\",\"slug\":\"a-pitch-deck-is-a-document-used-to-sell-a-tv-show-idea-to-po\"},{\"title\":\"Power franchise: затяжная битва за власть\",\"tags\":\"show-example definition story-engine\",\"excerpt\":\"\\\"Power franchise сталкивает персонажей и группы персонажей в затяжной битве за власть. The Sopranos работал именно по этой модели: большинство историй строилось на том, как Тони и его люди дерутся с д\",\"slug\":\"power-franchise-pits-characters-against-each-other-in-prolon\"},{\"title\":\"Pre-notes: каждый слой согласует позицию заранее\",\"tags\":\"definition principle\",\"excerpt\":\"\\\"До того как кто-либо передаёт замечания, проходят «пре-ноутсы». Пре-ноутс — это встреча или звонок, на котором несколько продюсеров или development-executives продакшн-компании собираются вместе, что\",\"slug\":\"pre-notes-meetings-align-each-feedback-layer-into-a-united-f\"},{\"title\":\"Premise pilot вводит героя в новую ситуацию\",\"tags\":\"definition principle show-example pilot-type pilot-goals premise\",\"excerpt\":\"\\\"Premise pilots закладывают новую ситуацию для главного персонажа. Иногда герой попадает в мир сериала — переезжает в новый район, застревает на таинственном острове, устраивается на новую работу или \",\"slug\":\"premise-pilots-establish-a-new-situation-for-the-main-charac\"},{\"title\":\"Premise pilot охватывает от Opening Image до Break into 2\",\"tags\":\"tactical-rule principle pilot-structure beat-sheet opening-image\",\"excerpt\":\"\\\"Если вы пишете premise pilot (а скорее всего, так и есть), загляните в beat sheet первого сезона. Вопрос в том, какой кусок истории вы хотите отхватить. Ответ, скорее всего, лежит между Opening Image\",\"slug\":\"premise-pilot-story-typically-spans-from-opening-image-to-br\"},{\"title\":\"Premise pilot показывает мир до начала главного действия\",\"tags\":\"definition show-example pilot-type pilot-structure\",\"excerpt\":\"\\\"Premise pilot показывает начало истории — до того, как стартует главное действие или вводится основной concept. Именно так начинаются Stranger Things, Sex Education и Breaking Bad. Главная история в \",\"slug\":\"a-premise-pilot-shows-the-storys-beginning-before-the-main-a\"},{\"title\":\"Premise pilot строит мир до начала главного конфликта\",\"tags\":\"definition show-example pilot-type\",\"excerpt\":\"\\\"Pilot может быть premise pilot, если он выстраивает историю до того, как вводится главная проблема, ситуация или concept. Например, первые эпизоды Sex Education, Stranger Things, Killing Eve, Occupie\",\"slug\":\"premise-pilots-establish-the-story-before-the-main-problem-s\"},{\"title\":\"Premise pilot — начало всего: мир, franchise, персонажи\",\"tags\":\"definition principle pilot-type pilot-structure world-building\",\"excerpt\":\"\\\"Premise pilot — это история происхождения вашего шоу. Он запускает новое событие, которое впервые сплавляет воедино мир + franchise type + персонажей.\\\"\",\"slug\":\"premise-pilots-are-origin-stories-that-first-fuse-world-fran\"},{\"title\":\"Premise pilot: эпизод 1 запускает всю серию\",\"tags\":\"tactical-rule definition show-example pilot-type pilot\",\"excerpt\":\"\\\"Дайте понять, premise pilot у вас или non-premise — хотя из самого pitch это должно быть очевидно. Premise pilot означает, что события первого эпизода запускают сериал с нулевой отметки. Lost — premi\",\"slug\":\"premise-pilots-make-episode-1-essential-to-launching-the-ser\"},{\"title\":\"Premise должен ощущаться как жанр\",\"tags\":\"principle tactical-rule show-example premise genre tone\",\"excerpt\":\"\\\"Premise истории должен отражать её жанр. В хорошем комедийном pitch должно быть что-то изначально смешное; в хорошем хорроре — изначально жуткое. В комедийном хорроре — и то и другое. Идея актёра, пр\",\"slug\":\"a-storys-premise-should-reflect-the-genres-it-belongs-to\"},{\"title\":\"Pretty Little Liars — подростковый Desperate Housewives\",\"tags\":\"practice-story concept-testing comparables\",\"excerpt\":\"\\\"Стратегия создания PLL строилась на том, чтобы взять успешное шоу и разобрать его концептуальную формулу — а потом использовать её для совершенно другой аудитории. В 2005 году мы смотрели на самый го\",\"slug\":\"pretty-little-liars-was-reverse-engineered-as-a-teen-despera\"},{\"title\":\"Pretty Little Liars: concept + тема «всё не то, чем кажется»\",\"tags\":\"principle show-example theme concept-testing comparables\",\"excerpt\":\"\\\"Когда создательница Pretty Little Liars Марлин Кинг питчила шоу на сети, она сначала коротко и ясно изложила concept, а потом назвала ключевую тему: «Мы исследуем идею: всё не то, чем кажется». «Как \",\"slug\":\"pretty-little-liars-pitch-followed-concept-statement-with-th\"},{\"title\":\"Primetime soap — жанр, украденный у дневных мыльных опер\",\"tags\":\"definition genre\",\"excerpt\":\"«Gossip Girl относится к другому успешному часовому жанру — primetime soap. Жанр получил это название, потому что позаимствовал многие приёмы и структуры из дневных мыльных опер — совершенно отдельног\",\"slug\":\"primetime-soap-genre-is-named-for-appropriating-storytelling\"},{\"title\":\"Put pilot — pilot с гарантией производства от network\",\"tags\":\"definition pilot-type\",\"excerpt\":\"\\\"Put pilot — pilot с гарантированным обязательством network запустить его в производство сразу при покупке (произносится как put — «положить в духовку»).\\\"\",\"slug\":\"a-put-pilot-is-a-pilot-with-a-guaranteed-network-production\"},{\"title\":\"Rick \u0026 Morty: разлетевшийся хулиган задаёт тон\",\"tags\":\"show-example tone pilot\",\"excerpt\":\"\\\"Обратно в школе: замороженный хулиган Фрэнк разлетается на тысячу кровавых кусков. Да, мы именно туда и идём. Тональная установка — ключевая задача pilot'а, и Rick \u0026 Morty — мастер-класс по тому, как\",\"slug\":\"rick-morty-pilot-uses-tonal-shock-of-bully-shattering-into-b\"},{\"title\":\"Rick and Morty: пилот кончается мрачно, без хеппи-энда\",\"tags\":\"show-example pilot tone\",\"excerpt\":\"«Когда семена растворяются, Рик признаётся: это мегасемена в прямой кишке Морти делали его временно умным. Шоу совершенно не про счастливый финал — оно с мрачным удовольствием плюёт на такие вещи. Рик\",\"slug\":\"rick-and-morty-pilot-ends-darkly-with-rick-revealing-mega-se\"},{\"title\":\"Rooting interest: зритель страстно болеет за цель героя\",\"tags\":\"principle definition empathy\",\"excerpt\":\"«Rooting interest — ключевое понятие голливудского кино. Это когда сериал или фильм заставляет нас, зрителей, всем сердцем болеть за персонажа: получит он то, чего хочет, или нет. Мы страстно желаем, \",\"slug\":\"rooting-interest-is-when-a-show-compels-the-viewer-to-care-d\"},{\"title\":\"SVOD держится на подписке и алгоритмах, не на рейтингах\",\"tags\":\"definition principle format\",\"excerpt\":\"\\\"SVOD, Subscription Supported Video On Demand — модель, где правят алгоритмы, а не только рейтинги. Netflix, HBO Max, Amazon Prime, Hulu, Disney+, Paramount+ и AppleTV+ — всё это SVOD.\\\"\",\"slug\":\"svod-is-subscription-supported-video-on-demand-driven-by-alg\"},{\"title\":\"SVU: пилот делает дело личным — и раскрывает персонажа\",\"tags\":\"show-example principle pilot characters pilot-goals\",\"excerpt\":\"\\\"Law \u0026 Order: SVU — эпизодическое шоу, и его pilot мог бы спокойно стать седьмым эпизодом. Но примерно в середине первой серии сценарист вставляет момент, который задевает персонажа лично — и это може\",\"slug\":\"law-order-svu-pilot-makes-the-case-personal-to-reveal-charac\"},{\"title\":\"SVU: тема заявлена на 22-й минуте пилота\",\"tags\":\"show-example theme pilot\",\"excerpt\":\"\\\"ТЕМА ЗАЯВЛЕНА (22 мин.): «Я хороший коп, Эллиот», — говорит Бенсон. Что значит быть хорошим копом? Именно это проверит первая история SVU.\\\"\",\"slug\":\"law-order-svu-pilot-states-its-theme-at-minute-22-with-benso\"},{\"title\":\"Sample Episodes — три эпизода в конце питча\",\"tags\":\"definition tactical-rule episodes concept-testing\",\"excerpt\":\"\\\"Раздел 8: Sample Episodes Последний раздел типичного TV-питча — Sample Episodes. Здесь автор коротко излагает сюжеты трёх потенциальных эпизодов своего сериала.\\\"\",\"slug\":\"sample-episodes-section-pitches-short-summaries-of-three-pot\"},{\"title\":\"Schitt's Creek отложил сентиментальность до конца 2 сезона\",\"tags\":\"show-example principle tone season-arc pacing\",\"excerpt\":\"«Я следовал примеру отца в те первые дни — в том, что касается ценности заработанного момента, заработанного откровения, заработанной сентиментальности. Думаю, если бы мы ввели мягкую сторону этого шо\",\"slug\":\"schitts-creek-delayed-sentimentality-until-end-of-season-2-t\"},{\"title\":\"Series drive — цель протагониста на весь сериал\",\"tags\":\"definition story-engine\",\"excerpt\":\"\\\"Второй тип движка истории — series drive. Это конкретная цель, к которой главный герой стремится на протяжении всего сериала и за достижение которой болеет зритель. Такая сквозная цель способна пород\",\"slug\":\"series-drive-is-a-goal-the-protagonist-pursues-across-the-li\"},{\"title\":\"Series overview — про мир, не про сюжет pilot\",\"tags\":\"definition tactical-rule overview world pilot\",\"excerpt\":\"\\\"Это не пересказ pilot. Это введение в мир сериала и хребет истории. Квест? Трансформационная арка? Исследование социальной проблемы? Помните: в overview вы не суммируете сюжет.\\\"\",\"slug\":\"series-overview-introduces-the-series-world-and-story-backbo\"},{\"title\":\"Sharp Objects скрывает травму — зритель теряет связь\",\"tags\":\"principle show-example pitfall backstory empathy protagonist\",\"excerpt\":\"\\\"Именно это происходит в Sharp Objects — психологической драме по дебютному роману Гиллиан Флинн, созданной Марти Ноксон. Протагонист, криминальный репортёр Камилла Прикер, явно пережила что-то страшн\",\"slug\":\"sharp-objects-withholds-protagonists-trauma-backstory-and-bl\"},{\"title\":\"Showrunner = executive producer и обычно head writer\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"Showrunner (в титрах — «Executive Producer»), как правило, также возглавляет сценарный отдел\\\"\",\"slug\":\"showrunner-is-credited-as-executive-producer-and-customarily\"},{\"title\":\"Showrunner фильтрует notes — не пересылает дословно\",\"tags\":\"principle practice-story\",\"excerpt\":\"\\\"Главное: notes почти всегда нужно передавать — и не дословно — от network или студийных экзекьютивов. Сценаристы говорят на языке сценаристов и, как правило, сами чувствуют «note под note» — и то, ка\",\"slug\":\"showrunners-should-filter-and-rephrase-network-notes-rather\"},{\"title\":\"Showrunner — автор TV, ответственный за всё\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"Showrunner — это автор в телевидении. Творческий визионер сериала, и буквально каждое творческое решение на проекте — его ответственность.\\\"\",\"slug\":\"the-showrunner-is-the-auteur-of-tv-responsible-for-every-cre\"},{\"title\":\"Showrunner — почти всегда главный автор и EP сериала\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"Showrunner — почти всегда главный автор и executive producer (EP) сериала. Часто, хотя и не всегда, showrunner ещё и создатель шоу.\\\"\",\"slug\":\"a-showrunner-is-almost-always-the-head-writer-and-executive\"},{\"title\":\"Shtisel намеренно оставляет финал невысказанным\",\"tags\":\"show-example principle episodes subtext episode-pattern\",\"excerpt\":\"«Один из главных вызовов в каждом эпизоде Shtisel — а это требует долгих раздумий — это то, как эпизод заканчивается. Наша цель — всегда оставлять зрителя с ощущением, что не всё сказано. Ещё лучше — \",\"slug\":\"shtisel-episodes-end-with-deliberate-non-articulation-to-lea\"},{\"title\":\"Shtisel — сериал о разбитом сердце\",\"tags\":\"show-example author-opinion theme logline\",\"excerpt\":\"\\\"Shtisel — сериал о разбитом сердце. Сериал о хрупкости нашего существования и нетерпении сердца.\\\"\",\"slug\":\"indursky-frames-shtisel-as-a-series-about-a-broken-heart-and\"},{\"title\":\"Shtisel: смерть матери раскрывает материнский комплекс\",\"tags\":\"show-example backstory character-arc theme\",\"excerpt\":\"«Нет сомнений: смерть матери — самый драматический способ выразить этот элемент в психике Акивы (а позже, в следующих сезонах, и в психике Шулема).»\",\"slug\":\"shtis ров он тоже изматывает. Но Колин подслушал их. Теперь он точно всё испортит\",\"slug\":\"what-we-do-in-the-shadows-pilot-uses-colin-overhearing-the-v\"},{\"title\":\"Window character — чужак, открывающий мир зрителю\",\"tags\":\"definition show-example pilot characters pov\",\"excerpt\":\"\\\"Window character (он же «рыба на суше») — персонаж, который не знает мира сериала и знакомится с ним вместе со зрителем. В pilot'ах это часто главный герой: в Grey's Anatomy Мередит Грей выходит на п\",\"slug\":\"a-window-character-is-one-who-doesnt-know-the-shows-world-an\"},{\"title\":\"Winkler изменил Cousineauа одним чтением\",\"tags\":\"practice-story show-example characters character-arc\",\"excerpt\":\"«Cousineau изначально был задуман куда более тёмным персонажем. Все персонажи в первой версии были менее интересными и объёмными — это просто часть R\u0026D-процесса: пишешь, переписываешь, репетируешь. По\",\"slug\":\"barrys-cousineau-shifted-from-sadistic-to-warm-but-haunted-a\"},{\"title\":\"Your Honor судит и отца, и судью одновременно\",\"tags\":\"show-example principle protagonist theme\",\"excerpt\":\"\\\"В ограниченной серии Showtime Your Honor (по израильскому формату) с Брайаном Крэнстоном в главной роли личная жизнь судьи — как отца и защитника — находится под судом ничуть не меньше, чем сам подсу\",\"slug\":\"your-honor-puts-the-judges-personal-life-on-trial-alongside\"},{\"title\":\"Zeitgeist — глубинный ток эпохи, не тренд\",\"tags\":\"definition theme\",\"excerpt\":\"\\\"Zeitgeist — это то, что происходит в глубинных течениях общества в данный момент. Zeitgeist — не тренд и не мода. Он шире и глубже. Он живёт не пару лет. Он длится минимум целое поколение.\\\"\",\"slug\":\"zeitgeist-is-the-deep-generational-current-of-a-society-dist\"},{\"title\":\"«Big bad» — антагонист, задающий арку сезона\",\"tags\":\"definition tactical-rule show-example antagonist season-arc serialization\",\"excerpt\":\"«Распространённая стратегия для построения сезонной арки — создат мулировать новые цели на предстоящий development-сезон и составить так называемые «нужды сети» — список типов шоу, которые network план\",\"slug\":\"network-needs-are-a-list-of-the-kinds-of-shows-a-network-wil\"},{\"title\":\"«О чём сериал?» — не повод для питча\",\"tags\":\"tactical-rule principle logline\",\"excerpt\":\"\\\"Но если вы на вечеринке, встретили агента в холле на конференции или оказались в любой ситуации, не предназначенной для питча, — человек не хочет, чтобы ему продавали. Он не хочет слушать минуту и до\",\"slug\":\"casual-whats-it-about-calls-for-a-brief-non-sales-response-n\"},{\"title\":\"«Основано на реальных событиях» — приберечь напоследок\",\"tags\":\"tactical-rule pitch-structure hook\",\"excerpt\":\"\\\"Если вы питчите сценарий или роман, основанный на реальных событиях, не говорите об этом с порога. Придержите до конца — там это откровение ударит с максимальной силой.\\\"\",\"slug\":\"reveal-that-a-pitch-is-based-on-a-true-story-only-at-the-end\"},{\"title\":\"«Полная оригинальность» без прецедентов убивает продажу\",\"tags\":\"principle pitfall comparables\",\"excerpt\":\"«Иногда авторы, не находя ни одного удачного прецедента для своей истории, отвечают: \\\"Аналогов моему проекту просто нет. Я хочу полной оригинальности.\\\" Неверный ответ. Голливуд не ищет тотальной ориги\",\"slug\":\"claiming-total-originality-without-commercial-precedents-kil\"},{\"title\":\"«Прикреплён» — только если слово «committed» правдиво\",\"tags\":\"tactical-rule pitfall overview\",\"excerpt\":\"\\\"Если заявляешь, что к проекту прикреплены талант или деньги, — убедись, что это правда. Если не можешь сказать «committed» — то есть «Дженнифер Энистон подтвердила участие в главной роли» или «из общ\",\"slug\":\"only-claim-talent-or-money-is-attached-if-you-can-truthfully\"},{\"title\":\"«Продать демо» — продать рекламодателю аудиторию\",\"tags\":\"definition\",\"excerpt\":\"\\\"На отраслевом жаргоне это называют «продать демо». Например, Freeform «продаёт W18–34». Вот их бизнес в сухом остатке: они продают рекламодателям внимание женщин 18–34 лет.\\\"\",\"slug\":\"networks-selling-a-demo-means-selling-that-demographics-view\"},{\"title\":\"«Расскажи подробнее» — давай трейлер, не пересказ\",\"tags\":\"tactical-rule pitfall hook\",\"excerpt\":\"\\\"Только не бросайтесь пересказывать историю целиком. Не давайте себя поймать в ловушку унылого «…а потом… а потом…» Вообще — я бы советовал обходиться без пересказа. Если покупателю нужна полная истор\",\"slug\":\"when-a-buyer-asks-tell-me-more-deliver-highlights-as-a-verba\"},{\"title\":\"«Стать богатым» — слишком размыто для цели\",\"tags\":\"pitfall principle protagonist character-arc\",\"excerpt\":\"\\\"Одна из главных ошибок в питчах начинающих авторов — они не могут сформулировать внешнюю цель. Порой у них есть лишь смутное представление о том, чего хочет протагонист: стать богатым, стать счастлив\",\"slug\":\"vague-internal-wants-like-be-rich-must-be-focused-into-a-spe\"},{\"title\":\"«Талант» в Голливуде: смысл зависит от контекста\",\"tags\":\"definition\",\"excerpt\":\"«В Голливуде слово \\\"талант\\\" означает разное в разных ситуациях. Порой оно охватывает всех — сценаристов, режиссёров и актёров. Иногда в это понятие включают продюсеров, иногда нет. В других контекстах\",\"slug\":\"talent-in-hollywood-has-context-dependent-meanings-ranging-f\"},{\"title\":\"«Торжество дурака»: герой побеждает, не меняясь\",\"tags\":\"definition genre\",\"excerpt\":\"«Есть ли у вас наивный герой, которого недооценивают из-за его чудачества или нестандартного взгляда на мир, — и он должен победить, не изменив себе? Это и есть Fool Triumphant.»\",\"slug\":\"fool-triumphant-genre-features-an-underestimated-eccentric-h\"},{\"title\":\"«Фильм A + фильм B» как весь питч — признак вторичности\",\"tags\":\"pitfall comparables logline\",\"excerpt\":\"\\\"Типичная ошибка — стараться звучать слишком похоже на уже существующие проекты. Сказать «это как Старый Фильм A плюс Старый Фильм B в космосе» — значит расписаться в том, что оригинального способа пи\",\"slug\":\"relying-solely-on-movie-a-meets-movie-b-as-your-entire-pitch\"},{\"title\":\"«Челюсти с тигром» — агент ушёл, не дослушав\",\"tags\":\"practice-story pitfall comparables logline\",\"excerpt\":\"\\\"Худший питч в моей жизни прозвучал на встрече в ICM с литературными агентами — лет двадцать пять назад, не меньше. Один телевизионщик сказал, что ищет «Челюсти», только с тигром. Агент, представлявши\",\"slug\":\"pitching-jaws-but-with-a-tiger-caused-the-agent-who-repped-t\"},{\"title\":\"«Что если?» — мост от идеи к сути истории\",\"tags\":\"tactical-rule hook logline\",\"excerpt\":\"«Посмотрим, как перейти от «Расскажу, как мне пришла эта идея…» через «Что если…?» — к ключевым элементам вашей истории.»\",\"slug\":\"use-what-if-as-a-segue-from-your-idea-origin-story-to-the-ke\"},{\"title\":\"«Что если» в Watchmen: репарации президента Редфорда\",\"tags\":\"show-example practice-story premise world-building concept-testing\",\"excerpt\":\"«Мне казалось интересным рассказать, как выглядел бы мир, если бы Роберт Редфорд правил 30 лет — скажем, выиграл выборы в начале 90-х. Либеральная фантазия гласит: «Ну тогда расизма уже не было бы». И\",\"slug\":\"watchmens-cornerstone-what-if-was-president-redford-passing\"},{\"title\":\"«Что если» — не разгон, а сама история\",\"tags\":\"practice-story example tactical-rule premise hook\",\"excerpt\":\"\\\"Заметьте: я не задаю вопрос «что если» и не начинаю историю заново. Идея «что если» и есть история. Важнее другое: я не пересказываю историю. Не описываю ни одной сцены, не называю персонажей, не объ\",\"slug\":\"pitch-the-what-if-as-the-story-itself-not-as-setup-to-a-rete\"},{\"title\":\"«Что на кону?» — сигнал, что история не цепляет\",\"tags\":\"definition principle hook\",\"excerpt\":\"«Что на кону? Этот вопрос чаще всего задают development-экзекьютивы или продюсеры, когда история им безразлична. Подтекст один: \\\"А почему нас вообще должно волновать, что будет дальше?\\\"»\",\"slug\":\"whats-at-stake-is-most-often-the-question-execs-ask-when-the\"},{\"title\":\"«Я буду здесь» — тема дружбы в одной фразе\",\"tags\":\"show-example theme\",\"excerpt\":\"«Они прощаются. E.T. говорит: \\\"Я буду здесь\\\" — намекая, что друзья навсегда остаются в нашем сердце.»\",\"slug\":\"ets-farewell-line-ill-be-right-here-delivers-the-theme-that\"},{\"title\":\"«Ярлык» персонажа помещает его в ансамбль\",\"tags\":\"tactical-rule definition show-example characters ensemble\",\"excerpt\":\"\\\"После краткого представления персонажа питч, как правило, определяет его «тип». В Gossip Girl Серену можно описать как «наивную простушку», Блэр — как «ревнивую подругу», а Чака Басса — как «того, ко\",\"slug\":\"a-character-handle-is-a-type-label-that-places-the-character\"},{\"title\":\"Агент запрещает работать до закрытия сделки\",\"tags\":\"practice-story tactical-rule\",\"excerpt\":\"\\\"На этапе переговоров никакой творческой работы. Агенты и юристы прямо говорят своим клиентам — сценаристам и продюсерам: «Ничего не делайте! Не отправляйте network или студии ни строчки, пока я не по\",\"slug\":\"agents-instruct-writers-to-withhold-creative-work-until-the\"},{\"title\":\"Агент сообщает плохие новости быстро\",\"tags\":\"definition tactical-rule\",\"excerpt\":\"\\\"У агентов есть расхожий девиз: «Плохие новости — сразу». Иными словами: выполняй трудную часть работы профессионально, не тяни, потому что работа сложная, следи, чтобы клиент не узнал дурное «с улицы\",\"slug\":\"agents-should-deliver-bad-news-fast\"},{\"title\":\"Агент — первый, кто слышит новую идею автора\",\"tags\":\"definition concept-testing\",\"excerpt\":\"\\\"Агенты чаще всего первыми из профессионалов в разработке слышат новую идею автора. Они выслушивают предварительные замыслы клиентов, дают первичную творческую обратную связь и оценивают потенциал иде\",\"slug\":\"agents-are-often-the-first-development-professionals-to-hear\"},{\"title\":\"Адаптация не терпит формул — каждый раз с нуля\",\"tags\":\"principle show-example serialization episode-pattern format\",\"excerpt\":\"\\\"Формулы адаптации не существует. Эпоха линейных, хронологически развёрнутых нарративов почти ушла. Эпизоды больше не обязаны следовать предсказуемой схеме — история может прыгать назад и вперёд, нара\",\"slug\":\"there-is-no-formula-for-adaptation-the-best-approach-is-besp\"},{\"title\":\"Адаптируя чужое — присвой идею\",\"tags\":\"practice-story principle pilot\",\"excerpt\":\"\\\"Работая продюсером в Alloy и занимаясь в основном адаптациями, я понял: TV-райтер должен присвоить идею, с которой работает, — только тогда в ней появится настоящий творческий дух. Его задача — не пе\",\"slug\":\"tv-writers-adapting-source-material-need-ownership-of-the-id\"},{\"title\":\"Акт — главный раздел сценария\",\"tags\":\"definition act-structure\",\"excerpt\":\"\\\"Акт: главный раздел сценария.\\\"\",\"slug\":\"act-is-the-main-division-in-a-screenplay\"},{\"title\":\"Акт-аут должен заставлять спросить: «Что дальше?»\",\"tags\":\"tactical-rule act-structure cliffhangers\",\"excerpt\":\"\\\"Выбирай лучшие клiffhanger'ы и «та-да-дааам»-моменты для акт-аутов. Это могут быть сюжетные повороты или удары под дых персонажу. Обычно они сами бросаются в глаза. Ищи акт-ауты в отдельных сценах. И\",\"slug\":\"pick-act-outs-that-make-the-audience-ask-what-happens-next\"},{\"title\":\"Акт-брейк держится на персонаже, не на трюке\",\"tags\":\"definition principle pitfall act-structure cliffhangers\",\"excerpt\":\"\\\"Сегодня искусственный клиффхэнгер в конце каждого акта убивает историю. «Писать на акт-брейк» через надуманный приём больше не работает. Вместо этого акт-брейк может приходиться на поворотный момент,\",\"slug\":\"act-breaks-should-land-on-character-driven-turning-points-ra\"},{\"title\":\"Акты эпизода следуют актам A-истории\",\"tags\":\"principle definition act-structure episode-pattern\",\"excerpt\":\"\\\"В этот момент протагонист A-истории входит в драматический акт 3, который одновременно открывает акт 3 всего эпизода — главное драматическое действие завершено. Вот почему акты эпизода, как правило, \",\"slug\":\"episode-dramatic-acts-usually-follow-the-a-storys-dramatic-a\"},{\"title\":\"Актёр в роли рождает новые решения\",\"tags\":\"principle practice-story show-example world-building pilot\",\"excerpt\":\"\\\"Смотришь pilot — и актёры уже живут в своих персонажах, и тебя начинает захватывать. Вот пример: мы были абсолютно уверены, что перед нами мир, где уже упал кальмар, — но как именно его показать, ещё\",\"slug\":\"watching-the-pilot-with-actors-inhabiting-roles-can-inspire\"},{\"title\":\"Актёр-ориентир создаёт образ в голове слушателя\",\"tags\":\"tactical-rule principle characters comparables\",\"excerpt\":\"\\\"Многие сценаристы используют ещё один приём: называют известного актёра, чья экранная личность напоминает персонажа. Говорят: «типаж Дженнифер Лоуренс» или про мужского протагониста: «Думайте о Райан\",\"slug\":\"comparing-a-character-to-a-well-known-actor-plants-a-specifi\"},{\"title\":\"Актёры в пакете могут отпугнуть покупателей\",\"tags\":\"principle pitfall format\",\"excerpt\":\"«Но если не считать очевидных имён высшей лиги, угадать, кто из актёров реально повлияет на решение network-байеров, — чистая лотерея. Продавцы рискуют \\\"упаковать\\\" проект так, что он просто не попадёт\",\"slug\":\"attaching-talent-risks-packaging-away-from-prospective-buyer\"},{\"title\":\"Аналоги-хиты убеждают покупателя лучше слов\",\"tags\":\"tactical-rule principle comparables\",\"excerpt\":\"\\\"Упоминая успешные проекты, схожие по жанру, тону, сюжету или аудитории, вы даёте покупателям куда более чёткое представление о коммерческом потенциале вашей истории. Такие ориентиры настраивают их на\",\"slug\":\"citing-successful-antecedents-signals-commercial-potential-t\"},{\"title\":\"Ансамблевый персонаж — покажи его в pilot\",\"tags\":\"principle pilot ensemble\",\"excerpt\":\"\\\"Запомни: если это есть в шоу — это есть в pilot! Если у тебя есть персонажи, которые войдут в ансамбль, найди способ показать их.\\\"\",\"slug\":\"if-a-character-will-appear-as-part-of-the-ensemble-find-a-wa\"},{\"title\":\"Ансамбль: сначала разбей каждую линию, потом сшей\",\"tags\":\"show-example tactical-rule beat-sheet ensemble pilot-structure\",\"excerpt\":\"\\\"Если вы пишете динамичный ансамблевый сериал, где у каждого персонажа равный вес и своя сюжетная линия — This Is Us как раз для вас. В таком pilot лучший способ разбить историю: разделяй и властвуй. \",\"slug\":\"for-multi-threaded-ensemble-pilots-beat-sheet-each-storyline\"},{\"title\":\"Антагонист в ловушке иронии — двигатель саспенса\",\"tags\":\"definition principle antagonist mystery-suspense\",\"excerpt\":\"\\\"Антагониста тоже можно сделать жертвой сильной драматической иронии — чтобы создать саспенс. Например, протагонист попал в ловушку серийного убийцы: мы знаем, что он пытается бежать, а антагонист — н\",\"slug\":\"making-the-antagonist-the-victim-of-dramatic-irony-generates\"},{\"title\":\"Антагонист в сериале — не всегда человек\",\"tags\":\"principle show-example antagonist\",\"excerpt\":\"\\\"Антагонист может принимать разные формы — и не всегда имеет человеческий облик: • В Chernobyl антагонист — советская система власти.\\\"\",\"slug\":\"antagonists-in-tv-series-are-not-always-personified\"},{\"title\":\"Антагонист всегда убеждён, что он прав\",\"tags\":\"show-example principle antagonist empathy\",\"excerpt\":\"«Каждый злодей — герой собственной истории. Большинство антагонистов не считают себя «плохими». Напротив, они чувствуют себя правыми, облечёнными полномочиями и глубоко праведными. Медсестра Милдред Р\",\"slug\":\"antagonists-usually-believe-they-are-justified-and-righteous\"},{\"title\":\"Антагонист должен быть сильнее протагониста\",\"tags\":\"tactical-rule principle antagonist protagonist pilot\",\"excerpt\":\"«Убедись, что сила препятствий — или сила антагониста, если он есть — равна силе протагониста или превосходит её.»\",\"slug\":\"ensure-the-strength-of-obstacles-or-antagonist-matches-or-ex\"},{\"title\":\"Антагонист ищет слабость и бьёт по ней\",\"tags\":\"principle show-example antagonist\",\"excerpt\":\"\\\"В классическом триллере «Молчание ягнят» (1991) и сериале NBC Hannibal (2013–2015) Ганнибал Лектер (Энтони Хопкинс / Мадс Миккельсен) наделён приземлённой суперсилой: он умеет «считывать» эмоции люде\",\"slug\":\"antagonists-seek-out-weakness-and-exploit-it\"},{\"title\":\"Антагонист — не всегда злодей\",\"tags\":\"definition principle show-example antagonist\",\"excerpt\":\"\\\"Все злодеи — антагонисты, но не все антагонисты — злодеи. В романтических комедиях влюблённые сами друг другу антагонисты. В классическом When Harry Met Sally Салли (Мег Райан) — антагонист Гарри (Би\",\"slug\":\"all-villains-are-antagonists-but-not-all-antagonists-are-vil\"},{\"title\":\"Антологии рассказывают одну историю за сезон\",\"tags\":\"definition show-example format season genre\",\"excerpt\":\"\\\"В ограниченной антологии каждый сезон объединён общей темой или вмещает одну развёрнутую историю — как правило, с полностью новым составом или труппой актёров, каждый раз играющих совершенно других п\",\"slug\":\"limited-anthology-series-use-one-season-long-story-or-theme\"},{\"title\":\"Антология меняет мир и героев в каждом эпизоде\",\"tags\":\"definition show-example format episodes\",\"excerpt\":\"\\\"Антологические сериалы (в отличие от антологических мини-сериалов) — такие как оригинальный Twilight Zone 1960-х и более современный Black Mirror — вводят новый мир и совершенно новых персонажей в ка\",\"slug\":\"anthology-series-introduce-new-worlds-and-new-characters-eac\"},{\"title\":\"Антология обновляет мир и ансамбль каждый сезон\",\"tags\":\"definition show-example format season ensemble\",\"excerpt\":\"\\\"Антологические limited series вроде American Horror Story и True Detective каждый сезон вводят новый мир — место действия и эпоху — и новый ансамбль персонажей.\\\"\",\"slug\":\"anthological-limited-series-introduce-new-worlds-and-ensembl\"},{\"title\":\"Антология — новый мир и герои в каждом эпизоде\",\"tags\":\"definition show-example format episodes\",\"excerpt\":\"\\\"Определение: антологический сериал приносит новый мир и новых персонажей в каждом эпизоде. В прошлом такими антологиями были Twilight Zone и Alfred Hitchcock Presents. Более свежий пример — Black Mir\",\"slug\":\"anthology-series-present-a-new-world-and-characters-each-epi\"},{\"title\":\"Апфронты — весенний показ сетки network\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"Каждую весну рекламные телесети — эфирные, кабельные и онлайн — участвуют в апфронтах. На этих мероприятиях network представляют новую сетку вещания: объявляют, какие шоу выйдут, в какие дни и с како\",\"slug\":\"upfronts-are-spring-events-where-tv-networks-unveil-their-up\"},{\"title\":\"Арена сериала должна манить и кишеть конфликтами\",\"tags\":\"principle tactical-rule setting story-engine\",\"excerpt\":\"\\\"Арена должна манить. Это может быть юридическая фирма, место преступления, неблагополучная семья, офис, жилой дом, квартал, таинственный остров или городок после вторжения пришельцев. Главное — она д\",\"slug\":\"episodic-series-arena-must-be-enticing-and-rich-with-conflic\"},{\"title\":\"Арка Шрека: от болота-крепости до признания в любви\",\"tags\":\"definition show-example principle character-arc\",\"excerpt\":\"\\\"В Shrek герой может делать вид, что жизнь его прекрасна — но одинокое существование на болоте за табличкой «Не входить» на самом деле лишь способ избежать боли отвержения, которому он подвергался с д\",\"slug\":\"shreks-arc-moves-from-isolated-swamp-existence-to-risking-re\"},{\"title\":\"Арка антагониста первого сезона — в раздел арок\",\"tags\":\"tactical-rule antagonist season-arc\",\"excerpt\":\"\\\"Если антагонист побеждён к финалу первого сезона, его арку обычно расписывают именно в этом разделе питча.\\\"\",\"slug\":\"pitch-the-season-one-antagonist-arc-in-the-arcs-section-when\"},{\"title\":\"Арка героя должна быть универсальной\",\"tags\":\"principle show-example character-arc empathy protagonist\",\"excerpt\":\"\\\"Арка вашего героя всегда должна быть универсальной. Как в Shrek: мы все боимся отвержения и все должны набраться смелости, если хотим пережить...\\\"\",\"slug\":\"the-heros-arc-must-be-universal-so-audiences-identify-with-i\"},{\"title\":\"Арка эпизода Pose — график американских горок\",\"tags\":\"show-example principle act-structure pacing character-arc\",\"excerpt\":\"\\\"Каждый акт-брейк этого пронзительного эпизода держит в напряжении. Если бы вы нанесли эпизод на график, вышли бы американские горки: взлёты на головокружительную высоту — и падения в самую пропасть. \",\"slug\":\"pose-episodes-emotional-arc-as-a-roller-coaster-graph-of-ups\"},{\"title\":\"Арка — история, растянутая на эпизоды или сезоны\",\"tags\":\"definition show-example season-arc serialization\",\"excerpt\":\"\\\"«Арка» — это история, рассказанная на протяжении нескольких эпизодов или нескольких сезонов. Роман Блэр и Чака в Gossip Girl — арка: с подъёмами и падениями, она длилась несколько сезонов. Но в том ж\",\"slug\":\"a-story-arc-is-a-story-told-over-multiple-episodes-or-season\"},{\"title\":\"Арка — путь от страха к самоопределению\",\"tags\":\"definition principle character-arc\",\"excerpt\":\"\\\"Арка персонажа — это его внутренний рост и перемены на протяжении всей истории. Как меняется твой герой (и, возможно, другие персонажи) изнутри, пока он преследует видимые цели и бьётся о видимые пре\",\"slug\":\"character-arc-is-the-inner-journey-from-fear-to-courage-and\"},{\"title\":\"Арки персонажей — карты «до и после»\",\"tags\":\"definition tactical-rule example character-arc\",\"excerpt\":\"\\\"Путь персонажа (или арка) лучше всего описывается через «до и после». Вот удобный шаблон: Карта трансформации: (ОПИСАНИЕ НЕСОВЕРШЕННОГО ПЕРСОНАЖА) узнаёт (ПОТРЕБНОСТЬ или УРОК) через (ОБЩИЙ ОБЗОР ИСТ\",\"slug\":\"character-arcs-are-best-expressed-as-before-and-after-transf\"},{\"title\":\"Армстронг знает финал сезона до первого эпизода\",\"tags\":\"practice-story principle season-arc serialization\",\"excerpt\":\"«По сути, мы знаем, куда идём. Когда писали первый эпизод, уже знали, что случится в финале сезона. Мне это очень нравится. Знаю, что некоторые чувствуют себя скованно — будто рамки слишком жёсткие. Н\",\"slug\":\"jesse-armstrong-locks-the-seasons-ending-before-writing-the\"},{\"title\":\"Аутлайн pilot: форма, действие, тон, эмоция\",\"tags\":\"principle definition pilot-goals pilot-structure tone\",\"excerpt\":\"\\\"Цель аутлайна к pilot — как и любого аутлайна — дать читателю ясное представление о форме истории: начале, середине и конце. Поставить персонажей в действие. Намекнуть на тон проекта — голосом автора\",\"slug\":\"a-pilot-story-outlines-goal-is-to-convey-story-shape-charact\"},{\"title\":\"Аутлайн часовика: 12–15 страниц\",\"tags\":\"definition tactical-rule beat-sheet\",\"excerpt\":\"\\\"Аутлайн часового шоу занимает около 12–15 страниц. Больше 18 — уже слишком много. Меньше 5 — слишком мало. Обычно на каждые 5 страниц сценария приходится 1–2 страницы аутлайна.\\\"\",\"slug\":\"tv-outline-length-runs-12-15-pages-for-an-hour-long-show\"},{\"title\":\"Аутлайн часового ТВ: ~26 карточек\",\"tags\":\"tactical-rule beat-sheet act-structure\",\"excerpt\":\"\\\" КОЛИЧЕСТВО КАРТОЧЕК ДЛЯ ЧАСОВОГО ФОРМАТА Одиночные сцены: 7 Завязка + Тема: 2–5 карточек Сомнения героя: 1–4 карточки История Б (и другие линии) + Веселье и игры: 3–6 карточек Антагонисты наступают:\",\"slug\":\"hour-long-tv-outlines-target-about-26-index-cards-total-with\"},{\"title\":\"Базовые угрозы притягивают больше зрителей\",\"tags\":\"principle show-example premise theme\",\"excerpt\":\"\\\"Как правило, чем ниже главная проблема в пирамиде, тем шире потенциальная аудитория — просто потому, что больше людей узнают в ней свою. Показательные примеры — The Walking Dead, Lost и Squid Game: в\",\"slug\":\"lower-maslow-level-main-problems-reach-wider-audiences\"},{\"title\":\"Без подцелей сюжет кажется пустым\",\"tags\":\"principle storylines pacing\",\"excerpt\":\"\\\"Именно это удерживает зрителя: мы понимаем, что вообще стоит на кону, — и одновременно знаем, что стоит на кону в каждой сюжетной линии в каждый момент. Если не выстраивать драматические сцены вокруг\",\"slug\":\"without-subgoal-driven-dramatic-sequences-storylines-feel-fl\"},{\"title\":\"Без причинно-следственной логики Fun \u0026 Games мертва\",\"tags\":\"definition pitfall pacing beat-sheet episode-pattern\",\"excerpt\":\"\\\"Обратная сторона медали — «излишняя эпизодичность». Она возникает, когда сцены ощущаются как позиции из чеклиста: вытащили с доски и бросили в сценарий, не задавшись вопросом, почему это должно проис\",\"slug\":\"fun-games-turns-too-episodic-when-scenes-lack-causeeffect-lo\"},{\"title\":\"Без причинных связей сериал — сборник рассказов\",\"tags\":\"principle storylines serialization\",\"excerpt\":\"\\\"Это тоже часть сплетения историй: здорово, когда каждая сюжетная линия выстроена со своей драматической структурой — это придаёт ей энергию и проясняет ставки. Но если остановиться на этом, сериал пр\",\"slug\":\"storylines-need-causal-links-or-the-series-feels-like-unconn\"},{\"title\":\"Без эмоционального ядра сериал пуст\",\"tags\":\"principle pitfall theme character-arc serialization\",\"excerpt\":\"\\\"Без эмоций сериал неизбежно ощущается пустым. Дело не только в том, кто что и когда делает, — важно, кто что и когда узнаёт, и какой эмоциональный отклик, какие волны расходятся от сюжета.\\\"\",\"slug\":\"without-emotional-core-a-series-feels-empty-regardless-of-pl\"},{\"title\":\"Бессознательная потребность движет аркой персонажа\",\"tags\":\"definition character-arc protagonist\",\"excerpt\":\"\\\"Бессознательная потребность: когда персонажу нужно измениться, двигаться дальше — это и есть его бессознательная потребность. Осознанное желание протагониста (цель) определяет драматическое действие,\",\"slug\":\"unconscious-need-is-what-drives-a-character-to-change-or-mov\"},{\"title\":\"Библия сериала — 30 страниц, формат — 10\",\"tags\":\"definition tactical-rule format overview\",\"excerpt\":\"\\\"Иногда используют сокращённую версию — так называемый «format» документ. (Библии сериалов обычно занимают около 30 страниц, тогда как format-документы — порядка десяти.)\\\"\",\"slug\":\"series-bibles-are-usually-around-30-pages-while-format-docum\"},{\"title\":\"Бит — это момент истории на уровне сюжета\",\"tags\":\"definition beat-sheet\",\"excerpt\":\"\\\"Бит — это момент повествования. Бит описывает, что происходит дальше, с высоты птичьего полёта.\\\"\",\"slug\":\"a-beat-is-a-high-level-storytelling-moment-describing-what-h\"},{\"title\":\"Блестящая завязка — признак незаконченной истории\",\"tags\":\"pitfall principle pilot-structure story-engine\",\"excerpt\":\"\\\"Слабость номер один, которую я замечаю снова и снова: автор не продумал историю до конца, зато способен описать открывающую сцену во всех красках. Как только я слышу слова «Ну, начинается это так…», \",\"slug\":\"opening-scene-only-pitches-signal-an-unfinished-story\"},{\"title\":\"Блеф у двери Вайнштейна превратил выдуманную встречу в питч\",\"tags\":\"practice-story\",\"excerpt\":\"«Один особенно упорный автор ходил на все мои воркшопы и слышал, как я советую участникам ехать в Канны питчить. Однажды он так и сделал. Получил аккредитацию, начал обходить продюсеров — крупных и ме\",\"slug\":\"bluffing-into-a-weinstein-suite-at-cannes-turned-a-fake-appo\"},{\"title\":\"Болезнь Логана — главный крючок эмпатии в Succession\",\"tags\":\"show-example principle empathy protagonist pilot\",\"excerpt\":\"\\\"У Логана рушится медиаимперия — особенно газеты, которые сдают под натиском технологий. Он устарел, и тело его предаёт. Он слаб и стар. Думаю, именно поэтому мы сочувствуем ему с первых кадров. Смерт\",\"slug\":\"succession-grounds-early-empathy-for-logan-through-his-illne\"},{\"title\":\"Больше сюжетных линий — меньше сцен в каждой\",\"tags\":\"tactical-rule principle storylines act-structure pacing\",\"excerpt\":\"\\\"Простое правило: чем больше сюжетных линий в эпизоде, тем меньше драматических сцен достаётся каждой из них. В одночасовом процедурале с сильной A-Story и парой второстепенных подсюжетов главная лини\",\"slug\":\"more-storylines-per-episode-means-fewer-dramatic-sequences-p\"},{\"title\":\"Бэкенд: 10–20 очков автору, 5–15 EP, 1–2 режиссёру пилота\",\"tags\":\"definition tactical-rule pilot\",\"excerpt\":\"\\\"Участники дележа прибыли — как правило, автор/создатель сериала (от 10 до 20% всей прибыли, или «очков» — одно очко равно 1%), один или несколько non-writing executive producer'ов, причастных к созда\",\"slug\":\"backend-points-typically-allocate-1020-to-writercreator-515\"},{\"title\":\"Бюджет продюсера — цена продажи, не смета\",\"tags\":\"principle definition format\",\"excerpt\":\"«Звучит убедительно, но это фантазия. На деле продюсер смотрит на проект и прикидывает, за сколько сможет его продать. Вот и весь бюджет.»\",\"slug\":\"a-producers-budget-is-what-she-estimates-she-can-sell-the-pr\"},{\"title\":\"В Breaking Bad вторая ось — уязвлённая гордость Уолтера\",\"tags\":\"show-example principle character-arc protagonist subtext\",\"excerpt\":\"\\\"Вторая ось появляется, когда добавляешь главную драматическую эволюцию — бессознательную потребность протагониста измениться. В Breaking Bad мы быстро понимаем, что Уолтер Уайт себя обманывает. Он уб\",\"slug\":\"breaking-bads-second-dimension-is-walter-whites-pride-driven\"},{\"title\":\"В La Casa de Papel братство придумали на ходу\",\"tags\":\"show-example principle relationships characters world-building\",\"excerpt\":\"«В этом и есть магия La Casa de Papel: поскольку персонажей до ограбления никто не знает, их можно изобретать прямо на ходу. Например, отношения между Профессором и Берлином родились, когда мы увидели\",\"slug\":\"la-casa-de-papel-invented-the-professor-and-berlin-as-brothe\"},{\"title\":\"В Mare of Easttown травма поколений движет детективом\",\"tags\":\"show-example theme story-engine\",\"excerpt\":\"\\\"В Mare of Easttown травма поколений — в центре всего: включая, как выясняется, само убийство, которое тянет сериал вперёд. Но ни для кого это не так верно, как для Мэр Шихан.\\\"\",\"slug\":\"mare-of-easttown-centers-generational-trauma-as-the-engine-o\"},{\"title\":\"В Normal People классовый разрыв движет конфликтом\",\"tags\":\"show-example theme relationships\",\"excerpt\":\"\\\"Классовые различия, как это часто бывает в англо-ирландских историях, пронизывают почти каждый конфликт в Normal People. Коннелл впервые встречает Марианну не в школе, а дома у неё — куда его мать пр\",\"slug\":\"normal-people-uses-class-to-drive-conflict-between-connell-a\"},{\"title\":\"В Ozark герои не убивают намеренно\",\"tags\":\"show-example principle characters character-arc theme\",\"excerpt\":\"\\\"Марти случайно стреляет в Мейсона, пастора, — но не нарочно. Венди выдаёт местонахождение брата, Бена, которого затем убивают. Ни Марти, ни Венди так и не совершают преднамеренного убийства.\\\"\",\"slug\":\"ozarks-marty-and-wendy-never-commit-premeditated-murder-desp\"},{\"title\":\"В Rick and Morty «Всё пропало» — это родители\",\"tags\":\"show-example beat-sheet relationships\",\"excerpt\":\"\\\"«ВСЁ ПРОПАЛО» (бит 17): …dimensional portal открывается, они вырываются обратно в школьную столовую Морти — и тут же сталкиваются с мамой и папой!! Это куда страшнее и опаснее для отношений двух геро\",\"slug\":\"rick-and-mortys-all-is-lost-is-the-parents-confrontation-not\"},{\"title\":\"В Schitt's Creek смешит не диалог, а реакция\",\"tags\":\"show-example principle tone visual-style\",\"excerpt\":\"«Очень рано я понял: бо́льшая часть магии нашего шоу, большая часть комедии — в реакциях. Даже в монтаже мы держимся на реакции одного человека, пока говорит другой. Это нестандартный подход, но он то\",\"slug\":\"much-of-schitts-creeks-comedy-lives-in-reactions-rather-than\"},{\"title\":\"В Seinfeld вместо A/B/C писали имена персонажей\",\"tags\":\"show-example practice-story storylines ensemble\",\"excerpt\":\"\\\"Когда я работал в Seinfeld — а именно там я научился писать — никаких ABC у нас не было. Мы вообще не пользовались буквами. Вместо этого искали идею для каждого из четырёх главных персонажей. Не A, B\",\"slug\":\"seinfeld-writers-room-replaced-abc-story-labels-with-charact\"},{\"title\":\"В Transparent цель пилота решается случайно\",\"tags\":\"show-example principle pilot pilot-goals pilot-structure\",\"excerpt\":\"«Сначала Морт терпит неудачу. Но в кульминации эпизода его дочь Сара случайно раскрывает секрет — она застаёт отца переодетым в женщину, когда тайком приходит к нему домой на свидание с любовником. Фи\",\"slug\":\"transparent-pilot-resolves-morts-goal-through-accidental-dis\"},{\"title\":\"В Vida секс-сцены двигают историю, не ради себя\",\"tags\":\"show-example principle theme\",\"excerpt\":\"\\\"Но в Vida нет ни одной секс-сцены ради секса. Каждая либо меняет персонажа, либо подтверждает что-то важное в истории. Это принципиально — особенно когда речь идёт о квир-сценах.\\\"\",\"slug\":\"vida-sex-scenes-always-shift-character-or-reaffirm-narrative\"},{\"title\":\"В pilot VO оправдан — даже если обычно морщатся\",\"tags\":\"author-opinion principle pilot pilot-structure\",\"excerpt\":\"\\\"Закадровый голос вызывает скептицизм в сценарных кругах, но pilot — это прежде всего экономия, и здесь VO быстро доносит до зрителя нужную информацию. Некогда рассуждать, хорош ли инструмент. Работае\",\"slug\":\"in-pilots-economy-justifies-using-voiceover-even-when-it-wou\"},{\"title\":\"В pilot можно не ставить рекламные паузы\",\"tags\":\"tactical-rule principle act-structure pilot-structure format\",\"excerpt\":\"\\\"В общем и целом, вы на все сто можете забыть про рекламные паузы, когда пишете pilot. Люди в индустрии привыкли к pilot'ам без них. Честно — если уже от одной мысли об этом голова идёт кругом, не дум\",\"slug\":\"pilots-can-omit-commercial-act-breaks-entirely\"},{\"title\":\"В США сначала снимают pilot, потом решают по сериалу\",\"tags\":\"definition principle pilot\",\"excerpt\":\"\\\"Как правило, в США, чтобы получить заказ от крупного network или студии, нужно пройти устный pitch и отбор pilot'а. Сначала питчишь сериал, чтобы заказали pilot. Если pilot получает зелёный свет, то \",\"slug\":\"us-networks-and-studios-commission-a-pilot-first-then-decide\"},{\"title\":\"В ТВ сценарист — главный\",\"tags\":\"definition overview\",\"excerpt\":\"\\\"В ТВ иерархия ровно обратная. Здесь сценарист — главный. У него больше всего власти и творческого контроля над сериалом, на котором он работает.\\\"\",\"slug\":\"in-tv-writers-hold-the-most-power-and-creative-control-over\"},{\"title\":\"В агентстве — ищи конкретного агента с причиной\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Агентства работают иначе: если вы знаете агента, слышали его на конференции или знаете, что он успешно представлял автора с похожим по жанру или аудитории проектом, — идите прямо к нему.\\\"\",\"slug\":\"at-agencies-pursue-a-specific-agent-directly-when-you-have-a\"},{\"title\":\"В ансамбле с равным весом — своя ДНК на каждую нить\",\"tags\":\"show-example principle ensemble pilot logline\",\"excerpt\":\"\\\"В ансамблевых шоу, где несколько персонажей получают примерно равный вес, истории часто ломают отдельно для каждого. В pilot, как правило, один персонаж всё же выходит чуть больше на первый план. Pil\",\"slug\":\"equally-weighted-ensemble-pilots-require-separate-story-dna\"},{\"title\":\"В драме и комедии семья — это franchise\",\"tags\":\"tactical-rule definition principle character-arc relationships\",\"excerpt\":\"\\\"В персонажно-ориентированной комедии, драмедии или драме ongoing семейная динамика и отношения — это franchise. Эти накопительные сюжетные линии и подсюжеты называются «арками персонажей».\\\"\",\"slug\":\"in-character-driven-comedy-dramedy-or-drama-ongoing-family-d\"},{\"title\":\"В логлайне «это — » продолжает жанр\",\"tags\":\"principle definition genre logline\",\"excerpt\":\"\\\"Итак, первое, что идёт после «это —», — жанр или жанры, в которых вы работаете. «Это комедия-роуд-муви…» «Это научно-фантастический экшн-приключенческий фильм…»\\\"\",\"slug\":\"in-a-logline-the-first-element-after-its-a-should-name-the-g\"},{\"title\":\"В очереди к продюсеру — не питчуй\",\"tags\":\"tactical-rule pitfall\",\"excerpt\":\"\\\"Когда доберёшься до начала очереди, запомни одно правило: не питчуй. Они устали и рассеяны. Не запомнят ни слова, а ты выглядишь любителем.\\\"\",\"slug\":\"dont-pitch-when-you-reach-the-front-of-a-queue-to-meet-indus\"},{\"title\":\"В персонажной истории враг протагониста — он сам\",\"tags\":\"definition protagonist character-arc\",\"excerpt\":\"\\\"Персонажная история: история, где главная проблема — внутри протагониста. Протагонист сам себе антагонист: большинство конфликтов рождается изнутри. Главный вопрос — изменится ли герой, сумеет ли пре\",\"slug\":\"a-character-led-story-is-one-where-the-main-problem-lies-wit\"},{\"title\":\"В питч документалистики входит стратегия дистрибуции\",\"tags\":\"tactical-rule genre\",\"excerpt\":\"\\\"Некоторые документальные программы — например, образовательные или социально-значимые — стремятся изменить мир. В таких жанрах стратегия дистрибуции становится важной частью питча. Как вы убедитесь, \",\"slug\":\"when-pitching-impact-documentaries-include-the-distribution\"},{\"title\":\"В питче важна эмоция, а не мастерство подачи\",\"tags\":\"principle pitfall tone\",\"excerpt\":\"\\\"Ещё важнее то, что мастерство подачи — не главное в хорошем питче. Главное — эмоция. Лучшие питчи, которые я слышал, были рассказаны очень тихо: мне приходилось слушать внимательнее, и история сама в\",\"slug\":\"emotion-not-performance-is-the-critical-component-of-a-good\"},{\"title\":\"В продакшн-компании целься в development executive\",\"tags\":\"tactical-rule\",\"excerpt\":\"\\\"Если у вас нет личных связей с кем-то выше по иерархии, development executive продакшн-компании — ваш человек. Это может быть Director of Development, Vice President of Creative Affairs, Story Editor\",\"slug\":\"at-production-companies-target-the-development-executive-whe\"},{\"title\":\"В сериале много персонажей — больше историй\",\"tags\":\"principle characters ensemble\",\"excerpt\":\"\\\"В отличие от кино, сериалу нужно много персонажей. Когда ты в середине седьмого эпизода шестого сезона — хорошо иметь выбор. Больше персонажей — больше историй. Больше вариантов!\\\"\",\"slug\":\"tv-needs-lots-of-characters-because-more-characters-mean-mor\"},{\"title\":\"В сериале персонаж раскрывается, а не завершает арку\",\"tags\":\"principle characters character-arc serialization\",\"excerpt\":\"\\\"В сериале главное — насколько глубоко мы можем раскрыть персонажей по ходу истории, потому что если шоу успешное, вы хотите, чтобы оно шло вечно. Если это не мини-сериал, не стоит намекать, что мы зн\",\"slug\":\"tv-series-characters-reveal-depth-rather-than-complete-finit\"},{\"title\":\"В сюжетном сериале главная проблема — снаружи\",\"tags\":\"principle definition protagonist story-engine\",\"excerpt\":\"\\\"Если главная проблема приходит извне протагониста — скорее всего, вы разрабатываете сюжетный сериал, где в центре стоит главное драматическое действие. Вспомните такие сериалы, как Stranger Things ил\",\"slug\":\"plot-led-series-locate-the-main-problem-outside-the-protagon\"},{\"title\":\"В сюжетном сериале каждая сцена ведёт к цели\",\"tags\":\"definition principle story-engine serialization protagonist\",\"excerpt\":\"\\\"В сюжетном сериале каждая драматическая последовательность — это, как правило, шаг протагониста к главной цели.\\\"\",\"slug\":\"in-a-plot-led-series-each-dramatic-sequence-is-often-a-way-f\"},{\"title\":\"В тематических историях — нити, а не субсюжеты\",\"tags\":\"definition theme storylines\",\"excerpt\":\"\\\"Нет главного сюжета — нет главного драматического действия или развития. Без главного сюжета не может быть субсюжетов, поэтому каждую сюжетную линию мы называем нитью.\\\"\",\"slug\":\"theme-led-stories-have-strands-rather-than-subplots-because\"},{\"title\":\"В тематической истории нет главного героя\",\"tags\":\"definition theme protagonist ensemble\",\"excerpt\":\"«В тематической истории нет единого протагониста — ни один персонаж или группа персонажей не переживает больше конфликта, чем остальные.»\",\"slug\":\"theme-led-stories-lack-a-single-protagonist-because-no-chara\"},{\"title\":\"В чистом процедурале franchise — дело недели\",\"tags\":\"tactical-rule definition principle episode-pattern story-engine format\",\"excerpt\":\"\\\"В чистом процедурале — таком как The Good Doctor, The Good Fight или любой Law \u0026 Order — franchise представляет собой дело недели: медицинское, юридическое, криминальное и т. д.\\\"\",\"slug\":\"in-purely-procedural-series-the-franchise-is-the-case-of-the\"},{\"title\":\"В эпизодических комедиях персонаж не меняется\",\"tags\":\"principle show-example character-arc genre characters\",\"excerpt\":\"\\\"Если вы пишете что-то более эпизодическое, ваш персонаж, скорее всего, никогда не починит свой сломанный компас. Archie Bunker, Lucy, Larry David и George Costanza не меняются. Их сломанный компас — \",\"slug\":\"in-episodic-comedy-characters-likely-wont-ever-fix-their-bro\"},{\"title\":\"Визуал в центре истории — принеси картинку\",\"tags\":\"tactical-rule show-example visual-style\",\"excerpt\":\"\\\"Третье исключение: если визуал — сердце истории. Тогда стоит принести одну крупную распечатку или развёрнутый mood board. Фильм Woman in Gold основан на реальной истории: пожилая еврейская беженка до\",\"slug\":\"bring-a-blow-up-picture-or-mood-board-when-a-visual-is-centr\"},{\"title\":\"Визуальные материалы легко подведут на питче\",\"tags\":\"tactical-rule pitfall visual-style\",\"excerpt\":\"\\\"Используйте визуальные материалы, если они помогают прояснить идею, — но не ждите, что они «ослепят». Эффект может оказаться обратным. Если ваша картинка слабее той, что только что показали J.J. Abra\",\"slug\":\"visual-aids-in-pitches-risk-unfair-comparison-to-top-tier-re\"},{\"title\":\"Влюбиться в персонажей — главный крючок питча\",\"tags\":\"principle characters hook\",\"excerpt\":\"\\\"Раздел «Персонажи» — один из важнейших в питче, потому что именно влюблённость в персонажей сильнее всего цепляет зрителя в сериале — и точно так же цепляет development executive, когда он решает, по\",\"slug\":\"falling-in-love-with-the-characters-is-what-hooks-viewers-an\"},{\"title\":\"Внешний сюжет нужен даже в истории взросления\",\"tags\":\"principle character-arc act-structure\",\"excerpt\":\"\\\"История взросления сосредоточена на внутренней арке персонажа — и легко забыть, что внешний сюжет вообще существует. Но это не значит, что он не нужен. Как мы видели, у каждой экранной истории должен\",\"slug\":\"rite-of-passage-stories-still-require-an-outer-story-spine-e\"},{\"title\":\"Внешняя история: персонаж, цель, препятствие\",\"tags\":\"definition principle tactical-rule storylines protagonist\",\"excerpt\":\"\\\"Что такое внешняя история? Ей нужны три вещи: Персонаж, который чего-то хочет. То, чего он хочет. Тот или то, что мешает ему этого добиться.\\\"\",\"slug\":\"an-outer-story-requires-a-character-a-want-and-something-to\"},{\"title\":\"Внутренний конфликт — в столкновение персонажей\",\"tags\":\"principle characters theme\",\"excerpt\":\"«В хорошей экранной истории весь внутренний конфликт и все идеи получают драматическую форму — становятся столкновением персонажей, преследующих цели, которые можно снять на камеру.»\",\"slug\":\"in-a-good-screen-story-inner-conflict-and-ideas-are-external\"},{\"title\":\"Внутренняя история требует честности об изъянах\",\"tags\":\"principle character-arc empathy\",\"excerpt\":\"\\\"Внутренняя история — вещь сугубо личная. Она неизбежно связана с твоим собственным опытом. Нельзя писать о чужих изъянах, не разделяя
